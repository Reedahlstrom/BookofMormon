<!DOCTYPE html>

<body>
<script>
// ============================================================
// BOOK OF MORMON RPG — PHASER.JS GAME
// ============================================================

// If a scene crashes on GitHub Pages, show the actual exception on-screen (not just in DevTools).
(function initErrorOverlay() {
  const el = document.createElement('pre');
  el.id = 'bom_debug_overlay';
  el.style.cssText = [
    'position:fixed',
    'left:12px',
    'top:12px',
    'right:12px',
    'max-height:45vh',
    'overflow:auto',
    'padding:10px 12px',
    'background:rgba(0,0,0,0.85)',
    'color:#ffd27a',
    'border:1px solid rgba(255,215,0,0.5)',
    'border-radius:8px',
    'font:12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
    'z-index:99999',
    'display:none',
    'white-space:pre-wrap',
  ].join(';');
  document.body.appendChild(el);

  function show(msg) {
    el.style.display = 'block';
    el.textContent = String(msg || 'Unknown error');
  }

  window.addEventListener('error', (e) => {
    const err = e.error;
    show(`JS ERROR:\n${e.message}\n\n${(err && (err.stack || err.message)) || ''}`);
  });
  window.addEventListener('unhandledrejection', (e) => {
    const r = e.reason;
    show(`UNHANDLED PROMISE:\n${(r && (r.stack || r.message)) || String(r)}`);
  });
})();

// --- CONSTANTS ---
const W = 800, H = 600;
const TILE = 32;
const COLORS = {
  sand: 0xd4a574, darkSand: 0xb8956a, gold: 0xffd700, olive: 0x6b8e23,
  deepBlue: 0x16213e, skyBlue: 0x87ceeb, nightBlue: 0x0f3460, white: 0xffffff,
  red: 0xc0392b, darkRed: 0x8b0000, green: 0x27ae60, darkGreen: 0x1e8449,
  brown: 0x8b4513, lightBrown: 0xdeb887, gray: 0x808080, darkGray: 0x404040,
  purple: 0x8e44ad, black: 0x000000, cream: 0xfff8dc, iron: 0x708090,
  mist: 0x778899, treeGold: 0xffe066, faithBlue: 0x3498db, pink: 0xffb6c1
};

// --- GAME STATE ---
const GameState = {
  playerName: 'Nephi',
  playerAppearance: {
    skinTone: 0xc49a6c, hairColor: 0x1a1208, hairStyle: 'short',
    robeColor: 0x2c6fbb, robeAccent: 0x1a4d8f, headwear: 'headband',
    headwearColor: 0xdaa520, beardStyle: 'short', expression: 'brave',
  },
  faith: 50, courage: 30, testimony: 20, charity: 25, wisdom: 15,
  maxFaith: 100, level: 1, faithPoints: 0, fpToNext: 100,
  scriptures: [],
  prophetCards: [],
  journal: [],
  currentWorld: 1,
  questFlags: {},
  companion: null,
  inventory: [],
  battleWon: false,
  ironRodComplete: false,
  brassPlatesObtained: false,
  completedScenes: [],
  shipProgress: 0,
  liahonaActive: false,
  // Premium systems
  alignment: { faithVsDoubt: 0, compassionVsHarshness: 0, choices: [] },
  chapter: { book: '1 Nephi', chapter: 3, label: '1 Nephi \u00b7 Ch. 3' },
  time: { t: 0.72 }, // 0..1 day cycle (0 = midnight, 0.5 = noon)
  settings: {
    difficulty: 'disciple', // explorer | disciple | warrior
    textSize: 'medium',     // small | medium | large
    colorblind: false,
    music: 0.65,
    sfx: 0.8,
    textSpeedMs: 22,        // typewriter speed
    autoAdvance: false,
  },
};

const STORAGE_KEY_SAVE = 'bomrpg_save_v1';

function clamp01(n) { return Math.max(0, Math.min(1, n)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function nowMs() { return Date.now(); }

function safeParseJSON(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

function saveGame(meta = {}) {
  const payload = {
    version: 1,
    savedAt: nowMs(),
    meta,
    state: GameState,
  };
  try { localStorage.setItem(STORAGE_KEY_SAVE, JSON.stringify(payload)); } catch {}
}

function loadGame() {
  const raw = localStorage.getItem(STORAGE_KEY_SAVE);
  if (!raw) return false;
  const payload = safeParseJSON(raw, null);
  if (!payload || payload.version !== 1 || !payload.state) return false;

  // Shallow-merge for forwards compatibility (keeps new defaults if missing).
  Object.keys(payload.state).forEach((k) => { GameState[k] = payload.state[k]; });
  return true;
}

function hasSaveGame() {
  return !!localStorage.getItem(STORAGE_KEY_SAVE);
}

function resetGameState() {
  const keepSettings = GameState.settings;
  const keepName = GameState.playerName;
  const keepScriptures = [];
  Object.keys(GameState).forEach(k => delete GameState[k]);
  Object.assign(GameState, {
    playerName: keepName || 'Nephi',
    faith: 50, courage: 30, testimony: 20, charity: 25, wisdom: 15,
    maxFaith: 100, level: 1, faithPoints: 0, fpToNext: 100,
    scriptures: keepScriptures,
    prophetCards: [],
    journal: [],
    currentWorld: 1,
    questFlags: {},
    companion: null,
    inventory: [],
    battleWon: false,
    ironRodComplete: false,
    brassPlatesObtained: false,
    completedScenes: [],
    shipProgress: 0,
    liahonaActive: false,
    alignment: { faithVsDoubt: 0, compassionVsHarshness: 0, choices: [] },
    chapter: { book: '1 Nephi', chapter: 3, label: '1 Nephi \u00b7 Ch. 3' },
    time: { t: 0.72 },
    settings: keepSettings || {
      difficulty: 'disciple',
      textSize: 'medium',
      colorblind: false,
      music: 0.65,
      sfx: 0.8,
      textSpeedMs: 22,
      autoAdvance: false,
    },
  });
}

function recordChoice(choice) {
  if (!choice) return;
  const { id, faithVsDoubt = 0, compassionVsHarshness = 0, label = '' } = choice;
  GameState.alignment.faithVsDoubt += faithVsDoubt;
  GameState.alignment.compassionVsHarshness += compassionVsHarshness;
  GameState.alignment.choices.push({ id: id || `choice_${GameState.alignment.choices.length + 1}`, label, faithVsDoubt, compassionVsHarshness, time: nowMs() });
}

function addScripture(ref, text) {
  if (!GameState.scriptures.find(s => s.ref === ref)) {
    GameState.scriptures.push({ ref, text });
    return true;
  }
  return false;
}

function addJournal(entry) {
  GameState.journal.push({ entry, time: Date.now() });
}

function gainFP(amount) {
  GameState.faithPoints += amount;
  while (GameState.faithPoints >= GameState.fpToNext) {
    GameState.faithPoints -= GameState.fpToNext;
    GameState.level++;
    GameState.maxFaith += 10;
    GameState.faith = Math.min(GameState.faith + 20, GameState.maxFaith);
    GameState.courage += 5;
    GameState.testimony += 5;
    GameState.charity += 5;
    GameState.wisdom += 3;
    GameState.fpToNext = Math.floor(GameState.fpToNext * 1.5);
  }
}

// ============================================================
// PIXEL ART SPRITE GENERATION SYSTEM
// Characters are drawn onto canvas textures at 2x pixel scale
// for a chunky retro RPG look with 600 BC clothing
// ============================================================

function hexToRGB(hex) {
  return { r: (hex >> 16) & 0xff, g: (hex >> 8) & 0xff, b: hex & 0xff };
}

function darken(hex, amt = 40) {
  const c = hexToRGB(hex);
  return Phaser.Display.Color.GetColor(
    Math.max(0, c.r - amt), Math.max(0, c.g - amt), Math.max(0, c.b - amt)
  );
}

function lighten(hex, amt = 40) {
  const c = hexToRGB(hex);
  return Phaser.Display.Color.GetColor(
    Math.min(255, c.r + amt), Math.min(255, c.g + amt), Math.min(255, c.b + amt)
  );
}

// Draw a pixel on a graphics object at 2x scale
function px(g, x, y, color, alpha = 1) {
  g.fillStyle(color, alpha);
  g.fillRect(x * 2, y * 2, 2, 2);
}

// Generate a character texture and register it with the scene
// Pokemon Ruby/Sapphire overworld style: big round head, broad shoulders, short legs
function generateCharacterTexture(scene, key, config) {
  const {
    skinTone = 0xd4a574,     // Middle Eastern olive/tan skin
    hairColor = 0x2c1810,    // Dark brown/black hair
    hairStyle = 'short',     // short, long, bald
    beardStyle = 'none',     // none, short, long, prophet
    robeColor = 0x8B7355,    // Main robe color
    robeAccent = 0x6B5335,   // Robe trim/belt
    cloakColor = null,       // Optional outer cloak
    headwear = 'none',       // none, headband, turban, hood
    headwearColor = 0xffd700,
    sandals = 0x8B6914,
    hasStaff = false,
    staffColor = 0x8B6914,
    hasSword = false,
    isArmored = false,
    armorColor = 0x708090,
    eyeColor = 0x3D2B1F,
    expression = 'neutral',  // neutral, brave, wise, kind
    accessory = 'none',      // none, scroll, plates
    accessoryColor = 0xffd700,
  } = config;

  const sprW = 32, sprH = 48; // sprite dimensions in 2x pixels (16x24 grid)
  const g = scene.make.graphics({ x: 0, y: 0, add: false });

  const skinDark = darken(skinTone, 30);
  const skinLight = lighten(skinTone, 20);
  const robeDark = darken(robeColor, 30);
  const robeLight = lighten(robeColor, 30);
  const hairDark = darken(hairColor, 20);
  const outlineColor = darken(robeColor, 60);

  // Pokemon style: Head rows 1-9, Body rows 10-18, Legs rows 19-22, Feet row 23
  // Head is ~40% of height, shoulders wide (3-13), legs short (3-4 rows)

  // === FEET / SANDALS (rows 22-23) ===
  px(g, 5, 22, sandals); px(g, 6, 22, sandals); px(g, 7, 22, sandals);
  px(g, 9, 22, sandals); px(g, 10, 22, sandals); px(g, 11, 22, sandals);
  px(g, 5, 23, darken(sandals, 20)); px(g, 6, 23, sandals); px(g, 7, 23, darken(sandals, 20));
  px(g, 9, 23, darken(sandals, 20)); px(g, 10, 23, sandals); px(g, 11, 23, darken(sandals, 20));

  // === SHORT LEGS (rows 19-21) - Pokemon style stumpy legs ===
  // Left leg
  px(g, 6, 19, skinTone); px(g, 7, 19, skinTone);
  px(g, 6, 20, skinTone); px(g, 7, 20, skinDark);
  px(g, 6, 21, skinDark); px(g, 7, 21, skinTone);
  // Right leg
  px(g, 9, 19, skinTone); px(g, 10, 19, skinTone);
  px(g, 9, 20, skinDark); px(g, 10, 20, skinTone);
  px(g, 9, 21, skinTone); px(g, 10, 21, skinDark);

  // === ROBE / BODY (rows 13-18) - Wide torso, Pokemon proportions ===
  // Lower robe skirt (wide, flows outward)
  for (let y = 16; y <= 18; y++) {
    for (let x = 4; x <= 12; x++) {
      const c = (x === 4 || x === 12) ? robeDark : (x === 8 ? robeLight : robeColor);
      px(g, x, y, c);
    }
  }
  // Robe hem detail
  for (let x = 4; x <= 12; x++) {
    px(g, x, 18, (x % 2 === 0) ? robeAccent : robeDark);
  }

  // Upper torso (rows 13-15) - WIDE shoulders, muscular look
  for (let y = 13; y <= 15; y++) {
    for (let x = 3; x <= 13; x++) {
      if (y === 13 && (x === 3 || x === 13)) continue; // slight shoulder rounding
      const c = (x === 3 || x === 13) ? robeDark : (x <= 4 || x >= 12) ? robeDark : robeColor;
      px(g, x, y, c);
    }
  }

  // Chest/muscle highlight for broad look
  px(g, 7, 13, robeLight); px(g, 9, 13, robeLight);
  px(g, 7, 14, robeLight); px(g, 9, 14, robeLight);

  // Belt/sash
  for (let x = 4; x <= 12; x++) {
    px(g, x, 16, robeAccent);
  }

  // Neckline / collar (row 12)
  px(g, 6, 12, skinTone); px(g, 7, 12, skinTone); px(g, 8, 12, skinTone);
  px(g, 9, 12, skinTone); px(g, 10, 12, skinTone);

  // === CLOAK (if specified) ===
  if (cloakColor) {
    const cloakDark = darken(cloakColor, 25);
    // Left cloak drape
    px(g, 2, 13, cloakColor); px(g, 3, 13, cloakColor);
    px(g, 2, 14, cloakColor); px(g, 2, 15, cloakDark);
    px(g, 2, 16, cloakColor); px(g, 2, 17, cloakDark);
    px(g, 3, 17, cloakColor);
    // Right cloak drape
    px(g, 13, 13, cloakColor); px(g, 14, 13, cloakColor);
    px(g, 14, 14, cloakColor); px(g, 14, 15, cloakDark);
    px(g, 14, 16, cloakColor); px(g, 14, 17, cloakDark);
    px(g, 13, 17, cloakColor);
    // Shoulder tops
    px(g, 3, 12, cloakColor); px(g, 4, 12, cloakColor);
    px(g, 12, 12, cloakColor); px(g, 13, 12, cloakColor);
  }

  // === ARMS (hanging at sides) ===
  // Left arm
  px(g, 3, 14, robeColor); px(g, 2, 15, robeColor); px(g, 2, 16, robeColor);
  px(g, 2, 17, skinTone); // hand
  // Right arm
  px(g, 13, 14, robeColor); px(g, 14, 15, robeColor); px(g, 14, 16, robeColor);
  px(g, 14, 17, skinTone); // hand

  // === ARMOR (if specified) - broad chest plate ===
  if (isArmored) {
    const armorLight = lighten(armorColor, 30);
    const armorDark = darken(armorColor, 20);
    for (let y = 13; y <= 15; y++) {
      for (let x = 5; x <= 11; x++) {
        const c = (y === 14 && x === 8) ? armorLight : (x === 5 || x === 11) ? armorDark : armorColor;
        px(g, x, y, c);
      }
    }
    // Shoulder pads (wide)
    px(g, 3, 13, armorColor); px(g, 4, 13, armorLight);
    px(g, 12, 13, armorLight); px(g, 13, 13, armorColor);
  }

  // === HEAD (rows 1-11) - BIG round Pokemon head, ~45% of sprite ===
  // Large round face (wider than before)
  for (let y = 3; y <= 11; y++) {
    for (let x = 4; x <= 12; x++) {
      // Round the corners
      if (y === 3 && (x <= 5 || x >= 11)) continue;
      if (y === 4 && (x === 4 || x === 12)) continue;
      if (y === 11 && (x <= 5 || x >= 11)) continue;
      if (y === 10 && (x === 4 || x === 12)) continue;
      px(g, x, y, skinTone);
    }
  }
  // Chin/jaw shading
  px(g, 6, 11, skinDark); px(g, 7, 11, skinTone); px(g, 8, 11, skinTone); px(g, 9, 11, skinTone); px(g, 10, 11, skinDark);
  px(g, 7, 10, skinDark); px(g, 9, 10, skinDark);

  // === BIG EXPRESSIVE EYES (Pokemon style - large, high on face) ===
  // Eye whites (2px tall each for expressiveness)
  px(g, 6, 6, 0xffffff); px(g, 6, 7, 0xffffff);
  px(g, 7, 6, 0xffffff); px(g, 7, 7, 0xffffff);
  px(g, 9, 6, 0xffffff); px(g, 9, 7, 0xffffff);
  px(g, 10, 6, 0xffffff); px(g, 10, 7, 0xffffff);
  // Large pupils
  px(g, 7, 6, eyeColor); px(g, 7, 7, darken(eyeColor, 30));
  px(g, 10, 6, eyeColor); px(g, 10, 7, darken(eyeColor, 30));
  // Pupil shine (bright dot for Pokemon look)
  px(g, 6, 6, 0xffffff);
  px(g, 9, 6, 0xffffff);

  // Eyebrows (thick for expression)
  px(g, 6, 5, hairColor); px(g, 7, 5, hairColor);
  px(g, 9, 5, hairColor); px(g, 10, 5, hairColor);

  // Expression variations
  if (expression === 'brave') {
    px(g, 5, 5, hairColor); px(g, 11, 5, hairColor); // strong wide brows
    // Determined mouth
    px(g, 7, 9, darken(skinTone, 50)); px(g, 8, 9, darken(skinTone, 40)); px(g, 9, 9, darken(skinTone, 50));
  } else if (expression === 'wise') {
    // Softer brows
    px(g, 6, 5, hairDark); px(g, 10, 5, hairDark);
    // Gentle mouth
    px(g, 8, 9, darken(skinTone, 35));
  } else if (expression === 'kind') {
    // Smile
    px(g, 7, 9, darken(skinTone, 40)); px(g, 8, 9, darken(skinTone, 55)); px(g, 9, 9, darken(skinTone, 40));
    px(g, 6, 8, darken(skinTone, 25)); px(g, 10, 8, darken(skinTone, 25)); // cheek blush
  } else {
    // neutral mouth
    px(g, 8, 9, darken(skinTone, 45));
  }

  // Nose (small, cute Pokemon style)
  px(g, 8, 8, skinDark);

  // Ears
  px(g, 4, 7, skinDark); px(g, 12, 7, skinDark);

  // === HAIR (flows over big head) ===
  if (hairStyle === 'short') {
    for (let x = 5; x <= 11; x++) px(g, x, 2, hairColor);
    for (let x = 4; x <= 12; x++) px(g, x, 3, hairColor);
    px(g, 4, 4, hairColor); px(g, 5, 4, hairDark);
    px(g, 11, 4, hairDark); px(g, 12, 4, hairColor);
    px(g, 4, 5, hairDark); px(g, 12, 5, hairDark);
  } else if (hairStyle === 'long') {
    for (let x = 5; x <= 11; x++) px(g, x, 1, hairColor);
    for (let x = 4; x <= 12; x++) px(g, x, 2, hairColor);
    for (let x = 4; x <= 12; x++) px(g, x, 3, hairDark);
    px(g, 4, 4, hairColor); px(g, 12, 4, hairColor);
    px(g, 3, 5, hairDark); px(g, 4, 5, hairColor); px(g, 12, 5, hairColor); px(g, 13, 5, hairDark);
    px(g, 3, 6, hairColor); px(g, 13, 6, hairColor);
    px(g, 3, 7, hairDark); px(g, 13, 7, hairDark);
    px(g, 3, 8, hairColor); px(g, 13, 8, hairColor);
    px(g, 3, 9, hairDark); px(g, 13, 9, hairDark);
  } else if (hairStyle === 'bald') {
    for (let x = 6; x <= 10; x++) px(g, x, 2, skinLight);
    for (let x = 5; x <= 11; x++) px(g, x, 3, skinLight);
    px(g, 5, 4, skinLight); px(g, 11, 4, skinLight);
  }

  // === BEARD ===
  if (beardStyle === 'short') {
    px(g, 7, 10, hairColor); px(g, 8, 10, hairColor); px(g, 9, 10, hairColor);
    px(g, 7, 11, hairColor); px(g, 8, 11, hairColor); px(g, 9, 11, hairColor);
  } else if (beardStyle === 'long') {
    px(g, 6, 9, hairColor); px(g, 10, 9, hairColor);
    px(g, 6, 10, hairColor); px(g, 7, 10, hairColor); px(g, 8, 10, hairColor); px(g, 9, 10, hairColor); px(g, 10, 10, hairColor);
    px(g, 7, 11, hairColor); px(g, 8, 11, hairColor); px(g, 9, 11, hairColor);
    px(g, 8, 12, hairDark);
  } else if (beardStyle === 'prophet') {
    px(g, 5, 9, hairColor); px(g, 11, 9, hairColor);
    px(g, 5, 10, hairColor); px(g, 6, 10, hairColor); px(g, 7, 10, hairColor);
    px(g, 8, 10, hairColor); px(g, 9, 10, hairColor); px(g, 10, 10, hairColor); px(g, 11, 10, hairColor);
    px(g, 6, 11, hairColor); px(g, 7, 11, hairColor); px(g, 8, 11, hairColor); px(g, 9, 11, hairColor); px(g, 10, 11, hairColor);
    px(g, 7, 12, hairDark); px(g, 8, 12, hairColor); px(g, 9, 12, hairDark);
    px(g, 8, 13, hairDark);
  }

  // === HEADWEAR ===
  if (headwear === 'headband') {
    for (let x = 4; x <= 12; x++) px(g, x, 4, headwearColor);
    px(g, 3, 4, headwearColor); px(g, 13, 4, headwearColor);
  } else if (headwear === 'turban') {
    for (let x = 4; x <= 12; x++) px(g, x, 1, headwearColor);
    for (let x = 4; x <= 12; x++) px(g, x, 2, lighten(headwearColor, 15));
    for (let x = 5; x <= 11; x++) px(g, x, 3, headwearColor);
    px(g, 4, 3, darken(headwearColor, 15)); px(g, 12, 3, darken(headwearColor, 15));
    for (let x = 5; x <= 11; x++) px(g, x, 4, darken(headwearColor, 10));
  } else if (headwear === 'hood') {
    for (let x = 4; x <= 12; x++) px(g, x, 1, headwearColor);
    for (let x = 3; x <= 13; x++) px(g, x, 2, headwearColor);
    for (let x = 3; x <= 13; x++) px(g, x, 3, darken(headwearColor, 15));
    px(g, 3, 4, headwearColor); px(g, 13, 4, headwearColor);
    px(g, 3, 5, darken(headwearColor, 15)); px(g, 13, 5, darken(headwearColor, 15));
    px(g, 3, 6, headwearColor); px(g, 13, 6, headwearColor);
  }

  // === STAFF ===
  if (hasStaff) {
    for (let y = 2; y <= 22; y++) {
      px(g, 15, y, staffColor);
    }
    px(g, 15, 1, lighten(staffColor, 30));
    px(g, 14, 1, lighten(staffColor, 20));
  }

  // === SWORD ===
  if (hasSword) {
    // Sword on hip
    px(g, 14, 15, 0x8B6914); px(g, 15, 15, 0x8B6914); // hilt
    px(g, 15, 16, 0xaaaaaa); px(g, 15, 17, 0xcccccc);
    px(g, 15, 18, 0xdddddd); px(g, 15, 19, 0xcccccc);
    px(g, 15, 20, 0xbbbbbb);
  }

  // === ACCESSORY ===
  if (accessory === 'scroll') {
    px(g, 1, 15, accessoryColor); px(g, 1, 16, accessoryColor);
    px(g, 1, 17, lighten(accessoryColor, 30));
  } else if (accessory === 'plates') {
    px(g, 0, 14, accessoryColor); px(g, 1, 14, accessoryColor);
    px(g, 0, 15, darken(accessoryColor)); px(g, 1, 15, accessoryColor);
    px(g, 0, 16, accessoryColor); px(g, 1, 16, darken(accessoryColor));
    px(g, 0, 17, darken(accessoryColor)); px(g, 1, 17, accessoryColor);
  }

  g.generateTexture(key, sprW, sprH);
  g.destroy();
}

// Generate the "Doubt" enemy sprite
function generateDoubtTexture(scene, key) {
  const g = scene.make.graphics({ x: 0, y: 0, add: false });
  const sprW = 48, sprH = 56;

  // Shadowy amorphous body
  const base = 0x556677;
  const dark = 0x334455;
  const light = 0x778899;

  // Main ghostly body
  for (let y = 8; y <= 24; y++) {
    const width = Math.floor(8 + Math.sin((y - 8) / 16 * Math.PI) * 6);
    for (let x = 12 - width/2; x <= 12 + width/2; x++) {
      const wobble = Math.sin(x * 0.5 + y * 0.3) > 0 ? base : dark;
      px(g, Math.floor(x), y, wobble, 0.8);
    }
  }

  // Wisps/tendrils at bottom
  for (let t = 0; t < 5; t++) {
    const tx = 8 + t * 3;
    for (let y = 22; y <= 26; y++) {
      px(g, tx + (y % 2), y, dark, 0.4 - (y - 22) * 0.08);
    }
  }

  // Face - hollow eyes
  px(g, 10, 13, 0x000000); px(g, 11, 13, 0x000000);
  px(g, 14, 13, 0x000000); px(g, 15, 13, 0x000000);
  px(g, 10, 14, 0x111122); px(g, 11, 14, 0x000000);
  px(g, 14, 14, 0x000000); px(g, 15, 14, 0x111122);

  // Eerie glowing pupils
  px(g, 10, 13, 0x99aacc); px(g, 14, 13, 0x99aacc);

  // Gaping question-mark mouth
  px(g, 11, 17, dark); px(g, 12, 17, 0x223344); px(g, 13, 17, dark);
  px(g, 12, 18, 0x223344);
  px(g, 12, 16, light);

  // ? symbol faintly
  px(g, 12, 9, light); px(g, 13, 9, light);
  px(g, 13, 10, light); px(g, 12, 11, light);
  px(g, 12, 12, 0x000000); // gap
  // dot
  px(g, 12, 13, 0x000000);

  // Horns/dark wisps on top
  px(g, 9, 7, dark); px(g, 8, 6, dark);
  px(g, 15, 7, dark); px(g, 16, 6, dark);

  g.generateTexture(key, sprW, sprH);
  g.destroy();
}

// Draw tile-based grass area with subtle variation and tiny flowers
function drawPokemonGrass(g, x, y, w, h) {
  const tileSize = 16;
  for (let ty = 0; ty < h; ty += tileSize) {
    for (let tx = 0; tx < w; tx += tileSize) {
      // Alternate grass tile shading (checkerboard pattern)
      const isAlt = ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 2 === 0);
      const baseColor = isAlt ? COLORS.pokGrass : COLORS.pokGrassLight;
      g.fillStyle(baseColor);
      g.fillRect(x + tx, y + ty, tileSize, tileSize);

      // Subtle grass line detail (tiny darker grass blades)
      g.fillStyle(COLORS.pokGrassDark, 0.3);
      const seed = (tx * 7 + ty * 13) % 17;
      if (seed < 6) {
        g.fillRect(x + tx + 3, y + ty + 4, 1, 3);
        g.fillRect(x + tx + 8, y + ty + 2, 1, 3);
        g.fillRect(x + tx + 12, y + ty + 7, 1, 2);
      }
      if (seed > 10) {
        g.fillRect(x + tx + 5, y + ty + 10, 1, 2);
        g.fillRect(x + tx + 11, y + ty + 12, 1, 2);
      }

      // Occasional tiny flowers
      const flowerSeed = (tx * 3 + ty * 11) % 41;
      if (flowerSeed === 0) {
        g.fillStyle(COLORS.pokFlowerRed);
        g.fillRect(x + tx + 6, y + ty + 5, 3, 3);
        g.fillStyle(COLORS.pokFlowerYellow);
        g.fillRect(x + tx + 7, y + ty + 6, 1, 1);
      } else if (flowerSeed === 7) {
        g.fillStyle(COLORS.pokFlowerYellow);
        g.fillRect(x + tx + 10, y + ty + 8, 3, 3);
        g.fillStyle(0xffffff);
        g.fillRect(x + tx + 11, y + ty + 9, 1, 1);
      } else if (flowerSeed === 14) {
        g.fillStyle(COLORS.pokFlowerPink);
        g.fillRect(x + tx + 2, y + ty + 11, 3, 3);
        g.fillStyle(COLORS.pokFlowerYellow);
        g.fillRect(x + tx + 3, y + ty + 12, 1, 1);
      }
    }
  }
}

// Draw a Pokemon-style round bushy tree (top-down overworld)
function drawPokemonTree(g, x, y, scale) {
  const s = scale || 1;
  // Trunk visible below canopy
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - 3 * s, y + 10 * s, 6 * s, 14 * s);
  g.fillStyle(COLORS.pokTrunkDark);
  g.fillRect(x - 1 * s, y + 10 * s, 2 * s, 14 * s);

  // Round bushy canopy (layered circles for depth)
  // Shadow underneath
  g.fillStyle(COLORS.pokTreeDark, 0.5);
  g.fillEllipse(x + 1, y + 4 * s, 28 * s, 22 * s);

  // Main canopy (large oval)
  g.fillStyle(COLORS.pokTreeTop);
  g.fillEllipse(x, y, 26 * s, 20 * s);

  // Lighter highlights on top
  g.fillStyle(COLORS.pokGrassLight, 0.7);
  g.fillEllipse(x - 3 * s, y - 3 * s, 14 * s, 10 * s);

  // Darker bottom edge
  g.fillStyle(COLORS.pokTreeDark);
  g.fillEllipse(x + 2 * s, y + 6 * s, 18 * s, 8 * s);

  // Small highlight circle for 3D feel
  g.fillStyle(0x60c040, 0.5);
  g.fillEllipse(x - 4 * s, y - 4 * s, 8 * s, 6 * s);
}

// Draw a Pokemon-style building with sloped/colored roof
function drawPokemonBuilding(g, x, y, w, h, roofColor, wallColor) {
  roofColor = roofColor || COLORS.pokRoofRed;
  wallColor = wallColor || COLORS.pokWallLight;
  const roofH = Math.floor(h * 0.3);

  // Wall
  g.fillStyle(wallColor);
  g.fillRect(x, y + roofH, w, h - roofH);

  // Wall border/outline
  g.fillStyle(darken(wallColor, 30));
  g.fillRect(x, y + roofH, w, 2);
  g.fillRect(x, y + roofH, 2, h - roofH);
  g.fillRect(x + w - 2, y + roofH, 2, h - roofH);

  // Roof (trapezoid shape)
  g.fillStyle(roofColor);
  g.beginPath();
  g.moveTo(x - 4, y + roofH);
  g.lineTo(x + w / 2, y);
  g.lineTo(x + w + 4, y + roofH);
  g.closePath();
  g.fill();

  // Roof highlight
  g.fillStyle(lighten(roofColor, 30));
  g.beginPath();
  g.moveTo(x + 4, y + roofH - 2);
  g.lineTo(x + w / 2, y + 3);
  g.lineTo(x + w / 2 + 4, y + roofH - 2);
  g.closePath();
  g.fill();

  // Roof edge shadow
  g.fillStyle(darken(roofColor, 30));
  g.fillRect(x - 4, y + roofH - 3, w + 8, 3);

  // Windows
  const winW = Math.floor(w * 0.12);
  const winH = Math.floor(winW * 1.2);
  const winY = y + roofH + Math.floor((h - roofH) * 0.25);
  // Left window
  g.fillStyle(0x88bbdd);
  g.fillRect(x + Math.floor(w * 0.2), winY, winW, winH);
  g.fillStyle(0xaaddff, 0.5);
  g.fillRect(x + Math.floor(w * 0.2), winY, Math.floor(winW / 2), Math.floor(winH / 2));
  g.fillStyle(darken(wallColor, 40));
  g.fillRect(x + Math.floor(w * 0.2) - 1, winY - 1, winW + 2, 1);
  g.fillRect(x + Math.floor(w * 0.2) - 1, winY - 1, 1, winH + 2);
  g.fillRect(x + Math.floor(w * 0.2) + winW, winY - 1, 1, winH + 2);
  g.fillRect(x + Math.floor(w * 0.2) - 1, winY + winH, winW + 2, 1);
  // Right window
  g.fillStyle(0x88bbdd);
  g.fillRect(x + Math.floor(w * 0.65), winY, winW, winH);
  g.fillStyle(0xaaddff, 0.5);
  g.fillRect(x + Math.floor(w * 0.65), winY, Math.floor(winW / 2), Math.floor(winH / 2));
  g.fillStyle(darken(wallColor, 40));
  g.fillRect(x + Math.floor(w * 0.65) - 1, winY - 1, winW + 2, 1);
  g.fillRect(x + Math.floor(w * 0.65) - 1, winY - 1, 1, winH + 2);
  g.fillRect(x + Math.floor(w * 0.65) + winW, winY - 1, 1, winH + 2);
  g.fillRect(x + Math.floor(w * 0.65) - 1, winY + winH, winW + 2, 1);

  // Door
  const doorW = Math.floor(w * 0.18);
  const doorH = Math.floor((h - roofH) * 0.5);
  const doorX = x + Math.floor(w / 2 - doorW / 2);
  const doorY = y + h - doorH;
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(doorX, doorY, doorW, doorH);
  g.fillStyle(darken(COLORS.pokTreeTrunk, 20));
  g.fillRect(doorX, doorY, doorW, 2);
  g.fillRect(doorX, doorY, 2, doorH);
  g.fillRect(doorX + doorW - 2, doorY, 2, doorH);
  // Doorknob
  g.fillStyle(COLORS.gold);
  g.fillCircle(doorX + doorW - 4, doorY + Math.floor(doorH / 2), 2);
}

// Draw Pokemon-style dirt/sand path tiles
function drawPokemonPath(g, x, y, w, h) {
  const tileSize = 16;
  for (let ty = 0; ty < h; ty += tileSize) {
    for (let tx = 0; tx < w; tx += tileSize) {
      const isAlt = ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 2 === 0);
      g.fillStyle(isAlt ? COLORS.pokDirt : COLORS.pokDirtLight);
      g.fillRect(x + tx, y + ty, tileSize, tileSize);
      // Subtle grain
      g.fillStyle(COLORS.pokDirtDark, 0.15);
      const seed = (tx * 5 + ty * 9) % 13;
      if (seed < 4) {
        g.fillRect(x + tx + 4, y + ty + 3, 2, 1);
        g.fillRect(x + tx + 10, y + ty + 9, 2, 1);
      }
    }
  }
  // Path edge (soft grass-to-dirt transition)
  g.fillStyle(COLORS.pokGrassDark, 0.3);
  g.fillRect(x, y, w, 2);
  g.fillRect(x, y + h - 2, w, 2);
}

// Draw Pokemon-style water tiles with animated appearance
function drawPokemonWater(g, x, y, w, h) {
  const tileSize = 16;
  for (let ty = 0; ty < h; ty += tileSize) {
    for (let tx = 0; tx < w; tx += tileSize) {
      const isAlt = ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 2 === 0);
      g.fillStyle(isAlt ? COLORS.pokWater : COLORS.pokWaterDark);
      g.fillRect(x + tx, y + ty, tileSize, tileSize);
      // Wave highlight
      g.fillStyle(COLORS.pokWaterLight, 0.4);
      const waveSeed = (tx * 3 + ty * 7) % 11;
      if (waveSeed < 4) {
        g.fillRect(x + tx + 2, y + ty + 4, 6, 2);
      }
      if (waveSeed > 7) {
        g.fillRect(x + tx + 8, y + ty + 10, 5, 2);
      }
    }
  }
}

// Draw Pokemon-style fence segments
function drawPokemonFence(g, x, y, length, dir) {
  dir = dir || 'h'; // h = horizontal, v = vertical
  const postSpacing = 24;
  const postW = 4;
  const postH = 14;
  const railH = 3;

  if (dir === 'h') {
    // Horizontal fence
    // Top rail
    g.fillStyle(COLORS.pokFence);
    g.fillRect(x, y, length, railH);
    // Bottom rail
    g.fillRect(x, y + postH - railH, length, railH);
    // Posts
    g.fillStyle(COLORS.pokFenceDark);
    for (let px = 0; px < length; px += postSpacing) {
      g.fillRect(x + px, y - 2, postW, postH + 2);
    }
    // End post
    g.fillRect(x + length - postW, y - 2, postW, postH + 2);
  } else {
    // Vertical fence
    g.fillStyle(COLORS.pokFence);
    g.fillRect(x, y, railH, length);
    g.fillRect(x + postH - railH, y, railH, length);
    g.fillStyle(COLORS.pokFenceDark);
    for (let py = 0; py < length; py += postSpacing) {
      g.fillRect(x - 2, y + py, postH + 2, postW);
    }
    g.fillRect(x - 2, y + length - postW, postH + 2, postW);
  }
}

// Draw a Pokemon-style palm tree (for desert/Jerusalem scenes)
function drawPokemonPalm(g, x, y, scale) {
  const s = scale || 1;
  // Curved trunk
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - 3 * s, y + 5 * s, 6 * s, 30 * s);
  g.fillStyle(COLORS.pokTrunkDark);
  g.fillRect(x - 1 * s, y + 5 * s, 2 * s, 30 * s);
  // Trunk segments
  for (let sy = 0; sy < 30; sy += 6) {
    g.fillStyle(COLORS.pokTrunkDark, 0.3);
    g.fillRect(x - 3 * s, y + (5 + sy) * s, 6 * s, 1 * s);
  }
  // Palm fronds (round leaf clusters instead of spiky)
  const frondColor = 0x48a028;
  const frondDark = 0x307818;
  g.fillStyle(frondColor);
  // Central cluster
  g.fillEllipse(x, y, 12 * s, 8 * s);
  // Radiating fronds
  for (let f = 0; f < 6; f++) {
    const angle = (f / 6) * Math.PI * 2;
    const fx = x + Math.cos(angle) * 14 * s;
    const fy = y - 2 * s + Math.sin(angle) * 8 * s;
    g.fillStyle(f % 2 === 0 ? frondColor : frondDark);
    g.fillEllipse(fx, fy, 12 * s, 5 * s);
  }
  // Center tuft
  g.fillStyle(0x60c040);
  g.fillEllipse(x, y - 1 * s, 6 * s, 4 * s);
}

// Draw a Pokemon-style market stall
function drawPokemonStall(g, x, y, canopyColor) {
  canopyColor = canopyColor || 0xcc4444;
  const stallW = 48, stallH = 36;
  // Counter
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - stallW / 2, y, stallW, stallH * 0.5);
  g.fillStyle(COLORS.pokTrunkDark);
  g.fillRect(x - stallW / 2, y, stallW, 3);
  // Poles
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - stallW / 2, y - stallH * 0.8, 4, stallH * 0.8);
  g.fillRect(x + stallW / 2 - 4, y - stallH * 0.8, 4, stallH * 0.8);
  // Canopy (striped)
  for (let sx = 0; sx < stallW; sx += 8) {
    g.fillStyle(sx % 16 === 0 ? canopyColor : lighten(canopyColor, 40));
    g.fillRect(x - stallW / 2 + sx, y - stallH * 0.8, 8, 8);
  }
  // Items on counter
  g.fillStyle(COLORS.pokFlowerYellow);
  g.fillCircle(x - 8, y + 6, 3);
  g.fillStyle(COLORS.pokFlowerRed);
  g.fillCircle(x + 4, y + 6, 3);
  g.fillStyle(0xdd8844);
  g.fillCircle(x + 14, y + 6, 3);
}


// Draw flat-topped acacia tree (wilderness/Sinai style)
function drawAcaciaTree(g, x, y, scale) {
  const s = scale || 1;
  // Trunk (tall, thin, slightly angled)
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - 2 * s, y + 2 * s, 4 * s, 28 * s);
  g.fillStyle(COLORS.pokTrunkDark);
  g.fillRect(x - 1 * s, y + 2 * s, 2 * s, 28 * s);
  // Branch forks
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - 10 * s, y + 4 * s, 8 * s, 2 * s);
  g.fillRect(x + 2 * s, y + 4 * s, 8 * s, 2 * s);
  // Flat canopy (wide and flat, acacia signature shape)
  g.fillStyle(0x5a8a28);
  g.fillEllipse(x, y - 2 * s, 32 * s, 8 * s);
  g.fillStyle(0x487820);
  g.fillEllipse(x + 2 * s, y, 30 * s, 6 * s);
  g.fillStyle(0x6aaa38, 0.5);
  g.fillEllipse(x - 4 * s, y - 4 * s, 16 * s, 4 * s);
}

// Draw stepped pyramid/temple (Americas/Mesoamerican style)
function drawPyramid(g, x, y, w, h, color) {
  color = color || COLORS.pokStone;
  const dark = darken(color, 25);
  const light = lighten(color, 20);
  const steps = 4;
  const stepH = h / steps;
  const stepShrink = w / (steps * 2 + 1);
  for (let i = 0; i < steps; i++) {
    const sw = w - i * stepShrink * 2;
    const sx = x + i * stepShrink;
    const sy = y + (steps - 1 - i) * stepH;
    g.fillStyle(color);
    g.fillRect(sx, sy, sw, stepH + 1);
    g.fillStyle(light, 0.4);
    g.fillRect(sx, sy, sw, 2);
    g.fillStyle(dark);
    g.fillRect(sx, sy + stepH - 1, sw, 1);
    g.fillRect(sx + sw - 2, sy, 2, stepH);
  }
  // Top temple structure
  const topW = w * 0.25;
  const topX = x + w / 2 - topW / 2;
  g.fillStyle(dark);
  g.fillRect(topX, y - stepH * 0.6, topW, stepH * 0.6);
  g.fillStyle(light, 0.3);
  g.fillRect(topX, y - stepH * 0.6, topW, 2);
}

// Draw sand tiles (desert ground with variation)
function drawSandTiles(g, x, y, w, h) {
  const tileSize = 16;
  for (let ty = 0; ty < h; ty += tileSize) {
    for (let tx = 0; tx < w; tx += tileSize) {
      const isAlt = ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 2 === 0);
      g.fillStyle(isAlt ? COLORS.pokSand : COLORS.pokSandLight);
      g.fillRect(x + tx, y + ty, tileSize, tileSize);
      // Sand grain detail
      const seed = (tx * 7 + ty * 11) % 19;
      g.fillStyle(COLORS.pokSandDark, 0.2);
      if (seed < 5) {
        g.fillRect(x + tx + 3, y + ty + 5, 2, 1);
        g.fillRect(x + tx + 9, y + ty + 10, 3, 1);
      }
      if (seed > 12) {
        g.fillRect(x + tx + 6, y + ty + 2, 2, 1);
        g.fillRect(x + tx + 11, y + ty + 13, 2, 1);
      }
      // Occasional small rock
      const rockSeed = (tx * 3 + ty * 13) % 47;
      if (rockSeed === 0) {
        g.fillStyle(COLORS.pokSandDark);
        g.fillRect(x + tx + 5, y + ty + 8, 3, 2);
        g.fillStyle(COLORS.pokSand);
        g.fillRect(x + tx + 5, y + ty + 8, 2, 1);
      }
    }
  }
}

// Draw jungle grass tiles (denser, darker green for Americas)
function drawJungleGrass(g, x, y, w, h) {
  const tileSize = 16;
  for (let ty = 0; ty < h; ty += tileSize) {
    for (let tx = 0; tx < w; tx += tileSize) {
      const isAlt = ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 2 === 0);
      g.fillStyle(isAlt ? COLORS.pokJungle : 0x188820);
      g.fillRect(x + tx, y + ty, tileSize, tileSize);
      g.fillStyle(COLORS.pokJungleDark, 0.4);
      const seed = (tx * 5 + ty * 9) % 13;
      if (seed < 5) {
        g.fillRect(x + tx + 2, y + ty + 3, 1, 4);
        g.fillRect(x + tx + 7, y + ty + 1, 1, 3);
        g.fillRect(x + tx + 12, y + ty + 6, 1, 3);
      }
      if (seed > 8) {
        g.fillRect(x + tx + 4, y + ty + 9, 1, 3);
        g.fillRect(x + tx + 10, y + ty + 11, 1, 3);
      }
    }
  }
}

// Draw coastline/shore transition (grass to water or sand to water)
function drawShoreline(g, x, y, w, vertical) {
  // Draws a horizontal strip of beach/shore
  g.fillStyle(0xf0dca0, 0.8);
  g.fillRect(x, y, w, 4);
  g.fillStyle(0xe8d090, 0.6);
  g.fillRect(x, y + 4, w, 3);
  // Foam
  for (let fx = 0; fx < w; fx += 12) {
    const seed = (fx * 7 + y * 3) % 11;
    if (seed < 6) {
      g.fillStyle(0xffffff, 0.4);
      g.fillRect(x + fx + 2, y + 7, 6, 1);
    }
  }
}

// Draw Pokemon route sign
function drawRouteSign(g, x, y, text) {
  // Post
  g.fillStyle(COLORS.pokTreeTrunk);
  g.fillRect(x - 1, y, 3, 14);
  // Sign board
  g.fillStyle(0x4080b0);
  g.fillRect(x - 18, y - 2, 36, 12);
  g.fillStyle(0x3070a0);
  g.fillRect(x - 18, y - 2, 36, 2);
  g.fillStyle(0x50a0d0, 0.3);
  g.fillRect(x - 16, y, 32, 4);
}

// Draw a Pokemon-style city wall section
function drawCityWall(g, x, y, w, h, color) {
  color = color || 0xc8a868;
  const dark = darken(color, 20);
  const light = lighten(color, 15);
  g.fillStyle(color);
  g.fillRect(x, y, w, h);
  // Brick pattern
  for (let by = 0; by < h; by += 6) {
    const offset = (Math.floor(by / 6) % 2) * 8;
    for (let bx = offset; bx < w; bx += 16) {
      g.fillStyle(dark, 0.3);
      g.fillRect(x + bx, y + by, 1, 6);
      g.fillRect(x + bx, y + by + 5, 16, 1);
    }
  }
  // Top edge highlight
  g.fillStyle(light);
  g.fillRect(x, y, w, 2);
  // Crenellations
  for (let cx = 0; cx < w; cx += 12) {
    g.fillStyle(color);
    g.fillRect(x + cx, y - 5, 6, 7);
    g.fillStyle(light);
    g.fillRect(x + cx, y - 5, 6, 1);
    g.fillStyle(dark);
    g.fillRect(x + cx + 5, y - 5, 1, 7);
  }
}

// Draw golden dome temple (Jerusalem)
function drawGoldenTemple(g, x, y, w, h) {
  const wallColor = COLORS.pokWallLight;
  // Base building
  g.fillStyle(wallColor);
  g.fillRect(x, y + h * 0.35, w, h * 0.65);
  g.fillStyle(darken(wallColor, 20));
  g.fillRect(x, y + h * 0.35, w, 2);
  g.fillRect(x + w - 2, y + h * 0.35, 2, h * 0.65);
  // Columns
  for (let cx = 4; cx < w; cx += Math.floor(w / 5)) {
    g.fillStyle(0xe0d8c8);
    g.fillRect(x + cx, y + h * 0.38, 4, h * 0.58);
  }
  // Golden dome
  g.fillStyle(0xdaa520);
  g.fillEllipse(x + w / 2, y + h * 0.3, w * 0.7, h * 0.45);
  g.fillStyle(0xffd700, 0.6);
  g.fillEllipse(x + w / 2 - w * 0.1, y + h * 0.22, w * 0.35, h * 0.25);
  // Gold tip
  g.fillStyle(0xffd700);
  g.fillRect(x + w / 2 - 1, y + h * 0.08, 3, h * 0.12);
  g.fillStyle(0xffed4a);
  g.fillCircle(x + w / 2, y + h * 0.06, 3);
  // Door
  g.fillStyle(0x604020);
  g.fillRect(x + w / 2 - 4, y + h - 10, 8, 10);
}

// ============================================================
// PREMIUM SYSTEMS: Procedural Textures, Lighting, Particles, Audio
// ============================================================

function ensureCanvasTexture(scene, key, width, height, drawFn) {
  if (scene.textures.exists(key)) return key;
  const tx = scene.textures.createCanvas(key, width, height);
  const ctx = tx.getContext();
  drawFn(ctx, width, height);
  tx.refresh();
  return key;
}

// ============================================================
// PIXEL ART TILE TEXTURE SYSTEM
// Generates authentic GBA-style 16x16 tile textures via Canvas2D
// ============================================================
function hexToRGB(hex) {
  return [(hex >> 16) & 0xff, (hex >> 8) & 0xff, hex & 0xff];
}

function setPixel(imgData, x, y, w, r, g, b, a) {
  if (x < 0 || y < 0 || x >= w || y >= imgData.height) return;
  const i = (y * w + x) * 4;
  imgData.data[i] = r; imgData.data[i+1] = g; imgData.data[i+2] = b; imgData.data[i+3] = a ?? 255;
}

function mixColor(r1, g1, b1, r2, g2, b2, t) {
  return [
    Math.round(r1 + (r2 - r1) * t),
    Math.round(g1 + (g2 - g1) * t),
    Math.round(b1 + (b2 - b1) * t)
  ];
}

function generateTileTextures(scene) {
  const S = 16; // tile size

  // --- GRASS TILE (lush Pokemon GBA grass) ---
  ensureCanvasTexture(scene, 'tile_grass', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    // 2x2 tile grid for variety
    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        const isAlt = (tx + ty) % 2 === 0;
        const base = isAlt ? [88, 168, 48] : [120, 200, 80]; // pokGrass / pokGrassLight
        const dark = [56, 128, 24];
        const vdark = [40, 96, 16];

        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            // Base color with subtle noise
            const noise = ((x * 7 + y * 13 + tx * 31 + ty * 47) % 5) - 2;
            const r = Math.max(0, Math.min(255, base[0] + noise * 3));
            const g = Math.max(0, Math.min(255, base[1] + noise * 4));
            const b = Math.max(0, Math.min(255, base[2] + noise * 2));
            setPixel(img, ox + x, oy + y, w, r, g, b);
          }
        }

        // Grass blade details (darker strokes)
        const seed = tx * 17 + ty * 31;
        const bladePositions = [
          [3, 2, 1, 4], [8, 1, 1, 3], [13, 3, 1, 3],
          [5, 8, 1, 3], [10, 7, 1, 4], [2, 12, 1, 3],
          [7, 11, 1, 3], [12, 10, 1, 4], [4, 14, 1, 2],
        ];
        bladePositions.forEach(([bx, by, bw, bh], i) => {
          if ((seed + i) % 3 === 0) return; // skip some for variety
          for (let dy = 0; dy < bh; dy++) {
            setPixel(img, ox + bx, oy + by + dy, w, dark[0], dark[1], dark[2]);
          }
        });

        // Occasional flower
        const flowerSeed = (tx * 23 + ty * 41) % 7;
        if (flowerSeed === 0) {
          // Red flower
          setPixel(img, ox + 6, oy + 5, w, 240, 80, 80);
          setPixel(img, ox + 7, oy + 5, w, 240, 96, 96);
          setPixel(img, ox + 6, oy + 6, w, 220, 64, 64);
          setPixel(img, ox + 7, oy + 6, w, 248, 224, 64); // yellow center
        } else if (flowerSeed === 3) {
          // Yellow flower
          setPixel(img, ox + 10, oy + 9, w, 248, 224, 64);
          setPixel(img, ox + 11, oy + 9, w, 248, 240, 80);
          setPixel(img, ox + 10, oy + 10, w, 232, 200, 48);
          setPixel(img, ox + 11, oy + 10, w, 255, 255, 255); // white center
        }

        // Subtle tile edge shading (bottom and right edges slightly darker)
        for (let x = 0; x < S; x++) {
          setPixel(img, ox + x, oy + S - 1, w, vdark[0], vdark[1], vdark[2], 40);
        }
        for (let y = 0; y < S; y++) {
          setPixel(img, ox + S - 1, oy + y, w, vdark[0], vdark[1], vdark[2], 30);
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- SAND TILE (desert/wilderness) ---
  ensureCanvasTexture(scene, 'tile_sand', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        const isAlt = (tx + ty) % 2 === 0;
        const base = isAlt ? [232, 208, 160] : [240, 224, 184];
        const dark = [200, 176, 120];

        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            const noise = ((x * 11 + y * 7 + tx * 19 + ty * 37) % 7) - 3;
            setPixel(img, ox + x, oy + y, w,
              Math.max(0, Math.min(255, base[0] + noise * 2)),
              Math.max(0, Math.min(255, base[1] + noise * 2)),
              Math.max(0, Math.min(255, base[2] + noise * 2)));
          }
        }
        // Sand grain dots
        [[4, 3], [10, 5], [2, 9], [12, 11], [7, 14], [14, 7]].forEach(([sx, sy], i) => {
          if ((tx * 13 + ty * 7 + i) % 3 === 0) return;
          setPixel(img, ox + sx, oy + sy, w, dark[0], dark[1], dark[2], 100);
        });
        // Small pebble
        if ((tx + ty) % 3 === 0) {
          setPixel(img, ox + 8, oy + 12, w, dark[0] - 20, dark[1] - 20, dark[2] - 10);
          setPixel(img, ox + 9, oy + 12, w, dark[0], dark[1], dark[2]);
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- DIRT PATH TILE ---
  ensureCanvasTexture(scene, 'tile_dirt', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        const isAlt = (tx + ty) % 2 === 0;
        const base = isAlt ? [208, 168, 104] : [200, 160, 96];
        const light = [224, 192, 136];

        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            const noise = ((x * 5 + y * 9 + tx * 23) % 5) - 2;
            setPixel(img, ox + x, oy + y, w,
              Math.max(0, Math.min(255, base[0] + noise * 2)),
              Math.max(0, Math.min(255, base[1] + noise * 2)),
              Math.max(0, Math.min(255, base[2] + noise)));
          }
        }
        // Gravel/grain detail
        [[3, 4], [9, 2], [5, 10], [12, 8], [7, 13]].forEach(([gx, gy], i) => {
          if ((tx + i) % 2 === 0) return;
          setPixel(img, ox + gx, oy + gy, w, light[0], light[1], light[2], 150);
        });
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- WATER TILE ---
  ensureCanvasTexture(scene, 'tile_water', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        const isAlt = (tx + ty) % 2 === 0;
        const base = isAlt ? [56, 136, 240] : [32, 96, 192];
        const light = [96, 168, 255];
        const deep = [24, 56, 128];

        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            const wave = Math.sin((x + tx * 8) * 0.8 + (y + ty * 8) * 0.3) * 0.5 + 0.5;
            const c = mixColor(base[0], base[1], base[2], deep[0], deep[1], deep[2], wave * 0.3);
            setPixel(img, ox + x, oy + y, w, c[0], c[1], c[2]);
          }
        }
        // Wave highlight streaks
        const waveY = 4 + (tx * 3 + ty * 7) % 8;
        for (let x = 2 + tx * 2; x < 2 + tx * 2 + 6; x++) {
          setPixel(img, ox + x, oy + waveY, w, light[0], light[1], light[2], 120);
        }
        const waveY2 = (waveY + 7) % S;
        for (let x = 6 + ty * 3; x < 6 + ty * 3 + 5; x++) {
          if (x < S) setPixel(img, ox + x, oy + waveY2, w, light[0], light[1], light[2], 90);
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- STONE WALL TILE ---
  ensureCanvasTexture(scene, 'tile_wall', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    const base = [200, 168, 104]; // sandstone
    const mortar = [168, 140, 88];
    const light = [224, 192, 136];

    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        // Fill base
        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            const noise = ((x * 3 + y * 7 + tx * 11 + ty * 13) % 5) - 2;
            setPixel(img, ox + x, oy + y, w,
              base[0] + noise * 3, base[1] + noise * 3, base[2] + noise * 2);
          }
        }
        // Brick lines (horizontal every 5px, vertical offset by row)
        for (let y = 0; y < S; y++) {
          if (y % 5 === 0) {
            for (let x = 0; x < S; x++) {
              setPixel(img, ox + x, oy + y, w, mortar[0], mortar[1], mortar[2]);
            }
          }
          // Vertical mortar lines, offset per row
          const row = Math.floor(y / 5);
          const vOffset = (row % 2) * 8;
          if (((y % 5) !== 0) && ((y + vOffset) % 8 === 0 || ((y + vOffset + 8) % 16 === 0))) {
            // skip - too complex, just do simple verticals
          }
        }
        // Vertical mortar
        for (let row = 0; row < 3; row++) {
          const vy = row * 5 + 1;
          const vx = (row % 2 === 0) ? 7 : 0;
          for (let dy = 0; dy < 4 && vy + dy < S; dy++) {
            setPixel(img, ox + vx, oy + vy + dy, w, mortar[0], mortar[1], mortar[2]);
            if (vx + 8 < S) setPixel(img, ox + vx + 8, oy + vy + dy, w, mortar[0], mortar[1], mortar[2]);
          }
        }
        // Highlight on top edge of each brick
        for (let x = 0; x < S; x++) {
          if (x % 8 !== 0) {
            setPixel(img, ox + x, oy + 1, w, light[0], light[1], light[2], 80);
            setPixel(img, ox + x, oy + 6, w, light[0], light[1], light[2], 80);
            setPixel(img, ox + x, oy + 11, w, light[0], light[1], light[2], 80);
          }
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- JUNGLE GRASS TILE (darker, denser) ---
  ensureCanvasTexture(scene, 'tile_jungle', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        const isAlt = (tx + ty) % 2 === 0;
        const base = isAlt ? [32, 136, 40] : [24, 120, 32];
        const dark = [16, 104, 24];
        const light = [48, 168, 56];

        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            const noise = ((x * 11 + y * 5 + tx * 29) % 7) - 3;
            setPixel(img, ox + x, oy + y, w,
              Math.max(0, base[0] + noise), Math.max(0, base[1] + noise * 3), Math.max(0, base[2] + noise));
          }
        }
        // Dense grass blades
        for (let i = 0; i < 8; i++) {
          const bx = (i * 7 + tx * 3 + ty * 11) % S;
          const by = (i * 5 + tx * 7 + ty * 3) % (S - 3);
          for (let dy = 0; dy < 3 + (i % 2); dy++) {
            setPixel(img, ox + bx, oy + by + dy, w, dark[0], dark[1], dark[2]);
          }
        }
        // Light spots
        if ((tx + ty) % 2 === 0) {
          setPixel(img, ox + 5, oy + 4, w, light[0], light[1], light[2], 120);
          setPixel(img, ox + 11, oy + 10, w, light[0], light[1], light[2], 100);
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- COBBLESTONE TILE (for Jerusalem city ground) ---
  ensureCanvasTexture(scene, 'tile_cobble', S * 2, S * 2, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    for (let ty = 0; ty < 2; ty++) {
      for (let tx = 0; tx < 2; tx++) {
        const ox = tx * S, oy = ty * S;
        const base = (tx + ty) % 2 === 0 ? [192, 176, 152] : [200, 184, 160];
        for (let y = 0; y < S; y++) {
          for (let x = 0; x < S; x++) {
            const n = ((x * 7 + y * 11 + tx * 19 + ty * 23) % 7) - 3;
            setPixel(img, ox + x, oy + y, w,
              Math.max(120, base[0] + n * 2), Math.max(100, base[1] + n * 2), Math.max(80, base[2] + n * 2));
          }
        }
        // Stone borders (grid pattern for cobbles)
        for (let x = 0; x < S; x++) {
          setPixel(img, ox + x, oy, w, 160, 144, 120, 100);
          setPixel(img, ox + x, oy + 7, w, 160, 144, 120, 80);
        }
        for (let y = 0; y < S; y++) {
          const off = (ty % 2) * 4;
          setPixel(img, ox + ((3 + off) % S), oy + y, w, 160, 144, 120, 80);
          setPixel(img, ox + ((10 + off) % S), oy + y, w, 160, 144, 120, 80);
        }
        // Subtle highlight on top-left of each cobble
        setPixel(img, ox + 1, oy + 1, w, 216, 200, 176, 80);
        setPixel(img, ox + 5, oy + 1, w, 216, 200, 176, 60);
        setPixel(img, ox + 1, oy + 9, w, 216, 200, 176, 60);
        setPixel(img, ox + 8, oy + 9, w, 216, 200, 176, 60);
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- TREE SPRITE (Pokemon-style round bushy tree, 32x40) ---
  ensureCanvasTexture(scene, 'sprite_tree', 32, 40, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    // Trunk (centered, bottom)
    for (let y = 24; y < 38; y++) {
      for (let x = 13; x < 19; x++) {
        const shade = (x < 15) ? [96, 64, 32] : [136, 96, 48];
        setPixel(img, x, y, w, shade[0], shade[1], shade[2]);
      }
    }
    // Round canopy — draw filled circle
    const drawLeafCircle = (cx, cy, r, color) => {
      for (let y = cy - r; y <= cy + r; y++) {
        for (let x = cx - r; x <= cx + r; x++) {
          if ((x - cx) * (x - cx) + (y - cy) * (y - cy) <= r * r) {
            setPixel(img, x, y, w, color[0], color[1], color[2]);
          }
        }
      }
    };
    // Shadow layer
    drawLeafCircle(17, 17, 12, [40, 112, 16]);
    // Main canopy
    drawLeafCircle(16, 15, 11, [72, 160, 40]);
    // Highlight (top-left)
    drawLeafCircle(13, 12, 6, [104, 192, 64]);
    // Dark bottom edge
    drawLeafCircle(17, 20, 7, [48, 120, 24]);
    // Bright spot
    drawLeafCircle(12, 10, 3, [128, 208, 80]);
    ctx.putImageData(img, 0, 0);
  });

  // --- PALM TREE SPRITE (40x48) ---
  ensureCanvasTexture(scene, 'sprite_palm', 40, 48, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    // Trunk
    for (let y = 15; y < 46; y++) {
      const sway = Math.sin(y * 0.15) * 1.5;
      for (let dx = -2; dx <= 2; dx++) {
        const x = Math.round(20 + sway + dx);
        const shade = dx < 0 ? [96, 64, 32] : [136, 96, 48];
        setPixel(img, x, y, w, shade[0], shade[1], shade[2]);
        // Trunk rings
        if (y % 5 === 0) setPixel(img, x, y, w, 80, 56, 24);
      }
    }
    // Fronds (leaf clusters radiating from top)
    const drawFrond = (angle, len, color) => {
      for (let i = 0; i < len; i++) {
        const fx = Math.round(20 + Math.cos(angle) * i);
        const fy = Math.round(14 + Math.sin(angle) * i);
        for (let w2 = -1; w2 <= 1; w2++) {
          setPixel(img, fx + w2, fy, w, color[0], color[1], color[2]);
        }
      }
    };
    const frondColors = [[72, 160, 40], [56, 136, 32], [88, 176, 48]];
    for (let f = 0; f < 8; f++) {
      const angle = (f / 8) * Math.PI * 2 - Math.PI * 0.1;
      drawFrond(angle, 10 + (f % 3) * 2, frondColors[f % 3]);
    }
    // Center cluster
    for (let y = 12; y < 18; y++) {
      for (let x = 17; x < 23; x++) {
        if ((x - 20) * (x - 20) + (y - 15) * (y - 15) < 10) {
          setPixel(img, x, y, w, 96, 192, 56);
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  });

  // --- ACACIA TREE SPRITE (40x40) ---
  ensureCanvasTexture(scene, 'sprite_acacia', 40, 40, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    // Thin tall trunk
    for (let y = 8; y < 38; y++) {
      for (let dx = -1; dx <= 1; dx++) {
        setPixel(img, 20 + dx, y, w, dx < 0 ? 96 : 136, dx < 0 ? 64 : 96, dx < 0 ? 32 : 48);
      }
    }
    // Branch forks
    for (let x = 12; x < 20; x++) setPixel(img, x, 10, w, 112, 80, 40);
    for (let x = 20; x < 28; x++) setPixel(img, x, 10, w, 112, 80, 40);
    // Flat wide canopy (signature acacia shape)
    for (let y = 2; y < 12; y++) {
      const spread = 16 - Math.abs(y - 6) * 1.5;
      for (let x = Math.round(20 - spread); x < Math.round(20 + spread); x++) {
        if (x >= 0 && x < w) {
          const isLight = y < 5 && Math.abs(x - 20) < spread * 0.5;
          setPixel(img, x, y, w,
            isLight ? 104 : 80, isLight ? 168 : 136, isLight ? 48 : 32);
        }
      }
    }
    // Dark bottom edge of canopy
    for (let x = 10; x < 30; x++) {
      setPixel(img, x, 11, w, 48, 96, 24, 180);
    }
    ctx.putImageData(img, 0, 0);
  });
}

function generatePixelArtSprites(scene) {

  const fillRect = (img, w, x1, y1, x2, y2, r, g, b, a) => {

      for (let x = x1; x <= x2; x++)

    for (let y = 0; y < 12; y++) {

      for (let x = 16 - span; x < 16 + span; x++) {
        if (x >= 0 && x < 32) {

          setPixel(img, x, y, w, shade[0], shade[1], shade[2]);
        }
      }
    }
    // Roof ridge highlight
    for (let y = 0; y < 10; y++) setPixel(img, 16, y, w, 216, 176, 112);
    // Eave
    fillRect(img, w, 1, 12, 30, 13, 152, 112, 56);
    fillRect(img, w, 2, 12, 29, 12, 176, 136, 72);
    // Walls — cream sandstone
    for (let y = 14; y < 37; y++) {
      for (let x = 3; x < 29; x++) {
        const noise = ((x * 7 + y * 11) % 5) - 2;
        setPixel(img, x, y, w, 232 + noise, 216 + noise, 192 + noise);
      }
    }
    // Brick mortar lines
    for (let y = 17; y < 37; y += 4) {
      for (let x = 3; x < 29; x++) setPixel(img, x, y, w, 200, 184, 160, 120);
    }
    for (let row = 0; row < 5; row++) {
      const offset = (row % 2) * 6;
      for (let x = 3 + offset; x < 29; x += 12) {
        for (let dy = 0; dy < 3; dy++) {
          if (14 + row * 4 + dy < 37) setPixel(img, x, 14 + row * 4 + dy, w, 200, 184, 160, 80);
        }
      }
    }
    // Wall edges (shadow)
    for (let y = 14; y < 37; y++) {
      setPixel(img, 3, y, w, 192, 176, 148);
      setPixel(img, 28, y, w, 208, 192, 168);
    }
    // Left window
    fillRect(img, w, 7, 18, 12, 24, 96, 144, 192); // glass
    fillRect(img, w, 8, 19, 11, 20, 128, 176, 224, 180); // reflection
    fillRect(img, w, 7, 18, 12, 18, 136, 104, 64); // frame top
    fillRect(img, w, 7, 24, 12, 24, 136, 104, 64); // frame bot
    fillRect(img, w, 7, 18, 7, 24, 136, 104, 64); // frame left
    fillRect(img, w, 12, 18, 12, 24, 136, 104, 64); // frame right
    setPixel(img, 9, 21, w, 120, 88, 48); // cross bar h

    fillRect(img, w, 19, 18, 24, 18, 136, 104, 64);
    fillRect(img, w, 19, 24, 24, 24, 136, 104, 64);
    fillRect(img, w, 19, 18, 19, 24, 136, 104, 64);
    fillRect(img, w, 24, 18, 24, 24, 136, 104, 64);
    setPixel(img, 21, 21, w, 120, 88, 48);
    setPixel(img, 22, 21, w, 120, 88, 48);
    // Door

    fillRect(img, w, 14, 29, 17, 35, 88, 60, 32);
    fillRect(img, w, 13, 28, 18, 28, 80, 56, 28); // door top

  // --- SANDSTONE HOUSE 2 (32x40, blue-ish roof) ---

    const img = ctx.createImageData(w, h);

  // --- GOLDEN DOME TEMPLE (64x56) ---
  ensureCanvasTexture(scene, 'pxa_temple', 64, 56, (ctx, w, h) => {
    const img = ctx.createImageData(w, h);
    // Base building
    for (let y = 24; y < 52; y++) {
      for (let x = 6; x < 58; x++) {
        const n = ((x * 3 + y * 5) % 4) - 1;
        setPixel(img, x, y, w, 240 + n, 232 + n, 216 + n);
      }
    }
    // Columns
    for (let cx = 10; cx < 56; cx += 8) {
      for (let y = 25; y < 50; y++) {
        setPixel(img, cx, y, w, 224, 216, 200);
        setPixel(img, cx + 1, y, w, 240, 232, 216);
        setPixel(img, cx + 2, y, w, 216, 208, 192);
        // Column capital
        if (y === 25) {
          setPixel(img, cx - 1, y, w, 224, 216, 200);
          setPixel(img, cx + 3, y, w, 224, 216, 200);
        }
      }
    }
    // Entablature (horizontal beam above columns)
    fillRect(img, w, 4, 22, 59, 24, 208, 192, 168);
    fillRect(img, w, 5, 22, 58, 22, 224, 208, 184);
    // Golden dome
    for (let y = 2; y < 22; y++) {
      const radius = Math.sqrt(Math.max(0, 20 * 20 - (y - 12) * (y - 12)));
      const span = Math.floor(radius * 1.2);
      for (let x = 32 - span; x <= 32 + span; x++) {
        if (x >= 0 && x < 64) {
          const dist = Math.abs(x - 32) / (span + 1);
          const highlight = (x < 30 && y < 10) ? 30 : 0;
          const shadow = (x > 34) ? 20 : 0;
          const r = Math.min(255, 218 + highlight - shadow);
          const g = Math.min(255, 165 + highlight - shadow);
          const b = Math.min(255, 32 + highlight * 0.5);
          setPixel(img, x, y, w, r, g, b);
        }
      }
    }
    // Dome specular highlight
    for (let y = 4; y < 10; y++) {
      for (let x = 26; x < 32; x++) {
        const dist = Math.sqrt((x - 28) * (x - 28) + (y - 6) * (y - 6));
        if (dist < 5) setPixel(img, x, y, w, 255, 215, 80, Math.floor(200 - dist * 40));
      }
    }
    // Gold tip/finial
    fillRect(img, w, 31, 0, 32, 3, 255, 215, 0);
    setPixel(img, 31, 0, w, 255, 237, 80);
    setPixel(img, 32, 0, w, 255, 237, 80);
    // Door (large, ornate)
    fillRect(img, w, 27, 40, 36, 51, 120, 80, 40);
    fillRect(img, w, 28, 41, 35, 50, 96, 64, 32);
    // Door arch
    for (let x = 28; x <= 35; x++) {
      const ay = 40 - Math.floor(Math.sqrt(Math.max(0, 16 - (x - 31.5) * (x - 31.5))));
      for (let y = ay; y <= 40; y++) setPixel(img, x, y, w, 120, 80, 40);
    }
    // Gold door frame
    fillRect(img, w, 26, 38, 26, 51, 192, 160, 48);
    fillRect(img, w, 37, 38, 37, 51, 192, 160, 48);
    fillRect(img, w, 27, 38, 36, 38, 192, 160, 48);
    // Steps
    for (let step = 0; step < 3; step++) {
      fillRect(img, w, 20 - step * 3, 52 + step, 43 + step * 3, 52 + step,
        200 - step * 12, 192 - step * 12, 176 - step * 12);
    }
    // Wall shadow/edge
    for (let y = 24; y < 52; y++) {
      setPixel(img, 6, y, w, 200, 192, 176);
      setPixel(img, 57, y, w, 216, 208, 192);
    }
    ctx.putImageData(img, 0, 0);
  });

      for (let x = 10; x < 14; x++) {
        const isLeft = x < 12;

    // Trunk base
    fillRect(img, w, 9, 29, 14, 31, 80, 56, 24);
    // Round canopy layers (bottom shadow → main → highlight)
    const drawCircleFill = (cx, cy, r, cr, cg, cb) => {
      for (let y = cy - r; y <= cy + r; y++) {
        for (let x = cx - r; x <= cx + r; x++) {
          const dist = (x - cx) * (x - cx) + (y - cy) * (y - cy);
          if (dist <= r * r && x >= 0 && x < w && y >= 0 && y < h) {
            setPixel(img, x, y, w, cr, cg, cb);
          }

    // Mid highlight
    drawCircleFill(11, 11, 6, 96, 176, 56);
    // Top highlight
    drawCircleFill(10, 9, 3, 120, 200, 72);
    // Dark bottom crescent
    drawCircleFill(13, 17, 5, 48, 112, 24);
    // Individual leaf details (hand-placed pixels for texture)
    [[8, 7], [14, 6], [6, 11], [16, 10], [9, 15], [15, 14],
     [7, 9], [13, 8], [11, 5], [5, 13]].forEach(([lx, ly]) => {

function hexToCss(hex) {
  return `#${hex.toString(16).padStart(6, '0')}`;
}

function makeRadialLightTexture(scene, key, size, innerHex, outerHex, innerA = 1, outerA = 0) {
  return ensureCanvasTexture(scene, key, size, size, (ctx, w, h) => {
    ctx.clearRect(0, 0, w, h);
    const g = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w / 2);
    g.addColorStop(0, `${hexToCss(innerHex)}${Math.round(innerA * 255).toString(16).padStart(2, '0')}`);
    g.addColorStop(1, `${hexToCss(outerHex)}${Math.round(outerA * 255).toString(16).padStart(2, '0')}`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  });
}

function makeParchmentTexture(scene, key, width, height) {
  return ensureCanvasTexture(scene, key, width, height, (ctx, w, h) => {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#f6eed8';
    ctx.fillRect(0, 0, w, h);

    // Subtle fiber noise.
    for (let i = 0; i < (w * h) / 45; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const a = 0.04 + Math.random() * 0.06;
      ctx.fillStyle = `rgba(140, 110, 70, ${a.toFixed(3)})`;
      ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 2);
    }

    // Edge vignette.
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, 'rgba(90, 60, 20, 0.18)');
    g.addColorStop(0.1, 'rgba(90, 60, 20, 0)');
    g.addColorStop(0.9, 'rgba(90, 60, 20, 0)');
    g.addColorStop(1, 'rgba(90, 60, 20, 0.16)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  });
}

function makeIconTextures(scene) {
  ensureCanvasTexture(scene, 'icon_heart', 32, 32, (ctx) => {
    ctx.clearRect(0, 0, 32, 32);

    ctx.moveTo(16, 26);
    ctx.bezierCurveTo(6, 18, 4, 10, 10, 8);
    ctx.bezierCurveTo(14, 6, 16, 10, 16, 10);
    ctx.bezierCurveTo(16, 10, 18, 6, 22, 8);
    ctx.bezierCurveTo(28, 10, 26, 18, 16, 26);
    ctx.closePath();
    ctx.fill();
  });

  ensureCanvasTexture(scene, 'icon_flame', 32, 32, (ctx) => {
