// Phaser 3.60+ particle factory returns a ParticleEmitter directly.
// Keep this helper small and non-throwing so effects can never hard-crash scenes.
function createEmitterCompat(scene, x, y, key, config, depth = null) {
  const emitter = scene.add.particles(x, y, key, config);
  if (emitter && depth != null && typeof emitter.setDepth === 'function') emitter.setDepth(depth);
  return { particles: emitter, emitter };
}

const FX = {
  // Creates an overlay-based lighting rig that works with generated textures (no external assets).
  createLightingRig(scene, opts = {}) {
    const rig = { lights: [], pulse: 0, enabled: true };

    // Darkness overlay: NORMAL blend so we never fully black-screen the scene.
    // Light sprites (SCREEN blend) sit above this to "carve" brightness back in.
    rig.darkness = scene.add.rectangle(0, 0, W, H, 0x000000, 0.0)
      .setOrigin(0).setScrollFactor(0).setDepth(80);
    rig.darkness.setBlendMode(Phaser.BlendModes.NORMAL);

    const worldSpace = (opts.space || 'world') !== 'screen';
    rig.overlay = scene.add.container(0, 0).setScrollFactor(worldSpace ? 1 : 0).setDepth(81);

    rig.setAmbient = (alpha) => {
      rig.darkness.setAlpha(clamp01(alpha));
    };

    rig.addLight = (x, y, textureKey, baseScale = 1, baseAlpha = 1, flicker = 0) => {
      const spr = scene.add.image(x, y, textureKey);
      if (!worldSpace) spr.setScrollFactor(0);
      spr.setBlendMode(Phaser.BlendModes.SCREEN);
      spr.setDepth(81);
      spr.setScale(baseScale);
      spr.setAlpha(baseAlpha);
      const light = { spr, baseScale, baseAlpha, flicker, seed: Math.random() * 1000 };
      rig.lights.push(light);
      rig.overlay.add(spr);
      return light;
    };

    rig.attachWarmTo = (target, offsetX, offsetY, radiusScale = 0.45, alpha = 0.35) => {
      const spr = scene.add.image(target.x + offsetX, target.y + offsetY, 'light_warm_256')
        .setBlendMode(Phaser.BlendModes.SCREEN)
        .setDepth(target.depth + 1)
        .setScale(radiusScale)
        .setAlpha(alpha);
      if (!worldSpace) spr.setScrollFactor(0);
      const link = { spr, target, ox: offsetX, oy: offsetY };
      rig.lights.push({ spr, baseScale: radiusScale, baseAlpha: alpha, flicker: 0.12, seed: Math.random() * 1000, link });
      return spr;
    };

    rig.update = (time) => {
      if (!rig.enabled) return;
      rig.lights.forEach((l) => {
        if (l.link) {
          l.spr.x = l.link.target.x + l.link.ox;
          l.spr.y = l.link.target.y + l.link.oy;
        }
        if (l.flicker) {
          const n = Math.sin((time * 0.006) + l.seed) * 0.5 + Math.sin((time * 0.014) + l.seed * 1.7) * 0.5;
          const j = 1 + n * l.flicker;
          l.spr.setAlpha(clamp01(l.baseAlpha * j));
          l.spr.setScale(l.baseScale * (1 + (j - 1) * 0.35));
        }
      });

      if (opts.spiritualPulse) {
        const p = 0.02 + Math.max(0, Math.sin(time * 0.0015)) * 0.03;
        rig.darkness.setAlpha(clamp01(rig.darkness.alpha + p));
      }
    };

    // Default ambient tuning per scene type.
    // Tuned to avoid crushing contrast on dark palettes.
    if (opts.mode === 'night') rig.setAmbient(0.32);
    if (opts.mode === 'interior') rig.setAmbient(0.58);
    if (opts.mode === 'dream') rig.setAmbient(0.28);
    if (opts.mode === 'day') rig.setAmbient(0.12);

    return rig;
  },

  createWindDust(scene, area = { x: 0, y: 0, w: W, h: H }, intensity = 1) {
    const { particles: mgr, emitter } = createEmitterCompat(scene, 0, 0, 'particle_dot', {
      x: { min: area.x - 20, max: area.x + area.w + 20 },
      y: { min: area.y + 30, max: area.y + area.h - 40 },
      lifespan: { min: 2200, max: 3800 },
      quantity: 1,
      frequency: Math.floor(180 / Math.max(0.4, intensity)),
      speedX: { min: 35, max: 75 },
      speedY: { min: -10, max: 10 },
      scale: { start: 0.12, end: 0.0 },
      alpha: { start: 0.15, end: 0 },
      tint: 0xd7c3a3,
    }, 20);
    return { mgr, emitter };
  },

  createCampfire(scene, x, y) {
    const light = scene._lighting?.addLight(x, y + 2, 'light_warm_256', 0.55, 0.55, 0.28);
    const { particles: sparksMgr } = createEmitterCompat(scene, x, y, 'particle_spark', {
      x: x, y: y,
      lifespan: { min: 450, max: 900 },
      speedY: { min: -55, max: -95 },
      speedX: { min: -18, max: 18 },
      scale: { start: 0.25, end: 0 },
      alpha: { start: 0.8, end: 0 },
      quantity: 1,
      frequency: 60,
      blendMode: 'ADD',
      tint: [0xffdd88, 0xffaa44, 0xff6622],
    }, 25);
    const { particles: smokeMgr } = createEmitterCompat(scene, x, y - 10, 'particle_smoke', {
      x: x, y: y - 10,
      lifespan: { min: 1800, max: 2800 },
      speedY: { min: -15, max: -30 },
      speedX: { min: -8, max: 8 },
      scale: { start: 0.5, end: 1.2 },
      alpha: { start: 0.18, end: 0 },
      frequency: 140,
      tint: 0xaab6c4,
    }, 24);
    return { light, sparks: sparksMgr, smoke: smokeMgr };
  },
};

const AudioEngine = (() => {
  let ctx = null;
  let master = null;
  let musicBus = null;
  let sfxBus = null;
  let activeTheme = null;
  let themeGain = null;
  let themeInterval = null;

  function ensure() {
    if (ctx) return true;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return false;
    ctx = new Ctx();
    master = ctx.createGain();
    musicBus = ctx.createGain();
    sfxBus = ctx.createGain();
    master.gain.value = 0.9;
    musicBus.gain.value = clamp01(GameState.settings.music ?? 0.65);
    sfxBus.gain.value = clamp01(GameState.settings.sfx ?? 0.8);
    musicBus.connect(master);
    sfxBus.connect(master);
    master.connect(ctx.destination);
    return true;
  }

  function unlock() {
    if (!ensure()) return;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  }

  function setVolumes() {
    if (!ctx) return;
    musicBus.gain.value = clamp01(GameState.settings.music ?? 0.65);
    sfxBus.gain.value = clamp01(GameState.settings.sfx ?? 0.8);
  }

  function playClick() {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(660, t + 0.04);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.05, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
    o.connect(g).connect(sfxBus);
    o.start(t);
    o.stop(t + 0.08);
  }

  function playChime() {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const freqs = [880, 1320, 1760];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, t + i * 0.02);
      g.gain.setValueAtTime(0.0001, t + i * 0.02);
      g.gain.exponentialRampToValueAtTime(0.06, t + i * 0.02 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.02 + 0.35);
      o.connect(g).connect(sfxBus);
      o.start(t + i * 0.02);
      o.stop(t + i * 0.02 + 0.4);
    });
  }

  function playWhoosh() {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.25, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1200, t);
    bp.frequency.exponentialRampToValueAtTime(400, t + 0.2);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
    src.connect(bp).connect(g).connect(sfxBus);
    src.start(t);
    src.stop(t + 0.25);
  }

  function step(surface = 'sand') {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const f = surface === 'stone' ? 160 : surface === 'wood' ? 210 : surface === 'grass' ? 130 : 110;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(f * 0.6, t + 0.06);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.05, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
    o.connect(g).connect(sfxBus);
    o.start(t);
    o.stop(t + 0.09);
  }

  function stopTheme() {
    if (themeInterval) {
      clearInterval(themeInterval);
      themeInterval = null;
    }
    if (themeGain) {
      themeGain.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.2);
      themeGain = null;
    }
    activeTheme = null;
  }

  function setTheme(name) {
    if (!ensure()) return;
    if (activeTheme === name) return;

    const t0 = ctx.currentTime;
    const newGain = ctx.createGain();
    newGain.gain.setValueAtTime(0.0001, t0);
    newGain.gain.exponentialRampToValueAtTime(0.28, t0 + 2.0);
    newGain.connect(musicBus);

    // Fade out previous theme.
    if (themeGain) themeGain.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.0);
    if (themeInterval) clearInterval(themeInterval);

    activeTheme = name;
    themeGain = newGain;

    const scales = {
      jerusalem: [0, 2, 3, 7, 8, 10], // Phrygian-ish
      wilderness: [0, 3, 5, 7, 10],
      dream: [0, 2, 5, 7, 9],
      battle: [0, 2, 3, 5, 7, 8, 10],
      spiritual: [0, 5, 7, 9],
    };
    const base = name === 'battle' ? 110 : name === 'dream' ? 84 : name === 'wilderness' ? 78 : 96;
    const scale = scales[name] || scales.jerusalem;
    let stepN = 0;

    themeInterval = setInterval(() => {
      const t = ctx.currentTime;
      const degree = scale[stepN % scale.length];
      const octave = (stepN % 8 < 4) ? 0 : 1;
      const freq = base * Math.pow(2, (degree + octave * 12) / 12);

      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const f = ctx.createBiquadFilter();
      o.type = name === 'dream' ? 'sine' : 'triangle';
      o.frequency.setValueAtTime(freq, t);
      f.type = 'lowpass';
      f.frequency.setValueAtTime(name === 'battle' ? 1400 : 900, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(name === 'battle' ? 0.09 : 0.065, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (name === 'battle' ? 0.16 : 0.22));
      o.connect(f).connect(g).connect(newGain);
      o.start(t);
      o.stop(t + (name === 'battle' ? 0.18 : 0.26));

      // Simple bass pulse.
      if (stepN % 4 === 0) {
        const bo = ctx.createOscillator();
        const bg = ctx.createGain();
        bo.type = 'sine';
        bo.frequency.setValueAtTime(base / 2, t);
        bg.gain.setValueAtTime(0.0001, t);
        bg.gain.exponentialRampToValueAtTime(name === 'wilderness' ? 0.035 : 0.05, t + 0.02);
        bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
        bo.connect(bg).connect(newGain);
        bo.start(t);
        bo.stop(t + 0.26);
      }

      stepN++;
    }, name === 'battle' ? 160 : name === 'wilderness' ? 280 : 220);
  }

  return {
    unlock,
    setTheme,
    stopTheme,
    setVolumes,
    sfx: { click: playClick, chime: playChime, whoosh: playWhoosh, step },
  };
})();


function uiTextScale() {
  return GameState.settings.textSize === 'large' ? 1.15 : GameState.settings.textSize === 'small' ? 0.92 : 1;
}

function makePortraitCircle(scene, textureKey, x, y, size, depth = 210) {
  const frame = scene.add.circle(x, y, size / 2 + 2, 0x16213e, 0.75).setDepth(depth).setScrollFactor(0);
  frame.setStrokeStyle(2, COLORS.gold, 0.9);
  const img = scene.add.image(x, y, textureKey).setDepth(depth + 1).setScrollFactor(0);
  img.setScale(size / Math.max(img.width, 1));
  const maskG = scene.add.graphics().setScrollFactor(0).setDepth(depth + 2);
  maskG.fillStyle(0xffffff, 1);
  maskG.fillCircle(x, y, size / 2);
  img.setMask(maskG.createGeometryMask());
  maskG.setVisible(false);
  return { frame, img, maskG };
}

// --- HELPER: Dialogue box (premium parchment UI) ---
function showDialogue(scene, speaker, text, onComplete, optionsOrOpts) {
  AudioEngine.unlock();

  const opts = Array.isArray(optionsOrOpts) ? { choices: optionsOrOpts } : (optionsOrOpts || {});
  const portraitMap = {
    'Nephi': 'nephi', 'Lehi': 'lehi', 'Sariah': 'sariah',
    'Sam': 'sam', 'Laman': 'laman', 'Lemuel': 'lemuel',
    'Zoram': 'zoram', 'Mormon': 'mormon', 'Angel': 'angel', 'Ishmael': 'ishmael',
    'Laban': 'laban', 'Guard': 'guard', 'The Spirit': null,
    'Citizen': 'citizen_male', 'Woman': 'citizen_female', 'Elder': 'citizen_male',
    'Merchant': 'citizen_male', 'Old Woman': 'citizen_female', 'Neighbor': 'citizen_female',
    'Temple Priest': null, 'Desert Bandit': 'bandit',
    'Narrator': null,
  };
  const portraitKey = portraitMap[speaker] || null;

  if (scene._dialogueOpen) return null;
  scene._dialogueOpen = true;

  const scale = uiTextScale();
  const ui = scene.add.container(0, 0).setDepth(200).setScrollFactor(0);

  const dim = scene.add.rectangle(0, 0, W, H, 0x000000, 0.25).setOrigin(0);
  dim.setBlendMode(Phaser.BlendModes.MULTIPLY);
  ui.add(dim);

  const panel = scene.add.image(W / 2, H - 88, 'ui_parchment_wide');
  panel.setDisplaySize(W - 36, 170);
  ui.add(panel);

  const panelShadow = scene.add.rectangle(W / 2, H - 88, W - 40, 170, 0x000000, 0.18);
  panelShadow.setBlendMode(Phaser.BlendModes.MULTIPLY);
  ui.add(panelShadow);

  const goldLine = scene.add.rectangle(40, H - 168, W - 80, 2, COLORS.gold, 0.55).setOrigin(0);
  ui.add(goldLine);

  const titleFont = 'Palatino Linotype, Book Antiqua, Palatino, serif';
  const bodyFont = 'Georgia, serif';

  const name = scene.add.text(52, H - 160, speaker, {
    fontSize: `${Math.floor(18 * scale)}px`,
    fontFamily: titleFont,
    color: '#8b5a2b',
    fontStyle: 'bold',
  });
  ui.add(name);

  let portrait = null;
  const textLeft = portraitKey && scene.textures.exists(portraitKey) ? 138 : 60;
  if (portraitKey && scene.textures.exists(portraitKey)) {
    portrait = makePortraitCircle(scene, portraitKey, 88, H - 105, 72, 210);
    ui.add(portrait.frame);
    ui.add(portrait.img);
  }

  // Optional Nephi internal monologue.
  let thoughtText = null;
  if (opts.thought) {
    thoughtText = scene.add.text(60, H - 198, opts.thought, {
      fontSize: `${Math.floor(12 * scale)}px`,
      fontFamily: bodyFont,
      color: '#2f2a20',
      fontStyle: 'italic',
      alpha: 0.85,
      wordWrap: { width: W - 120 },
    });
    ui.add(thoughtText);
  }

  // Typewriter text
  const msg = scene.add.text(textLeft, H - 132, '', {
    fontSize: `${Math.floor(16 * scale)}px`,
    fontFamily: bodyFont,
    color: '#1f1a12',
    wordWrap: { width: W - textLeft - 70 },
    lineSpacing: 6,
  });
  ui.add(msg);

  const prompt = scene.add.text(W - 92, H - 28, 'Tap', {
    fontSize: `${Math.floor(12 * scale)}px`,
    fontFamily: 'monospace',
    color: '#8b5a2b',
    alpha: 0,
  });
  ui.add(prompt);

  const progressBg = scene.add.rectangle(60, H - 28, W - 150, 6, 0x000000, 0.08).setOrigin(0, 0.5);
  const progress = scene.add.rectangle(60, H - 28, 0, 6, COLORS.gold, 0.55).setOrigin(0, 0.5);
  progressBg.setVisible(false);
  progress.setVisible(false);
  ui.add(progressBg);
  ui.add(progress);

  let typing = true;
  let charIndex = 0;
  const full = String(text ?? '');
  const speed = Math.max(10, GameState.settings.textSpeedMs ?? 22);

  const typeEvt = scene.time.addEvent({
    delay: speed,
    callback: () => {
      if (charIndex < full.length) {
        charIndex++;
        msg.setText(full.substring(0, charIndex));
      } else {
        typing = false;
        typeEvt.remove(false);
        prompt.setAlpha(0.85);
        scene.tweens.add({ targets: prompt, alpha: 0.35, duration: 700, yoyo: true, repeat: -1 });

        if (GameState.settings.autoAdvance) {
          progressBg.setVisible(true);
          progress.setVisible(true);
          const dur = Math.min(6500, 1200 + full.length * 28);
          progress.width = 0;
          scene.tweens.add({
            targets: progress,
            displayWidth: W - 150,
            duration: dur,
            onComplete: () => advance(),
          });
        }
      }
    },
    loop: true,
  });

  const cleanup = () => {
    ui.destroy(true);
    if (portrait) {
      portrait.maskG.destroy();
    }
    scene._dialogueOpen = false;
  };

  const advance = () => {
    if (typing) {
      charIndex = full.length;
      msg.setText(full);
      typing = false;
      AudioEngine.sfx.click();
      return;
    }
    AudioEngine.sfx.click();
    cleanup();
    if (onComplete) onComplete();
  };

  const handlePointer = () => advance();
  const handleSpace = () => advance();

  scene.input.on('pointerdown', handlePointer);
  scene.input.keyboard.on('keydown-SPACE', handleSpace);

  // Choice prompt (replaces typewriter with options).
  if (opts.choices && opts.choices.length) {
    typeEvt.remove(false);
    typing = false;
    msg.setText(full);
    prompt.setAlpha(0);

    const choices = [];
    const baseY = H - 76;
    opts.choices.forEach((c, i) => {
      const t = scene.add.text(textLeft, baseY + i * (28 * scale), `\u25ba ${c.text}`, {
        fontSize: `${Math.floor(15 * scale)}px`,
        fontFamily: 'Georgia, serif',
        color: '#e8d8b8',
        backgroundColor: '#1a1a2e',
        padding: { x: 8, y: 4 },
      }).setScrollFactor(0).setDepth(210).setInteractive({ useHandCursor: true });
      t.on('pointerover', () => { t.setColor('#ffd700'); t.setBackgroundColor('#2a2a4e'); });
      t.on('pointerout', () => { t.setColor('#e8d8b8'); t.setBackgroundColor('#1a1a2e'); });
      t.on('pointerdown', () => {
        recordChoice({ id: c.id, label: c.text, faithVsDoubt: c.faithVsDoubt || 0, compassionVsHarshness: c.compassionVsHarshness || 0 });
        choices.forEach(ct => ct.destroy());
        cleanup();
        if (c.onSelect) c.onSelect();
        else if (onComplete) onComplete();
      });
      choices.push(t);
    });

    scene.input.off('pointerdown', handlePointer);
    scene.input.keyboard.off('keydown-SPACE', handleSpace);
    dim.setAlpha(0.35);

    // Ensure choices get cleaned up if ui is destroyed
    ui.once(Phaser.GameObjects.Events.DESTROY, () => {
      choices.forEach(ct => { if (ct.active) ct.destroy(); });
    });
    return ui;
  }

  // Ensure listeners are removed when UI is destroyed.
  ui.once(Phaser.GameObjects.Events.DESTROY, () => {
    scene.input.off('pointerdown', handlePointer);
    scene.input.keyboard.off('keydown-SPACE', handleSpace);
  });

  return ui;
}

  // Burst particles
  const { particles: burst, emitter: burstEmitter } = createEmitterCompat(scene, W / 2, H - 30, 'particle_spark', {
    speed: { min: 80, max: 220 },

    lifespan: { min: 450, max: 900 },

    alpha: { start: 1, end: 0 },
    quantity: 18,
    blendMode: 'ADD',
    tint: [0xffe066, 0xffd27a, 0xffffff],
  }, 221);
  if (burstEmitter && typeof burstEmitter.explode === 'function') burstEmitter.explode(22, W / 2, H - 40);

  AudioEngine.sfx.chime();

  scene.tweens.add({
    targets: [panel, outline, title, refText, verse, quill],
    y: '-=190',

    ease: 'Cubic.easeOut',

  let dismissed = false;

    if (dismissed) return;
    dismissed = true;
    toast.destroy(true);
    burst.destroy();
    if (onDone) onDone();
  };

  scene.time.delayedCall(4000, dismiss);
  scene.input.once('pointerdown', dismiss);
}

  root.add(dayNightIcon);

  const scr = scene.add.text(W - 232, 38, '', { fontSize: `${Math.floor(11 * scale)}px`, fontFamily: 'monospace', color: '#2a241b' });

  hud.setObjective = (x, y) => { hud.objective = { x, y }; };

  hud.update = (player, surfaceHint = 'sand') => {
    const hpRatio = clamp01(GameState.faith / Math.max(1, GameState.maxFaith));
    hpFill.displayWidth = 160 * hpRatio;
    hpNum.setText(`${GameState.faith}/${GameState.maxFaith}`);

    const fpRatio = clamp01(GameState.faithPoints / Math.max(1, GameState.fpToNext));
    fpFill.displayWidth = 160 * fpRatio;
    lvText.setText(`Lv.${GameState.level}`);
    hud.scriptureText.setText(`\uD83D\uDCDC ${GameState.scriptures.length}`);

    // Liahona behavior: low faith spins, high faith points true (if objective known).
    const low = hpRatio < 0.35;
    if (low) {
      hud.compass.spin += 0.03;
      needle.rotation = hud.compass.spin;
      needle.fillColor = 0xd0b070;
    } else if (hud.objective && player) {
      const dx = hud.objective.x - player.x;
      const dy = hud.objective.y - player.y;
      const ang = Math.atan2(dy, dx) + Math.PI / 2;
      needle.rotation = ang;
      needle.fillColor = hpRatio > 0.75 ? COLORS.gold : 0xd0b070;
    } else {
      needle.rotation *= 0.92;
    }

    const isNight = (GameState.time.t < 0.25 || GameState.time.t > 0.75);
    hud.dayNightIcon.setTexture(isNight ? 'light_cool_256' : 'light_gold_256');
    hud.dayNightIcon.setAlpha(isNight ? 0.7 : 0.85);
  };

  return hud;
}

      fontSize: `${Math.floor(11 * scale)}px`,
      fontFamily: 'monospace',
      color: t === activeTab ? '#8b5a2b' : '#3b3428',
      fontStyle: 'bold',
    }).setInteractive({ useHandCursor: true });
    tt.on('pointerdown', () => {
      AudioEngine.sfx.click();
      activeTab = t;
      tabTexts.forEach(o => o.setColor(o.text === activeTab ? '#8b5a2b' : '#3b3428'));
      updateContent();
    });
    tabTexts.push(tt);
    root.add(tt);
  });

  // Settings quick buttons (only visible on Settings tab, but low cost to always show).
  const btns = [];
  const addBtn = (x, y, label, onClick) => {
    const r = scene.add.rectangle(x, y, 210, 34, 0x16213e, 0.65).setStrokeStyle(1, COLORS.gold, 0.45)
      .setInteractive({ useHandCursor: true });
    const tx = scene.add.text(x, y, label, { fontSize: `${Math.floor(12 * scale)}px`, fontFamily: 'monospace', color: '#ffffff' }).setOrigin(0.5);
    r.on('pointerover', () => r.setFillStyle(0x223055, 0.8));
    r.on('pointerout', () => r.setFillStyle(0x16213e, 0.65));
    r.on('pointerdown', () => { AudioEngine.sfx.click(); onClick(); updateContent(); saveGame({ paused: true }); });
    btns.push(r, tx);
    root.add(r); root.add(tx);
  };

  const baseX = W + 160;
  const baseY = H / 2 + 130;
  addBtn(baseX - 120, baseY, 'Difficulty', () => {
    const d = GameState.settings.difficulty;
    GameState.settings.difficulty = d === 'explorer' ? 'disciple' : d === 'disciple' ? 'warrior' : 'explorer';
  });
  addBtn(baseX + 120, baseY, 'Text Size', () => {
    const t = GameState.settings.textSize;
    GameState.settings.textSize = t === 'small' ? 'medium' : t === 'medium' ? 'large' : 'small';
  });
  addBtn(baseX - 120, baseY + 44, 'Music +/-', () => {
    GameState.settings.music = clamp01((GameState.settings.music ?? 0.65) + 0.1);
    if (GameState.settings.music > 0.95) GameState.settings.music = 0.25;
    AudioEngine.setVolumes();
  });
  addBtn(baseX + 120, baseY + 44, 'SFX +/-', () => {
    GameState.settings.sfx = clamp01((GameState.settings.sfx ?? 0.8) + 0.1);
    if (GameState.settings.sfx > 0.95) GameState.settings.sfx = 0.25;
    AudioEngine.setVolumes();
  });
  addBtn(baseX - 120, baseY + 88, 'Type Speed', () => {
    const v = GameState.settings.textSpeedMs ?? 22;
    GameState.settings.textSpeedMs = v === 32 ? 22 : v === 22 ? 14 : 32;
  });
  addBtn(baseX + 120, baseY + 88, 'Auto-Advance', () => {
    GameState.settings.autoAdvance = !GameState.settings.autoAdvance;
  });

  const closeHint = scene.add.text(W + 40, H / 2 + 190, 'Esc: close', {
    fontSize: `${Math.floor(11 * scale)}px`,
    fontFamily: 'monospace',
    color: '#3b3428',
    alpha: 0.8,
  });
  root.add(closeHint);

  const openMenu = () => {
    if (menu.open) return;
    menu.open = true;
    root.setVisible(true);
    updateContent();
    scene._pauseOpen = true;
    scene.tweens.add({ targets: [panel, border, lantern, title, content, closeHint, ...tabTexts, ...btns], x: '-=560', duration: 350, ease: 'Cubic.easeOut' });
  };

  const closeMenu = () => {
    if (!menu.open) return;
    menu.open = false;
    scene._pauseOpen = false;
    scene.tweens.add({
      targets: [panel, border, lantern, title, content, closeHint, ...tabTexts, ...btns],
      x: '+=560',
      duration: 260,
      ease: 'Cubic.easeIn',
      onComplete: () => root.setVisible(false),
    });
  };

  const esc = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
  esc.on('down', () => {
    AudioEngine.unlock();
    if (menu.open) closeMenu();
    else openMenu();
  });

  dim.setInteractive();
  dim.on('pointerdown', () => { if (menu.open) closeMenu(); });

  menu.openMenu = openMenu;
  menu.closeMenu = closeMenu;
  return menu;
}

class BootScene extends Phaser.Scene {

    }).setOrigin(0.5);

// ============================================================
// SCENE: CINEMATIC INTRO — Pokemon-style fast, punchy, visual
// ============================================================
class CinematicIntro extends Phaser.Scene {
  constructor() { super('CinematicIntro'); }

  create() {
    this.phase = 0;
    this.items = [];
    AudioEngine.setTheme('spiritual');
    this.runPanel(0);

    // SKIP button
    this.skipText = this.add.text(W - 20, H - 20, 'SKIP >', {
      fontSize: '12px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(1, 1).setDepth(1000).setInteractive();
    this.skipText.on('pointerdown', () => this.scene.start('Title'));
    this.skipText.on('pointerover', () => this.skipText.setColor('#ffffff'));
    this.skipText.on('pointerout', () => this.skipText.setColor('#aaaaaa'));

    // Click/Space to advance panels (TASK 3)
    this._skipHandler = () => {
      if (this.phase < 4) { // panels 0-3 are auto-advancing
        if (this.autoTimer) this.autoTimer.remove();
        this.runPanel(this.phase + 1);
      }
    };
    this.input.on('pointerdown', this._skipHandler);
    this.input.keyboard.on('keydown-SPACE', this._skipHandler);
  }

  clearPanel() {
    this.items.forEach(o => { if (o && o.destroy) o.destroy(); });
    this.items = [];
  }

  add2(obj) { this.items.push(obj); return obj; }

  runPanel(n) {
    this.phase = n;
    this.clearPanel();
    if (n < 4 && this.skipText) this.skipText.setVisible(true);
    else if (this.skipText) this.skipText.setVisible(false);
    const panels = [this.panel1, this.panel2, this.panel3, this.panel4, this.panel5];
    if (panels[n]) panels[n].call(this);
  }

  advance(delay) {
    this.autoTimer = this.time.delayedCall(delay, () => this.runPanel(this.phase + 1));
    this.items.push({ destroy: () => { if (this.autoTimer) this.autoTimer.remove(); } });
  }

  // Panel 1 (4s): "The Land" — Pokemon world intro, bright and lush
  panel1() {
    const bg = this.add2(this.add.graphics());
    // Bright Pokemon sky
    bg.fillStyle(0x68b8f8); bg.fillRect(0, 0, W, 260);
    bg.fillStyle(0x88d0ff); bg.fillRect(0, 0, W, 130);
    bg.fillStyle(0xa8e0ff); bg.fillRect(0, 0, W, 65);

    // Sun
    this.add2(this.add.circle(W - 90, 70, 28, 0xfff870));
    this.add2(this.add.circle(W - 90, 70, 22, 0xffff98, 0.6));

    // Pokemon clouds scrolling left
    const drawCloud = (cx, cy, s) => {
      const cg = this.add2(this.add.graphics());
      cg.fillStyle(0xffffff, 0.9);
      cg.fillEllipse(cx, cy, 60 * s, 24 * s);
      cg.fillEllipse(cx - 18 * s, cy - 6 * s, 36 * s, 20 * s);
      cg.fillEllipse(cx + 14 * s, cy - 4 * s, 40 * s, 18 * s);
      this.tweens.add({ targets: cg, x: -60, duration: 4000, ease: 'Linear' });
    };
    drawCloud(120, 55, 1.2); drawCloud(380, 40, 1); drawCloud(600, 70, 0.8); drawCloud(750, 45, 0.6);

    // Rolling green hills (parallax — fast)
    const hills = this.add2(this.add.graphics());
    hills.fillStyle(0x68b058, 0.7);
    hills.beginPath(); hills.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) hills.lineTo(x, 340 + Math.sin(x * 0.006) * 30 + Math.sin(x * 0.015) * 12);
    hills.lineTo(W, H); hills.closePath(); hills.fill();
    hills.fillStyle(0x58a840);
    hills.beginPath(); hills.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) hills.lineTo(x, 380 + Math.sin(x * 0.01 + 1) * 20 + Math.sin(x * 0.022) * 8);
    hills.lineTo(W, H); hills.closePath(); hills.fill();

    // Pokemon tile grass
    const grassG = this.add2(this.add.graphics());
    drawPokemonGrass(grassG, 0, 400, W, H - 400);

    // Dirt path
    const pathG = this.add2(this.add.graphics());
    drawPokemonPath(pathG, 0, 440, W, 32);

    // Pokemon trees at various depths (scroll in from right)
    const treeG = this.add2(this.add.graphics());
    [80, 200, 380, 560, 720].forEach((tx, i) => {
      drawPokemonTree(treeG, tx, 400, 1.0 + (i % 2) * 0.3);
    });
    treeG.x = 100;
    this.tweens.add({ targets: treeG, x: 0, duration: 3500, ease: 'Sine.easeOut' });

    // Pokemon buildings in the distance
    const bldgG = this.add2(this.add.graphics());
    drawPokemonBuilding(bldgG, 280, 350, 50, 45, COLORS.pokRoofRed, COLORS.pokWallLight);
    drawPokemonBuilding(bldgG, 360, 343, 45, 50, COLORS.pokRoofBlue, COLORS.pokWallCream);
    drawPokemonBuilding(bldgG, 430, 352, 40, 42, 0xd08040, COLORS.pokWallLight);

    // Palm trees for Middle-East flavor
    const palmG = this.add2(this.add.graphics());
    drawPokemonPalm(palmG, 150, 400, 1.1);
    drawPokemonPalm(palmG, 650, 395, 1.2);

    // Text: fade in fast
    const txt = this.add2(this.add.text(W / 2, 280, 'Long ago, in the land of Jerusalem...', {
      fontSize: '22px', fontFamily: 'Georgia, serif', color: '#ffffff', fontStyle: 'bold',
      stroke: '#2060a0', strokeThickness: 4
    }).setOrigin(0.5).setAlpha(0));
    this.tweens.add({ targets: txt, alpha: 1, duration: 600, delay: 300 });

    // Quick pan hint — scroll grass left slightly
    this.tweens.add({ targets: grassG, x: -30, duration: 4000, ease: 'Linear' });

    this.advance(4000);
  }

  // Panel 2 (4s): "The Prophet" — Night sky, Lehi + family, vision flash
  panel2() {
    AudioEngine.setTheme('jerusalem');
    const bg = this.add2(this.add.graphics());
    // Night sky
    bg.fillStyle(0x0a1030); bg.fillRect(0, 0, W, H);
    bg.fillStyle(0x182848); bg.fillRect(0, 0, W, 300);

    // Stars (many, twinkling fast)
    for (let i = 0; i < 50; i++) {
      const star = this.add2(this.add.circle(
        Phaser.Math.Between(0, W), Phaser.Math.Between(0, 250),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.3, 0.9)
      ));
      this.tweens.add({ targets: star, alpha: 0.15, duration: Phaser.Math.Between(400, 1200), yoyo: true, repeat: -1 });
    }
    // Moon
    this.add2(this.add.circle(640, 60, 18, 0xf0f0d0, 0.8));
    this.add2(this.add.circle(645, 57, 14, 0xf8f8e8, 0.5));

    // Jerusalem silhouette at bottom
    const cityG = this.add2(this.add.graphics());
    cityG.fillStyle(0x111828);
    // Skyline blocks
    [[-20,300,60,100],[50,280,50,120],[110,300,40,100],[160,270,55,130],[230,290,45,110],
     [290,310,40,90],[340,275,50,125],[400,295,45,105],[460,310,35,90],[510,280,50,120],
     [570,300,45,100],[630,285,40,115],[680,310,50,90],[740,295,45,105]].forEach(([x,y,w,h]) => {
      cityG.fillRect(x, y, w, h);
    });
    // Ground
    cityG.fillStyle(0x1a1228);
    cityG.fillRect(0, 380, W, H - 380);

    // Lehi sprite (large, center) — slides up
    if (this.textures.exists('lehi')) {
      const lehi = this.add2(this.add.image(W / 2, H * 0.72, 'lehi').setScale(4).setDepth(10));
      lehi.y = H * 0.85;
      this.tweens.add({ targets: lehi, y: H * 0.58, duration: 800, ease: 'Back.easeOut' });
    }

    // Family sprites fade in around Lehi
    const familySprites = ['sariah', 'nephi', 'sam', 'laman'];
    const familyX = [W/2 - 80, W/2 + 80, W/2 - 50, W/2 + 50];
    const familyY = [H * 0.68, H * 0.68, H * 0.72, H * 0.72];
    familySprites.forEach((key, i) => {
      if (this.textures.exists(key)) {
        const spr = this.add2(this.add.image(familyX[i], familyY[i], key).setScale(2.5).setDepth(9).setAlpha(0));
        this.tweens.add({ targets: spr, alpha: 1, duration: 400, delay: 800 + i * 150 });
      }
    });

    // Text
    const txt = this.add2(this.add.text(W / 2, 160, 'A prophet named Lehi was warned\nby God to flee into the wilderness...', {
      fontSize: '18px', fontFamily: 'Georgia, serif', color: '#ffe088', fontStyle: 'italic',
      align: 'center', lineSpacing: 6, stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setAlpha(0));
    this.tweens.add({ targets: txt, alpha: 1, duration: 500, delay: 200 });

    // Vision flash at end of panel
    this.time.delayedCall(3200, () => {
      if (this.phase !== 1) return;
      this.cameras.main.flash(400, 255, 240, 180);
      AudioEngine.sfx.chime();
    });

    this.advance(4000);
  }

  // Panel 3 (4s): "The Record" — Gold plates, heavy glow, impressive
  panel3() {
    AudioEngine.setTheme('spiritual');
    const bg = this.add2(this.add.graphics());
    bg.fillStyle(0x0a0808); bg.fillRect(0, 0, W, H);

    // Dark radial vignette
    bg.fillStyle(0x1a1208, 0.5);
    bg.fillRect(0, H * 0.7, W, H * 0.3);

    // Gold plates — built with detail
    const plateContainer = this.add2(this.add.container(W / 2, H + 80));
    const pg = this.make.graphics();
    // Main plate body
    pg.fillStyle(0xd4a017); pg.fillRoundedRect(-45, -65, 90, 130, 4);
    pg.lineStyle(2, 0xb8860b); pg.strokeRoundedRect(-45, -65, 90, 130, 4);
    // Binding rings on left
    pg.fillStyle(0xc89810);
    for (let ry = -50; ry <= 40; ry += 18) {
      pg.fillCircle(-45, ry, 5);
      pg.fillStyle(0xa07808); pg.fillCircle(-45, ry, 3);
      pg.fillStyle(0xc89810);
    }
    // Engraved text lines (reformed Egyptian look)
    for (let row = 0; row < 7; row++) {
      for (let col = 0; col < 4; col++) {
        pg.fillStyle(0xb8860b, 0.7);
        const lw = 6 + Math.sin(row * 3 + col * 7) * 4;
        pg.fillRect(-30 + col * 20, -50 + row * 17, lw, 3);
      }
    }
    // Highlight shimmer stripe
    pg.fillStyle(0xffe088, 0.15);
    pg.fillRect(-20, -65, 15, 130);
    pg.generateTexture('_introplates', 100, 140);
    const plateImg = this.make.image({ x: 0, y: 0, key: '_introplates', add: false });
    plateContainer.add(plateImg);
    plateContainer.setScale(1.5);
    plateContainer.setDepth(5);

    // Plates rise from below with bounce
    this.tweens.add({ targets: plateContainer, y: H * 0.38, duration: 1200, ease: 'Back.easeOut' });

    // HEAVY golden glow behind plates
    if (this.textures.exists('light_gold_256')) {
      const glow1 = this.add2(this.add.image(W/2, H*0.38, 'light_gold_256').setScale(3.5).setAlpha(0).setBlendMode('ADD').setDepth(3));
      this.tweens.add({ targets: glow1, alpha: 0.5, duration: 1000, delay: 400 });
      const glow2 = this.add2(this.add.image(W/2, H*0.38, 'light_gold_256').setScale(2).setAlpha(0).setBlendMode('ADD').setDepth(4));
      this.tweens.add({ targets: glow2, alpha: 0.3, duration: 800, delay: 600 });
    }

    // Heavy gold particles rising
    const pe = createEmitterCompat(this, W/2, H*0.5, 'particle_spark', {
      speed: { min: 20, max: 70 }, angle: { min: 240, max: 300 }, alpha: { start: 0.9, end: 0 },
      scale: { start: 0.5, end: 0 }, lifespan: 2000, quantity: 2, frequency: 80, blendMode: 'ADD',
      tint: [0xffd700, 0xffe066, 0xffaa44],
      emitZone: { type: 'random', source: new Phaser.Geom.Rectangle(-80, -30, 160, 60) }
    }, 6);
    this.items.push(pe.emitter);

    // Text — punchy, fast
    const txt = this.add2(this.add.text(W / 2, H * 0.72, 'Their story was written on plates of gold.', {
      fontSize: '20px', fontFamily: 'Georgia, serif', color: '#ffd700', fontStyle: 'bold',
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setAlpha(0));
    this.tweens.add({ targets: txt, alpha: 1, duration: 500, delay: 800 });

    // Quick chime
    this.time.delayedCall(500, () => AudioEngine.sfx.chime());

    this.advance(4000);
  }

  // Panel 4 (4s): "The Hero" — Nephi reveal, dramatic, hype
  panel4() {
    const bg = this.add2(this.add.graphics());
    // Dramatic gradient sky (sunrise behind mountains)
    bg.fillStyle(0x1a2a4a); bg.fillRect(0, 0, W, H);
    bg.fillStyle(0x2a4a6a); bg.fillRect(0, 0, W, 300);
    bg.fillStyle(0x4a6a8a, 0.5); bg.fillRect(0, 200, W, 100);
    // Golden light rays from center

      const ray1 = this.add2(this.add.image(W/2, H*0.5, 'light_gold_256').setScale(5).setAlpha(0.08).setBlendMode('ADD'));
      const ray2 = this.add2(this.add.image(W/2, H*0.3, 'light_gold_256').setScale(3).setAlpha(0.12).setBlendMode('ADD'));
      this.tweens.add({ targets: ray1, alpha: 0.15, scaleX: 6, duration: 3000 });
      this.tweens.add({ targets: ray2, alpha: 0.2, duration: 2000 });

    // Mountain silhouettes
    const mtns = this.add2(this.add.graphics());
    mtns.fillStyle(0x0a1828);

    }).setOrigin(0.5).setAlpha(0).setScale(0.5));
    this.tweens.add({ targets: yourStory, alpha: 1, scaleX: 1, scaleY: 1, duration: 500, delay: 1800, ease: 'Back.easeOut' });

    // Flash transition at end
    this.time.delayedCall(3500, () => {
      if (this.phase !== 3) return;
      this.cameras.main.flash(300, 255, 255, 255);
    });

    this.advance(4000);

    }).setOrigin(0.5).setAlpha(0));

    }).setOrigin(0.5).setAlpha(0));

    }).setOrigin(0.5).setAlpha(0));

      tint: [0xffd700, 0xffe066, 0xffaa44],

// ============================================================
// SCENE: CHARACTER CREATE
// ============================================================
class CharacterCreateScene extends Phaser.Scene {
  constructor() { super('CharacterCreate'); }

  create() {
    this.cameras.main.fadeIn(500, 0, 0, 0);
    this.add.rectangle(W/2, H/2, W, H, 0xf5f0e1);

    const options = {
      skinTone:  { values: [0xfce4c7, 0xe8c8a0, 0xd4a574, 0xc49a6c, 0x8d5524, 0x5c3a1a], idx: 2, type: 'color' },
      hairColor: { values: [0x1a1208, 0x3d2b1f, 0x8b4513, 0xdaa520, 0xaaaaaa, 0xffffff], idx: 1, type: 'color' },
      hairStyle: { values: ['short', 'long', 'bald'], idx: 0, type: 'text' },
      beardStyle:{ values: ['none', 'short', 'long', 'prophet'], idx: 0, type: 'text' },
      robeColor: { values: [0x5b8c5a, 0x2c6fbb, 0x8b2500, 0x6b4e8a, 0x8b7355, 0xb87333, 0xd4a574], idx: 0, type: 'color' },
      headwear:  { values: ['none', 'headband', 'turban', 'hood'], idx: 1, type: 'text' },
    };

    const labels = { skinTone: 'Skin Tone', hairColor: 'Hair Color', hairStyle: 'Hair Style', beardStyle: 'Beard', robeColor: 'Robe Color', headwear: 'Headwear' };
    const keys = Object.keys(options);
    const rowH = 52;
    const startY = 80;

    this.add.text(W/2, 30, 'CUSTOMIZE NEPHI', {
      fontSize: '24px', fontFamily: 'monospace', color: '#5a3a1a', fontStyle: 'bold'
    }).setOrigin(0.5);

    const displayElements = {};

    const updatePreview = () => {
      const app = {
        skinTone: options.skinTone.values[options.skinTone.idx],
        hairColor: options.hairColor.values[options.hairColor.idx],
        hairStyle: options.hairStyle.values[options.hairStyle.idx],
        beardStyle: options.beardStyle.values[options.beardStyle.idx],
        robeColor: options.robeColor.values[options.robeColor.idx],
        robeAccent: darken(options.robeColor.values[options.robeColor.idx], 30),
        headwear: options.headwear.values[options.headwear.idx],
        headwearColor: 0x8B7355,
        expression: 'brave',
      };
      if (this.textures.exists('nephi_preview')) this.textures.remove('nephi_preview');
      generateCharacterTexture(this, 'nephi_preview', app);
      if (this.previewSprite) this.previewSprite.destroy();
      this.previewSprite = this.add.image(W - 140, 250, 'nephi_preview').setScale(6);

      // Update display elements
      keys.forEach(k => {
        const opt = options[k];
        const el = displayElements[k];
        if (!el) return;
        if (opt.type === 'color') {
          el.swatch.setFillStyle(opt.values[opt.idx]);
        } else {
          el.label.setText(opt.values[opt.idx].toUpperCase());
        }
      });
    };

    keys.forEach((k, i) => {
      const y = startY + i * rowH;
      const opt = options[k];

      this.add.text(60, y, labels[k], {
        fontSize: '14px', fontFamily: 'monospace', color: '#5a3a1a', fontStyle: 'bold'
      }).setOrigin(0, 0.5);

      // Left arrow
      const leftBtn = this.add.text(220, y, '\u25C0', {
        fontSize: '20px', fontFamily: 'monospace', color: '#5a3a1a'
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      leftBtn.on('pointerdown', () => {
        opt.idx = (opt.idx - 1 + opt.values.length) % opt.values.length;
        updatePreview();
      });

      // Right arrow
      const rightBtn = this.add.text(380, y, '\u25B6', {
        fontSize: '20px', fontFamily: 'monospace', color: '#5a3a1a'
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      rightBtn.on('pointerdown', () => {
        opt.idx = (opt.idx + 1) % opt.values.length;
        updatePreview();
      });

      // Display: swatch or text
      if (opt.type === 'color') {
        const swatch = this.add.rectangle(300, y, 40, 24, opt.values[opt.idx])
          .setStrokeStyle(1, 0x5a3a1a);
        displayElements[k] = { swatch };
      } else {
        const lbl = this.add.text(300, y, opt.values[opt.idx].toUpperCase(), {
          fontSize: '13px', fontFamily: 'monospace', color: '#3a2a1a'
        }).setOrigin(0.5);
        displayElements[k] = { label: lbl };
      }
    });

    // Preview label
    this.add.text(W - 140, 140, 'PREVIEW', {
      fontSize: '12px', fontFamily: 'monospace', color: '#8a7a5a'
    }).setOrigin(0.5);

    updatePreview();

    // BEGIN JOURNEY button
    const btnY = H - 60;
    const beginBtn = this.add.rectangle(W/2, btnY, 360, 50, 0x2d7a1e, 0.9)
      .setStrokeStyle(2, 0x1a5c10).setInteractive({ useHandCursor: true });
    this.add.text(W/2, btnY, 'BEGIN JOURNEY', {
      fontSize: '22px', fontFamily: 'monospace', color: '#ffffff', fontStyle: 'bold',
      stroke: '#1a4a0e', strokeThickness: 2
    }).setOrigin(0.5);
    beginBtn.on('pointerover', () => beginBtn.setFillStyle(0x3a9e2b, 0.95));
    beginBtn.on('pointerout', () => beginBtn.setFillStyle(0x2d7a1e, 0.9));

    beginBtn.on('pointerdown', () => {
      // Save appearance to GameState
      GameState.playerAppearance = {
        skinTone: options.skinTone.values[options.skinTone.idx],
        hairColor: options.hairColor.values[options.hairColor.idx],
        hairStyle: options.hairStyle.values[options.hairStyle.idx],
        beardStyle: options.beardStyle.values[options.beardStyle.idx],
        robeColor: options.robeColor.values[options.robeColor.idx],
        robeAccent: darken(options.robeColor.values[options.robeColor.idx], 30),
        headwear: options.headwear.values[options.headwear.idx],
        headwearColor: 0x8B7355,
        expression: 'brave',
      };

      // Regenerate player textures with chosen appearance
      if (this.textures.exists('nephi')) this.textures.remove('nephi');
      if (this.textures.exists('nephi_battle')) this.textures.remove('nephi_battle');
      generateCharacterTexture(this, 'nephi', GameState.playerAppearance);
      generateCharacterTexture(this, 'nephi_battle', GameState.playerAppearance);

      saveGame({ scene: 'WorldMap' });
      AudioEngine.sfx.click();
      this.cameras.main.fadeOut(500, 0, 0, 0);
      this.time.delayedCall(500, () => this.scene.start('WorldMap'));
    });
  }
}


// ============================================================
// SCENE: WORLD MAP
// ============================================================
class WorldMapScene extends Phaser.Scene {
  constructor() { super('WorldMap'); }

  create() {
    AudioEngine.setTheme('jerusalem');
    this.cameras.main.fadeIn(500);

    // ── HELPERS ──
    const fillPoly = (g, pts, color, alpha) => {
      g.fillStyle(color, alpha ?? 1);
      g.beginPath(); g.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
      g.closePath(); g.fill();
    };
    const seeded = (x, y, m) => ((x * 2654435761 + y * 340573321) >>> 0) % m;

    // 3-panel layout matching reference: Wilderness | Canaan | Americas
    const panelW = Math.floor(W / 3);

    // ================================================================
    // LAYER 0 — OCEAN BACKGROUND (dark blue behind everything)
    // ================================================================
    const ocean = this.add.graphics();
    // Deep ocean gradient
    const oceanBands = [0x2060a0, 0x1850a0, 0x183880, 0x102860, 0x0a2050];
    const bandH = Math.ceil(H / oceanBands.length);
    oceanBands.forEach((c, i) => { ocean.fillStyle(c); ocean.fillRect(0, i * bandH, W, bandH + 1); });
    // Wave details in ocean gaps
    for (let i = 0; i < 40; i++) {
      const wx = seeded(i, 7, W), wy = seeded(i, 13, H);
      ocean.fillStyle(0x60a0e0, 0.15);
      ocean.fillRect(wx, wy, 4 + seeded(i, 19, 6), 1);
    }

    // ================================================================
    // LAYER 1 — THREE LANDMASSES (matching reference layout)
    // ================================================================
    const land = this.add.graphics();

    // LEFT: Wilderness (Sinai) — sandy desert island
    const wildCoast = [
      [10, 80], [60, 55], [120, 45], [180, 50], [220, 65], [240, 90],
      [248, 130], [250, 180], [248, 230], [245, 290], [240, 340],
      [230, 380], [215, 420], [190, 460], [160, 490], [120, 510],
      [80, 520], [40, 515], [15, 495], [5, 460], [2, 420],
      [5, 370], [8, 310], [6, 250], [5, 190], [8, 130],
    ];
    fillPoly(land, wildCoast, COLORS.pokSand);
    // Beach edge
    land.lineStyle(3, 0xf0dca0, 0.5);
    land.beginPath(); wildCoast.forEach(([px, py], i) => i === 0 ? land.moveTo(px, py) : land.lineTo(px, py));
    land.closePath(); land.strokePath();

    // CENTER: Promised Land (Canaan) — green fertile land
    const canaanCoast = [
      [280, 50], [340, 38], [400, 35], [460, 40], [510, 55], [540, 80],
      [548, 120], [550, 170], [548, 220], [544, 270], [540, 320],
      [535, 370], [528, 420], [515, 460], [495, 490], [465, 510],
      [420, 520], [370, 522], [320, 518], [285, 505], [268, 480],
      [258, 445], [255, 400], [258, 350], [262, 300], [265, 250],
      [268, 200], [270, 150], [272, 100],
    ];
    fillPoly(land, canaanCoast, COLORS.pokGrass);
    land.lineStyle(3, 0x48a028, 0.5);
    land.beginPath(); canaanCoast.forEach(([px, py], i) => i === 0 ? land.moveTo(px, py) : land.lineTo(px, py));
    land.closePath(); land.strokePath();

    // RIGHT: Americas (New World) — jungle continent
    const americasCoast = [
      [570, 70], [620, 55], [680, 48], [740, 52], [780, 68], [795, 95],
      [798, 140], [796, 200], [793, 260], [790, 320], [785, 380],
      [778, 430], [765, 470], [745, 500], [715, 520], [680, 530],
      [640, 532], [600, 525], [575, 508], [560, 480], [555, 440],
      [557, 390], [560, 340], [562, 280], [563, 220], [565, 160],
      [567, 110],
    ];
    fillPoly(land, americasCoast, COLORS.pokJungle);
    land.lineStyle(3, 0x106818, 0.5);
    land.beginPath(); americasCoast.forEach(([px, py], i) => i === 0 ? land.moveTo(px, py) : land.lineTo(px, py));
    land.closePath(); land.strokePath();

    // ================================================================
    // LAYER 2 — TERRAIN DETAIL
    // ================================================================
    const t = this.add.graphics();

    // --- WILDERNESS (LEFT PANEL) ---
    // Sand dune patterns
    const drawDune = (cx, cy, w, h) => {
      t.fillStyle(COLORS.pokSandDark, 0.5);
      t.fillEllipse(cx + 2, cy + 1, w, h);
      t.fillStyle(COLORS.pokSandLight);
      t.fillEllipse(cx, cy, w, h);
      t.fillStyle(0xf0e0b8, 0.3);
      t.fillEllipse(cx - w * 0.15, cy - h * 0.2, w * 0.5, h * 0.4);
    };
    drawDune(60, 120, 50, 16); drawDune(150, 140, 45, 14);
    drawDune(100, 200, 55, 18); drawDune(180, 220, 40, 13);
    drawDune(50, 280, 48, 15); drawDune(160, 300, 42, 14);
    drawDune(80, 360, 50, 16); drawDune(190, 380, 38, 12);
    drawDune(120, 440, 46, 15);

    // Acacia trees scattered
    [[35, 100], [180, 110], [220, 170], [30, 200], [170, 250],
     [40, 320], [200, 340], [90, 410], [160, 460]].forEach(([ax, ay]) => {
      drawAcaciaTree(t, ax, ay, 0.7);
    });

    // Lake/oasis (River Laman reference)
    t.fillStyle(COLORS.pokWaterDark);
    t.fillEllipse(100, 460, 50, 25);
    t.fillStyle(COLORS.pokWater);
    t.fillEllipse(100, 458, 46, 22);
    t.fillStyle(COLORS.pokWaterLight, 0.4);
    t.fillEllipse(95, 454, 20, 10);

    // Lehi's camp — tents
    const drawTent = (tx, ty, color) => {
      t.fillStyle(color);
      t.beginPath(); t.moveTo(tx, ty - 8); t.lineTo(tx - 7, ty + 4); t.lineTo(tx + 7, ty + 4);
      t.closePath(); t.fill();
      t.fillStyle(0x000000, 0.15);
      t.beginPath(); t.moveTo(tx, ty - 8); t.lineTo(tx + 7, ty + 4); t.lineTo(tx + 1, ty);
      t.closePath(); t.fill();
      // Door
      t.fillStyle(darken(color, 30));
      t.fillRect(tx - 2, ty, 4, 4);
    };
    drawTent(70, 340, 0xC8A060);
    drawTent(90, 348, 0xA0785A);
    drawTent(55, 350, 0xB89858);

    // Wilderness label sign
    t.fillStyle(0x604020);
    t.fillRect(68, 374, 3, 10);

// ============================================================
// JERUSALEM TILESET & MAP — Pokemon-style tile-based rendering
// ============================================================
const JT = {
  GRASS:1, GRASS_F:2, COBBLE:3, COBBLE_V:4, DIRT:5,
  WALL:6, WALL_TOP:7, TOWER:8, GATE:9,
  SAND_W:10, DARK_W:11, WINDOW:12, DOOR:13,
  ROOF_R:14, ROOF_F:15, DOME_G:16, DOME_B:17,
  TREE_T:18, TREE_B:19, BUSH:20,
  CRATE:21, BARREL:22, POT:23, FOUNTAIN:24,
  BANNER_R:25, AWNING_R:26, AWNING_B:27,
  COLUMN:28, STEPS:29, SIGN:30, MARKET:31
};

function generateJerusalemTileset() {
  const T = 16, COLS = 16, ROWS = 2;
  const cv = document.createElement('canvas');
  cv.width = COLS * T; cv.height = ROWS * T;
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const dt = (id, fn) => {
    ctx.save();
    ctx.translate((id % COLS) * T, Math.floor(id / COLS) * T);
    fn(ctx);
    ctx.restore();
  };

  // 1: Grass
  dt(1, c => {
    c.fillStyle='#78a838'; c.fillRect(0,0,16,16);
    c.fillStyle='#6c9c30';
    [[2,3],[10,1],[6,9],[14,7],[1,13],[9,11],[4,6],[12,14]].forEach(([x,y])=>c.fillRect(x,y,2,2));
    c.fillStyle='#84b840';
    [[5,1],[13,5],[3,10],[11,14],[7,4],[0,7],[15,12]].forEach(([x,y])=>c.fillRect(x,y,1,1));
  });

  // 2: Grass with flowers
  dt(2, c => {
    c.fillStyle='#78a838'; c.fillRect(0,0,16,16);
    c.fillStyle='#6c9c30';
    [[3,2],[11,8],[7,12]].forEach(([x,y])=>c.fillRect(x,y,2,2));
    c.fillStyle='#e04848'; [[4,5],[12,3]].forEach(([x,y])=>c.fillRect(x,y,2,2));
    c.fillStyle='#e8d840'; [[8,10],[2,14]].forEach(([x,y])=>c.fillRect(x,y,2,2));
    c.fillStyle='#f0f0a0'; [[5,6],[13,4]].forEach(([x,y])=>c.fillRect(x,y,1,1));
  });

  // 3: Cobblestone
  dt(3, c => {
    c.fillStyle='#c8b088'; c.fillRect(0,0,16,16);
    c.fillStyle='#a89868';

    c.fillStyle='#b89050'; c.fillRect(0,3,16,1);
  });

  return cv;
}


function buildJerusalemTilemap(scene) {
  // Generate tileset texture if not yet created
  if (!scene.textures.exists('jeru_tiles')) {
    const tilesetCanvas = generateJerusalemTileset();
    scene.textures.addCanvas('jeru_tiles', tilesetCanvas);
  }

  const MW = 60, MH = 46, TS = 16;
  const map = scene.make.tilemap({ tileWidth: TS, tileHeight: TS, width: MW, height: MH });
  const tileset = map.addTilesetImage('jerusalem', 'jeru_tiles', TS, TS, 0, 0, 0);

  const ground = map.createBlankLayer('Ground', tileset);
  const buildings = map.createBlankLayer('Buildings', tileset);
  const details = map.createBlankLayer('Details', tileset);
  const decor = map.createBlankLayer('Decorations', tileset);
  const overlap = map.createBlankLayer('Overlap', tileset);
  const collisionLayer = map.createBlankLayer('Collision', tileset);

  ground.setDepth(0);
  buildings.setDepth(1);
  details.setDepth(2);
  decor.setDepth(3);
  overlap.setDepth(20); // above player
  collisionLayer.setDepth(-1).setVisible(false);

  // --- HELPERS ---
  const fill = (layer, x1, y1, w, h, id) => { layer.fill(id, x1, y1, w, h); };
  const put = (layer, x, y, id) => { layer.putTileAt(id, x, y); };

  const placeBuilding = (bx, by, bw, bh, wallTile, roofTile, opts) => {
    opts = opts || {};
    // Roof (overlap layer so it renders above player when walking near)
    fill(overlap, bx, by, bw, 1, roofTile);
    // Walls
    fill(buildings, bx, by + 1, bw, bh - 1, wallTile);
    // Door (center bottom)
    if (!opts.noDoor) put(details, bx + Math.floor(bw / 2), by + bh - 1, JT.DOOR);
    // Windows
    if (bw >= 3 && bh >= 3) {
      put(details, bx + 1, by + 1, JT.WINDOW);
      if (bw >= 4) put(details, bx + bw - 2, by + 1, JT.WINDOW);
    }
    // Collision
    fill(collisionLayer, bx, by, bw, bh, JT.COBBLE); // any non-empty tile = collision
    // Label
    if (opts.label) {
      opts._labels = opts._labels || [];
      opts._labels.push({ x: (bx + bw/2) * TS, y: (by - 0.5) * TS, text: opts.label });
    }
  };

  const labels = [];
  const placeLabeledBuilding = (bx, by, bw, bh, wallTile, roofTile, label) => {
    placeBuilding(bx, by, bw, bh, wallTile, roofTile, { noDoor: false });
    if (label) labels.push({ x: (bx + bw/2) * TS, y: (by - 0.3) * TS, text: label });
  };

  // --- GROUND LAYER ---
  // All grass
  fill(ground, 0, 0, MW, MH, JT.GRASS);
  // Flower grass scattered outside walls
  const flowerSpots = [
    [1,1],[3,2],[56,1],[58,3],[2,43],[57,44],[1,20],[58,20],
    [0,10],[59,30],[2,35],[57,8],[3,44],[56,43],[1,30],[58,15]
  ];
  flowerSpots.forEach(([x,y]) => put(ground, x, y, JT.GRASS_F));

  // Inside walls: cobblestone
  fill(ground, 5, 5, 50, 37, JT.COBBLE);
  // Variant cobblestone (scattered)
  for (let i = 0; i < 60; i++) {
    const x = 5 + (i * 37 + i * i * 13) % 50;
    const y = 5 + (i * 23 + i * i * 7) % 37;
    put(ground, x, y, JT.COBBLE_V);
  }

  // Main paths (dirt)
  // North-South road
  fill(ground, 29, 5, 2, 37, JT.DIRT);
  // East-West road
  fill(ground, 5, 22, 50, 2, JT.DIRT);
  // Road to gate
  fill(ground, 29, 38, 2, 8, JT.DIRT);

  // --- CITY WALLS ---
  // Top wall
  fill(buildings, 4, 4, 52, 1, JT.WALL_TOP);
  fill(buildings, 4, 5, 52, 1, JT.WALL);
  // Bottom wall (with gate gap)
  fill(buildings, 4, 41, 25, 1, JT.WALL);
  fill(buildings, 31, 41, 25, 1, JT.WALL);
  fill(buildings, 4, 42, 25, 1, JT.WALL_TOP);
  fill(buildings, 31, 42, 25, 1, JT.WALL_TOP);
  // Gate
  put(buildings, 28, 41, JT.GATE);
  put(buildings, 29, 41, JT.GATE);
  put(buildings, 30, 41, JT.GATE);
  // Left wall
  for (let y = 4; y <= 42; y++) { put(buildings, 4, y, JT.WALL); put(buildings, 5, y, JT.WALL); }
  // Right wall
  for (let y = 4; y <= 42; y++) { put(buildings, 54, y, JT.WALL); put(buildings, 55, y, JT.WALL); }

  // Corner towers (2×3 each)
  const towerPositions = [[3,3],[54,3],[3,41],[54,41]];
  towerPositions.forEach(([tx,ty]) => {
    fill(buildings, tx, ty, 3, 1, JT.WALL_TOP);
    fill(buildings, tx, ty+1, 3, 2, JT.TOWER);
  });
  // Mid-wall towers
  [[3,20],[54,20],[28,3]].forEach(([tx,ty]) => {
    fill(buildings, tx, ty, 3, 1, JT.WALL_TOP);
    fill(buildings, tx, ty+1, 3, 2, JT.TOWER);
  });

  // Wall collision
  fill(collisionLayer, 3, 3, 54, 3, JT.COBBLE); // top wall+towers
  fill(collisionLayer, 3, 41, 25, 3, JT.COBBLE); // bottom left
  fill(collisionLayer, 31, 41, 25, 3, JT.COBBLE); // bottom right
  for (let y = 3; y <= 43; y++) {
    fill(collisionLayer, 3, y, 3, 1, JT.COBBLE); // left
    fill(collisionLayer, 54, y, 3, 1, JT.COBBLE); // right
  }
  // Clear gate
  fill(collisionLayer, 28, 41, 3, 3, -1);

  // --- TEMPLE OF SOLOMON (center-top) ---
  // Large building: cols 22-37, rows 7-14
  fill(overlap, 22, 7, 16, 2, JT.ROOF_F); // flat roof top
  fill(buildings, 22, 9, 16, 5, JT.SAND_W); // walls
  put(details, 29, 13, JT.DOOR); put(details, 30, 13, JT.DOOR);
  // Windows
  [23,25,27,32,34,36].forEach(x => put(details, x, 10, JT.WINDOW));
  // Columns at entrance
  [27,28,31,32].forEach(x => put(details, x, 13, JT.COLUMN));
  // Steps
  fill(details, 26, 14, 8, 1, JT.STEPS);
  // Golden dome (centered)
  put(overlap, 29, 7, JT.DOME_G);
  put(overlap, 30, 7, JT.DOME_G);
  // Temple collision
  fill(collisionLayer, 22, 7, 16, 7, JT.COBBLE);
  labels.push({ x: 30 * TS, y: 6.5 * TS, text: 'TEMPLE', color: '#ffd700' });

  // --- BLUE DOME BUILDING ---
  fill(overlap, 40, 8, 6, 1, JT.ROOF_F);
  fill(buildings, 40, 9, 6, 4, JT.SAND_W);
  put(details, 42, 12, JT.DOOR);
  put(details, 41, 10, JT.WINDOW);
  put(details, 44, 10, JT.WINDOW);
  put(overlap, 42, 8, JT.DOME_B);
  put(overlap, 43, 8, JT.DOME_B);
  fill(collisionLayer, 40, 8, 6, 5, JT.COBBLE);

  // --- RESIDENTIAL BUILDINGS ---
  // NW block (cols 7-19, rows 7-20)
  placeLabeledBuilding(7, 7, 5, 4, JT.SAND_W, JT.ROOF_R, null);
  placeLabeledBuilding(13, 7, 5, 4, JT.DARK_W, JT.ROOF_F, null);
  placeLabeledBuilding(7, 12, 4, 4, JT.SAND_W, JT.ROOF_R, null);
  placeLabeledBuilding(12, 12, 5, 4, JT.DARK_W, JT.ROOF_R, null);
  placeLabeledBuilding(7, 17, 5, 4, JT.SAND_W, JT.ROOF_F, null);
  placeLabeledBuilding(13, 17, 4, 4, JT.DARK_W, JT.ROOF_R, null);

  // NE block (cols 40-53, rows 13-20) - around blue dome
  placeLabeledBuilding(46, 7, 5, 4, JT.SAND_W, JT.ROOF_R, null);
  placeLabeledBuilding(46, 12, 5, 4, JT.DARK_W, JT.ROOF_F, null);
  placeLabeledBuilding(40, 17, 5, 4, JT.SAND_W, JT.ROOF_R, null);
  placeLabeledBuilding(46, 17, 5, 4, JT.DARK_W, JT.ROOF_R, null);

  // SW block - Lehi's home area
  placeLabeledBuilding(7, 25, 6, 5, JT.SAND_W, JT.ROOF_R, "LEHI'S HOME");
  placeLabeledBuilding(7, 31, 4, 4, JT.DARK_W, JT.ROOF_F, null);
  placeLabeledBuilding(12, 31, 5, 4, JT.SAND_W, JT.ROOF_R, null);
  placeLabeledBuilding(7, 36, 5, 4, JT.DARK_W, JT.ROOF_R, null);

  // SE block - Laban's house area
  placeLabeledBuilding(45, 25, 6, 5, JT.DARK_W, JT.ROOF_R, "LABAN'S HOUSE");
  placeLabeledBuilding(45, 31, 5, 4, JT.SAND_W, JT.ROOF_F, null);
  placeLabeledBuilding(45, 36, 5, 4, JT.DARK_W, JT.ROOF_R, null);

  // Mid-south buildings
  placeLabeledBuilding(18, 25, 5, 4, JT.SAND_W, JT.ROOF_R, null);
  placeLabeledBuilding(35, 25, 5, 4, JT.DARK_W, JT.ROOF_F, null);

  // --- MARKET AREA (south-center) ---
  // Market shops with awnings
  fill(buildings, 18, 33, 5, 3, JT.SAND_W);
  fill(overlap, 18, 32, 5, 1, JT.AWNING_R);
  put(details, 20, 35, JT.DOOR);
  put(details, 19, 34, JT.WINDOW);
  fill(collisionLayer, 18, 32, 5, 4, JT.COBBLE);
  labels.push({ x: 20.5 * TS, y: 31.5 * TS, text: 'WEAPONS', color: '#ff8888' });

  fill(buildings, 24, 33, 5, 3, JT.SAND_W);
  fill(overlap, 24, 32, 5, 1, JT.AWNING_B);
  put(details, 26, 35, JT.DOOR);
  put(details, 25, 34, JT.WINDOW);
  fill(collisionLayer, 24, 32, 5, 4, JT.COBBLE);
  labels.push({ x: 26.5 * TS, y: 31.5 * TS, text: 'ITEMS', color: '#88bbff' });

  fill(buildings, 33, 33, 5, 3, JT.SAND_W);
  fill(overlap, 33, 32, 5, 1, JT.AWNING_R);
  put(details, 35, 35, JT.DOOR);
  put(details, 34, 34, JT.WINDOW);
  fill(collisionLayer, 33, 32, 5, 4, JT.COBBLE);
  labels.push({ x: 35.5 * TS, y: 31.5 * TS, text: 'TAILOR', color: '#ff8888' });

  // Market stalls (decorative)
  put(decor, 20, 37, JT.MARKET);
  put(decor, 26, 37, JT.MARKET);
  put(decor, 35, 37, JT.MARKET);

  // --- DECORATIONS ---
  // Trees (2-tile tall: canopy on top, trunk on bottom)
  const treePositions = [
    [1,7],[2,15],[1,25],[1,35],[57,7],[57,15],[57,25],[57,35], // outside walls
    [19,8],[19,14],[20,20],[40,14],[40,20], // inside near roads
    [22,22],[37,22], // road intersections
  ];
  treePositions.forEach(([tx,ty]) => {
    put(decor, tx, ty, JT.TREE_T);
    put(decor, tx, ty+1, JT.TREE_B);
    fill(collisionLayer, tx, ty, 1, 2, JT.COBBLE);
  });

  // Bushes
  [[8,21],[14,21],[41,21],[48,21],[20,30],[39,30],[8,40],[50,40]].forEach(([bx,by]) => {
    put(decor, bx, by, JT.BUSH);
    put(collisionLayer, bx, by, JT.COBBLE);
  });

  // Crates, barrels, pots scattered near buildings and market
  [[13,11],[17,16],[44,11],[50,16]].forEach(([x,y]) => {
    put(decor, x, y, JT.CRATE);
    put(collisionLayer, x, y, JT.COBBLE);
  });
  [[7,16],[18,20],[44,20],[51,11]].forEach(([x,y]) => {
    put(decor, x, y, JT.BARREL);
    put(collisionLayer, x, y, JT.COBBLE);
  });
  [[11,11],[15,20],[46,16],[49,20]].forEach(([x,y]) => {
    put(decor, x, y, JT.POT);
    put(collisionLayer, x, y, JT.COBBLE);
  });

  // Fountain (center of east-west road)
  put(decor, 25, 23, JT.FOUNTAIN);
  put(decor, 26, 23, JT.FOUNTAIN);
  put(collisionLayer, 25, 23, JT.COBBLE);
  put(collisionLayer, 26, 23, JT.COBBLE);

  // Banners along main roads
  [[29,8],[29,15],[29,28],[29,35],[10,22],[20,22],[38,22],[48,22]].forEach(([x,y]) => {
    put(decor, x, y, JT.BANNER_R);
  });

  // Signs
  put(decor, 48, 38, JT.SIGN);
  put(collisionLayer, 48, 38, JT.COBBLE);

  // --- COLLISION SETUP ---
  collisionLayer.setCollisionByExclusion([-1]);

  // Return everything the scene needs
  return {
    map, ground, buildings, details, decor, overlap, collisionLayer,
    labels,
    worldW: MW * TS,
    worldH: MH * TS,
    gateX: 29.5 * TS, // center of gate opening
    gateY: 42 * TS,
    lehiHomeCenter: { x: 10 * TS, y: 27.5 * TS },
    labanHouseCenter: { x: 48 * TS, y: 27.5 * TS },
    templeCenter: { x: 30 * TS, y: 11 * TS },
  };
}

    this._pause = attachPauseMenu(this);

    // === NPCs (many for density) ===
