    if (this.textures.exists('player_battle')) {
      this.add.image(230, 370, 'player_battle').setScale(3);
    }
    if (this.textures.exists('nephi_battle')) {
      this.add.image(170, 375, 'nephi_battle').setScale(2.5).setAlpha(0.9);
    }

    // Enemy HP bar
    this.add.rectangle(580, 140, 164, 14, 0x222222).setStrokeStyle(1, 0x555555);
    this.enemyHpBar = this.add.rectangle(500, 134, 156, 8, COLORS.red).setOrigin(0);
    this.add.text(580, 122, 'DOUBT', {
      fontSize: '12px', fontFamily: 'monospace', color: '#aabbcc', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.enemyHpText = this.add.text(665, 131, `${this.enemy.hp}/${this.enemy.maxHp}`, {
      fontSize: '10px', fontFamily: 'monospace', color: '#cccccc'
    });

    // Player HP bar
    this.add.rectangle(220, 430, 164, 14, 0x222222).setStrokeStyle(1, 0x555555);
    this.playerHpBar = this.add.rectangle(140, 424, 156, 8, COLORS.green).setOrigin(0);
    this.add.text(220, 415, `${GameState.playerName} & Nephi`, {
      fontSize: '12px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.playerHpText = this.add.text(305, 421, `${GameState.faith}/${GameState.maxFaith}`, {
      fontSize: '10px', fontFamily: 'monospace', color: '#cccccc'
    });

    this.createBattleMenu();
    this.battleLog = this.add.text(W/2, H - 30, '', {
      fontSize: '11px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(0.5).setDepth(50);

    this.playerTurn = true;
    this.animating = false;
  }

  createBattleMenu() {
    const menuBg = this.add.image(W/2, H - 92, 'ui_parchment_wide').setDepth(40);
    menuBg.setDisplaySize(W - 36, 150);
    const menuShade = this.add.rectangle(W/2, H - 92, W - 36, 150, 0x000000, 0.18).setDepth(40);
    menuShade.setBlendMode(Phaser.BlendModes.MULTIPLY);
    const menuBorder = this.add.rectangle(W/2, H - 92, W - 36, 150, 0x000000, 0).setDepth(40);
    menuBorder.setStrokeStyle(2, COLORS.gold, 0.75);

    this.menuItems = [];
    const moves = [
      { name: '⚔️ Faith Strike', desc: 'A faithful blow', stat: 'faith', power: 15, cost: 0 },
      { name: '📖 Scripture Power', desc: 'Quote truth against doubt', stat: 'testimony', power: 25, cost: 0, superEffective: 'testimony' },
      { name: '🛡️ Pray Always', desc: 'Restore faith', stat: 'charity', power: 0, heal: 20, cost: 0 },
      { name: '✨ Nephi: "I Will Go"', desc: 'Never misses!', stat: 'courage', power: 20, cost: 0, neverMiss: true },
    ];

    moves.forEach((move, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const bx = 120 + col * 320;
      const by = H - 130 + row * 40;

      const btn = this.add.rectangle(bx + 130, by + 10, 290, 34, 0x16213e, 0.78)
        .setStrokeStyle(1, 0x334455, 0.7).setDepth(41).setInteractive({ useHandCursor: true });
      const txt = this.add.text(bx + 10, by, move.name, {
        fontSize: '13px', fontFamily: 'monospace', color: '#ffffff'
      }).setDepth(42);
      const descTxt = this.add.text(bx + 10, by + 16, move.desc, {
        fontSize: '9px', fontFamily: 'monospace', color: '#888888'
      }).setDepth(42);

      btn.on('pointerover', () => btn.setFillStyle(0x2a3a5e, 0.88));
      btn.on('pointerout', () => btn.setFillStyle(0x16213e, 0.78));
      btn.on('pointerdown', () => {
        if (this.playerTurn && !this.animating) this.playerAttack(move);
      });
      this.menuItems.push({ btn, txt, descTxt });
    });
  }

  playerAttack(move) {
    this.animating = true;
    this.playerTurn = false;

    if (move.heal) {
      GameState.faith = Math.min(GameState.faith + move.heal, GameState.maxFaith);
      AudioEngine.sfx.chime();
      this.cameras.main.flash(300, 100, 200, 255);
      this.battleLog.setText(`You prayed and restored ${move.heal} faith!`);
      const glow = this.add.particles(220, 360, 'particle_spark').setDepth(60);
      glow.createEmitter({
        speed: { min: 40, max: 140 },
        angle: { min: 220, max: 320 },
        lifespan: { min: 450, max: 950 },
        scale: { start: 0.45, end: 0 },
        alpha: { start: 0.95, end: 0 },
        quantity: 10,
        blendMode: 'ADD',
        tint: [0xffe066, 0xffffff],
      }).explode(18, 220, 360);
      this.time.delayedCall(900, () => glow.destroy());
      this.updateBars();
      this.time.delayedCall(1200, () => this.enemyTurn());
      return;
    }

    let damage = move.power + Math.floor(GameState[move.stat] / 5);
    let message = `Used ${move.name}!`;

    if (move.superEffective === 'testimony') {
      damage = Math.floor(damage * 1.8);
      message += ' It\'s super effective against Doubt!';
    }

    damage = Math.floor(damage * (0.85 + Math.random() * 0.3));
    if (damage < 1) damage = 1;

    this.enemy.hp = Math.max(0, this.enemy.hp - damage);
    this.battleLog.setText(`${message} Dealt ${damage} damage!`);
    AudioEngine.sfx.whoosh();

    const hit = this.add.particles(this.enemy.sprite.x, this.enemy.sprite.y, 'particle_spark').setDepth(60);
    hit.createEmitter({
      speed: { min: 80, max: 240 },
      lifespan: { min: 280, max: 650 },
      scale: { start: 0.45, end: 0 },
      alpha: { start: 1, end: 0 },
      quantity: 14,
      blendMode: 'ADD',
      tint: [0xffe066, 0xffffff, 0xffaa44],
    }).explode(18, this.enemy.sprite.x, this.enemy.sprite.y);
    this.time.delayedCall(700, () => hit.destroy());

    this.tweens.add({
      targets: this.enemy.sprite, x: this.enemy.sprite.x + 10, duration: 50,
      yoyo: true, repeat: 3
    });
    this.cameras.main.flash(100, 255, 255, 255);
    this.updateBars();

    if (this.enemy.hp <= 0) {
      this.time.delayedCall(800, () => this.victory());
    } else {
      this.time.delayedCall(1200, () => this.enemyTurn());
    }
  }

  enemyTurn() {
    const attacks = [
      { name: 'Whisper of Doubt', damage: 8, msg: 'Doubt whispers: "Are you sure about this?"' },
      { name: 'Cloud of Confusion', damage: 12, msg: 'Doubt clouds your mind with confusion!' },
      { name: 'Fear Strike', damage: 15, msg: 'Doubt strikes with fear!' },
    ];

    const attack = attacks[Phaser.Math.Between(0, attacks.length - 1)];
    let damage = attack.damage - Math.floor(GameState.courage / 10);
    if (damage < 1) damage = 1;

    GameState.faith = Math.max(0, GameState.faith - damage);
    this.battleLog.setText(`${attack.msg} Lost ${damage} faith.`);

    this.cameras.main.shake(200, 0.005);
    const m = this.add.particles(220, 380, 'particle_smoke').setDepth(55);
    m.createEmitter({
      speed: { min: 40, max: 90 },
      angle: { min: 20, max: 160 },
      lifespan: { min: 600, max: 1200 },
      scale: { start: 0.65, end: 1.2 },
      alpha: { start: 0.18, end: 0 },
      quantity: 10,
      tint: 0x99aacc,
    }).explode(12, 220, 380);
    this.time.delayedCall(900, () => m.destroy());
    this.updateBars();

    if (GameState.faith <= 0) {
      this.time.delayedCall(800, () => {
        GameState.faith = Math.floor(GameState.maxFaith * 0.3);
        showDialogue(this, 'Nephi', 'Do not give up! Remember, the Lord is with us. Let us try again with faith.', () => {
          this.enemy.hp = this.enemy.maxHp;
          this.updateBars();
          this.playerTurn = true;
          this.animating = false;
        });
      });
    } else {
      this.time.delayedCall(800, () => {
        this.playerTurn = true;
        this.animating = false;
      });
    }
  }

  updateBars() {
    const enemyRatio = Math.max(0, this.enemy.hp / this.enemy.maxHp);
    this.tweens.add({ targets: this.enemyHpBar, displayWidth: 156 * enemyRatio, duration: 300 });
    this.enemyHpText.setText(`${this.enemy.hp}/${this.enemy.maxHp}`);

    const playerRatio = Math.max(0, GameState.faith / GameState.maxFaith);
    this.tweens.add({ targets: this.playerHpBar, displayWidth: 156 * playerRatio, duration: 300 });
    this.playerHpText.setText(`${GameState.faith}/${GameState.maxFaith}`);
  }

  victory() {
    GameState.battleWon = true;
    gainFP(40);
    addJournal('Overcame Doubt through faith and testimony');
    GameState.faith = Math.min(GameState.faith + 20, GameState.maxFaith);

    this.tweens.add({ targets: this.enemy.sprite, alpha: 0, scale: 0, duration: 800 });

    this.battleLog.setText('');
    showDialogue(this, 'Narrator', 'Doubt has been vanquished! Your faith grew stronger through the trial. Remember — doubt is overcome not by ignoring it, but by choosing faith and seeking truth.', () => {
      showDialogue(this, 'Nephi', 'Well fought! Doubt flees when we hold firm to what we know is true. The Lord has blessed us this day.', () => {
        this.cameras.main.fadeOut(500);
        this.time.delayedCall(500, () => {
          saveGame({ scene: this.returnScene, milestone: 'battle_won' });
          this.scene.stop();
          this.scene.resume(this.returnScene);
        });
      });
    });
  }

  update(time) {
    this._lighting?.update(time);
  }
}


// ============================================================
// SCENE: IRON ROD (Lehi's Vision)
// ============================================================
class IronRodScene extends Phaser.Scene {
  constructor() { super('IronRod'); }

  create() {
    AudioEngine.setTheme('dream');
    this.cameras.main.fadeIn(1000);

    const worldW = 2400, worldH = H;
    this.physics.world.setBounds(0, 0, worldW, worldH);
    this.cameras.main.setBounds(0, 0, worldW, worldH);

    this._pause = attachPauseMenu(this);
    this._lighting = FX.createLightingRig(this, { mode: 'dream' });
    this._lighting.setAmbient(0.48);

    // Dream-world particles (soft blue drift).
    const ether = this.add.particles(0, 0, 'particle_dot').setDepth(2);
    ether.createEmitter({
      x: { min: 0, max: worldW },
      y: { min: 0, max: worldH },
      lifespan: { min: 4000, max: 6500 },
      speedY: { min: -12, max: -35 },
      speedX: { min: -10, max: 10 },
      scale: { start: 0.08, end: 0 },
      alpha: { start: 0.10, end: 0 },
      frequency: 80,
      tint: [0xbfdcff, 0x99bbff, 0xffffff],
      blendMode: 'ADD',
    });

    // Dreamy dark background
    this.add.rectangle(worldW/2, worldH/2, worldW, worldH, COLORS.nightBlue);

    // Stars in the dream
    for (let i = 0; i < 150; i++) {
      const star = this.add.circle(
        Phaser.Math.Between(0, worldW), Phaser.Math.Between(0, worldH/3),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.8)
      );
      this.tweens.add({ targets: star, alpha: 0.1, duration: Phaser.Math.Between(500, 2000), yoyo: true, repeat: -1 });
    }

    // Ground path
    this.add.rectangle(worldW/2, worldH - 30, worldW, 60, COLORS.darkSand, 0.3);

    // THE IRON ROD
    for (let rx = 0; rx < worldW - 200; rx += 4) {
      this.add.rectangle(rx, worldH - 65, 4, 6, COLORS.iron, 0.7);
    }
    // Iron rod posts
    for (let rx = 0; rx < worldW - 200; rx += 80) {
      this.add.rectangle(rx, worldH - 75, 4, 20, COLORS.iron, 0.8);
    }
    this.add.text(80, worldH - 90, '═══ The Iron Rod (Word of God) ═══', {
      fontSize: '10px', fontFamily: 'monospace', color: '#708090'
    });

    // Mists of Darkness
    this.mists = [];
    const mistPositions = [400, 700, 1000, 1300, 1600, 1900];
    mistPositions.forEach(mx => {
      const mistGroup = [];
      for (let i = 0; i < 10; i++) {
        const mist = this.add.ellipse(
          mx + Phaser.Math.Between(-90, 90),
          Phaser.Math.Between(worldH - 220, worldH - 40),
          Phaser.Math.Between(40, 100), Phaser.Math.Between(20, 50),
          COLORS.mist, Phaser.Math.FloatBetween(0.12, 0.3)
        );
        this.tweens.add({
          targets: mist, x: mist.x + Phaser.Math.Between(-50, 50),
          alpha: mist.alpha * 0.2, duration: Phaser.Math.Between(2000, 5000),
          yoyo: true, repeat: -1
        });
        mistGroup.push(mist);
      }
      this.mists.push({ x: mx, clouds: mistGroup });

      // Flowing mist layer (breathing motion).
      const flow = this.add.particles(mx, worldH - 130, 'particle_smoke').setDepth(3);
      flow.createEmitter({
        x: { min: mx - 140, max: mx + 140 },
        y: { min: worldH - 230, max: worldH - 40 },
        lifespan: { min: 2600, max: 5200 },
        speedX: { min: -20, max: 20 },
        speedY: { min: -6, max: 6 },
        scale: { start: 0.7, end: 1.4 },
        alpha: { start: 0.10, end: 0 },
        frequency: 140,
        tint: 0x99aacc,
        blendMode: 'NORMAL',
      });
    });

    // Great and spacious building
    const bldg = this.add.rectangle(1200, 150, 300, 180, 0x4a3728).setStrokeStyle(2, 0x6a5738);
    this.tweens.add({ targets: bldg, angle: 2, duration: 8000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    // Windows with people silhouettes
    for (let wy = 80; wy < 280; wy += 30) {
      for (let wx = 1070; wx < 1330; wx += 35) {
        this.add.rectangle(wx, wy, 12, 16, 0xffdd88, 0.5);
        // Tiny person silhouette in window
        if (Math.random() > 0.5) {
          this.add.rectangle(wx, wy + 4, 4, 8, 0x2a1a0a, 0.4);
        }
      }
    }
    // Pillars
    this.add.rectangle(1055, 150, 8, 180, 0x6a5738);
    this.add.rectangle(1345, 150, 8, 180, 0x6a5738);

    this.add.text(1200, 70, 'The Great &\nSpacious Building', {
      fontSize: '11px', fontFamily: 'monospace', color: '#aa8866', align: 'center', fontStyle: 'italic'
    }).setOrigin(0.5);

    // People mocking from building
    const mockText = this.add.text(1200, 270, '"Come join us! This path is foolish!"', {
      fontSize: '9px', fontFamily: 'monospace', color: '#cc9966', fontStyle: 'italic'
    }).setOrigin(0.5);
    this.tweens.add({ targets: mockText, alpha: 0.3, duration: 1500, yoyo: true, repeat: -1 });

    // People who wandered off the path (lost souls)
    if (this.textures.exists('laman')) {
      const lost1 = this.add.image(1180, 300, 'laman').setScale(1.2).setAlpha(0.4);
      this.add.text(1180, 320, '(lost in mist)', { fontSize: '8px', fontFamily: 'monospace', color: '#666666' }).setOrigin(0.5);
    }

    // THE TREE OF LIFE
    const treeX = worldW - 150;
    // Trunk
    this.add.rectangle(treeX, worldH - 120, 16, 80, 0xB8860B);
    this.add.rectangle(treeX - 4, worldH - 130, 8, 20, 0x8B6914);
    this.add.rectangle(treeX + 4, worldH - 125, 6, 15, 0x8B6914);
    // Branches
    this.add.rectangle(treeX - 20, worldH - 165, 30, 6, 0x8B6914);
    this.add.rectangle(treeX + 15, worldH - 175, 25, 5, 0x8B6914);
    // Canopy (radiant white/gold)
    this.add.circle(treeX, worldH - 190, 55, COLORS.treeGold, 0.25);
    this.add.circle(treeX - 15, worldH - 200, 35, 0xffffff, 0.2);
    this.add.circle(treeX + 15, worldH - 185, 40, COLORS.treeGold, 0.3);
    this.add.circle(treeX, worldH - 210, 30, 0xffffff, 0.25);
    // Glowing fruit
    for (let i = 0; i < 15; i++) {
      const angle = (i / 15) * Math.PI * 2;
      const fr = this.add.circle(
        treeX + Math.cos(angle) * (20 + Math.random() * 20),
        worldH - 195 + Math.sin(angle) * (15 + Math.random() * 15),
        4, 0xffffff, 0.95
      );
      this.tweens.add({ targets: fr, scale: 1.5, alpha: 0.3, duration: 800 + i * 120, yoyo: true, repeat: -1 });
    }
    this.add.text(treeX, worldH - 265, '🌳 Tree of Life', {
      fontSize: '14px', fontFamily: 'monospace', color: '#ffe066', fontStyle: 'bold'
    }).setOrigin(0.5);
    const treeGlow = this.add.circle(treeX, worldH - 190, 90, 0xffffff, 0.06);
    this.tweens.add({ targets: treeGlow, scale: 2.5, alpha: 0, duration: 3000, repeat: -1 });

    // Tree of Life constant shimmer (white/silver particles).
    this._lighting.addLight(treeX, worldH - 190, 'light_white_256', 1.8, 0.16, 0.03);
    this._lighting.addLight(treeX, worldH - 190, 'light_gold_256', 1.5, 0.08, 0.02);
    const treeParts = this.add.particles(treeX, worldH - 210, 'particle_dot').setDepth(6);
    treeParts.createEmitter({
      x: { min: treeX - 40, max: treeX + 40 },
      y: { min: worldH - 220, max: worldH - 160 },
      lifespan: { min: 2200, max: 3800 },
      speedY: { min: -22, max: -55 },
      speedX: { min: -10, max: 10 },
      scale: { start: 0.16, end: 0 },
      alpha: { start: 0.55, end: 0 },
      frequency: 70,
      tint: [0xffffff, 0xe6f2ff, 0xfff4cc],
      blendMode: 'ADD',
    });

    // Player sprite
    if (this.textures.exists('player')) {
      this.player = this.add.image(60, worldH - 65, 'player').setScale(2).setDepth(10);
    } else {
      this.player = this.add.rectangle(60, worldH - 65, 16, 22, COLORS.green).setOrigin(0.5, 1);
    }
    this.physics.add.existing(this.player);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setSize(16, 22);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

    this.visionFaith = 100;
    this.holdingRod = true;
    this.voiceCooldown = 0;
    this.whispers = [
      "That's just an old book written by men.",
      "Smart people don't believe that anymore.",
      "You're missing out on the real world.",
      "Your own brothers don't even believe it.",
    ];
    this.faithLabel = this.add.text(10, 10, 'Hold to the Rod: ✦ 100', {
      fontSize: '14px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
    }).setScrollFactor(0).setDepth(100);

    this.rodHint = this.add.text(W/2, H - 15, 'Stay near the rod. Arrow keys: move  \u2022  Hold E: grip the rod', {
      fontSize: '10px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(100);

    this.treeZone = this.add.zone(treeX, worldH - 150, 80, 120);
    this.physics.add.existing(this.treeZone, true);
    this.reachedTree = false;

    this.cursors = this.input.keyboard.createCursorKeys();
    this.holdKey = this.input.keyboard.addKey('E');
    this.hud = createHUD(this);
    this.hud.setObjective(treeX, worldH - 150);

    showDialogue(this, 'Lehi', 'In my dream, I saw a tree whose fruit was most desirable above all things. Hold to the iron rod — the word of God — and it will lead you through the mists of darkness to the tree of life. Do not let go!');
  }

  update(time, delta) {
    this._lighting?.update(time);
    this.hud?.update(this.player, 'sand');
    if (this._pauseOpen || this._dialogueOpen) {
      if (this.player?.body) this.player.body.setVelocity(0);
      return;
    }
    if (this.reachedTree) return;

    const speed = 140;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) { this.player.body.setVelocityX(-speed); this.player.setFlipX && this.player.setFlipX(true); }
    if (this.cursors.right.isDown) { this.player.body.setVelocityX(speed); this.player.setFlipX && this.player.setFlipX(false); }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed * 0.7);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed * 0.7);

    const nearRod = this.player.y > H - 100;
    const requireHold = (GameState.settings.difficulty || 'disciple') !== 'explorer';
    this.holdingRod = nearRod && (!requireHold || this.holdKey.isDown);

    let inMist = false;
    this.mists.forEach(m => {
      if (Math.abs(this.player.x - m.x) < 120) inMist = true;
    });

    // Modern voices from the building (visual whisper).
    this.voiceCooldown = Math.max(0, (this.voiceCooldown || 0) - delta);
    if (inMist && !this.holdingRod && this.voiceCooldown <= 0) {
      this.voiceCooldown = 2400;
      const w = this.whispers[Phaser.Math.Between(0, this.whispers.length - 1)];
      const t = this.add.text(W / 2, 92, `"${w}"`, {
        fontSize: '12px',
        fontFamily: 'Georgia, serif',
        color: '#cc9966',
        fontStyle: 'italic',
      }).setOrigin(0.5).setScrollFactor(0).setDepth(120).setAlpha(0);
      this.tweens.add({ targets: t, alpha: 0.85, duration: 350, yoyo: true, hold: 1200, onComplete: () => t.destroy() });
    }

    if (inMist && !this.holdingRod) {
      this.visionFaith -= (GameState.settings.difficulty === 'warrior' ? 0.45 : 0.3);
      this.faithLabel.setColor('#ff6666');
      this._lighting.setAmbient(0.55);
    } else if (this.holdingRod) {
      this.visionFaith = Math.min(100, this.visionFaith + 0.18);
      this.faithLabel.setColor('#ffd700');
      this._lighting.setAmbient(0.46);
    } else {
      this._lighting.setAmbient(0.50);
    }

    // "Falling into the river": not game over, but teaches returning.
    if (inMist && !this.holdingRod && this.player.y < H - 155) {
      this.visionFaith = Math.max(20, this.visionFaith - 15);
      this.player.setPosition(Math.max(30, this.player.x - 120), H - 65);
      this.cameras.main.flash(450, 120, 120, 120);
      showDialogue(this, 'Nephi', 'For a moment I let go \u2014 and I lost my way. But I can return.', () => {});
    }

    if (requireHold && nearRod && !this.holdKey.isDown) {
      this.rodHint.setColor('#ff6666');
    } else {
      this.rodHint.setColor('#aaaaaa');
    }

    this.faithLabel.setText(`Hold to the Rod: \u2726 ${Math.floor(this.visionFaith)}`);

    if (this.visionFaith <= 0) {
      this.visionFaith = 50;
      this.player.setPosition(this.player.x - 200, H - 65);
      this.cameras.main.flash(500, 100, 100, 100);
      showDialogue(this, 'Narrator', 'You lost your way in the mist. Hold to the iron rod \u2014 and keep going.', () => {});
    }

    const treeDist = Phaser.Math.Distance.Between(this.player.x, this.player.y, 2250, H - 150);
    if (treeDist < 60) {
      this.reachedTree = true;
      GameState.ironRodComplete = true;
      GameState.faith = Math.min(GameState.faith + 25, GameState.maxFaith);
      gainFP(50);
      addJournal('Held to the iron rod and reached the Tree of Life');
      saveGame({ scene: 'IronRod', milestone: 'tree' });

      AudioEngine.setTheme('spiritual');
      AudioEngine.sfx.chime();
      const flood = this.add.image(this.player.x, this.player.y - 80, 'light_white_256').setScale(3.4).setAlpha(0);
      flood.setBlendMode(Phaser.BlendModes.SCREEN);
      this.tweens.add({ targets: flood, alpha: 0.35, duration: 900, yoyo: true, repeat: 1, onComplete: () => flood.destroy() });

      this.cameras.main.flash(1000, 255, 255, 230);
      this.time.delayedCall(900, () => {
        showDialogue(this, 'Narrator',
          'The mist clears. The tree stands before you \u2014 bright beyond description. You reach up, and the fruit is sweet above all that you have ever tasted.',
          () => {
            showScriptureUnlock(this,
              '1 Nephi 11:25',
              'The love of God, which sheddeth itself abroad in the hearts of the children of men; wherefore, it is the most desirable above all things.',
              () => {
                this.cameras.main.fadeOut(800);
                this.time.delayedCall(800, () => this.scene.start('Jerusalem'));
              }
            );
          },
          { thought: 'And I wept. Not from sadness, but from a joy too large for any other expression.' }
        );
      });
    }
  }
}
