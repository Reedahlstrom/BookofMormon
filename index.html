      { x: 25*16, y: 20*16, text: 'Babylon grows stronger...', delay: 2000 },
      { x: 35*16, y: 20*16, text: 'Have you heard the prophets?', delay: 5500 },
      { x: 43*16, y: 24*16, text: 'Dark times ahead...', delay: 9000 },
      { x: 22*16, y: 38*16, text: 'Trade has dried up!', delay: 12500 },
      { x: 15*16, y: 27*16, text: 'Father is a fool.', delay: 7000 },
      { x: 17*16, y: 29*16, text: '...', delay: 8000 },
      { x: 14*16, y: 30*16, text: 'I trust Father.', delay: 4000 },
      { x: 8*16, y: 32*16, text: 'Oh, our home...', delay: 11000 },
    ];
    ambientLines.forEach(al => {
      const bubble = this.add.text(al.x, al.y - 20, al.text, {
        fontSize: '8px', fontFamily: 'monospace', color: '#ffffff',
        backgroundColor: '#00000099', padding: { x: 4, y: 2 },
      }).setOrigin(0.5).setDepth(12).setAlpha(0);
      const showBubble = () => {
        this.tweens.add({
          targets: bubble, alpha: 1, y: al.y - 28, duration: 600, ease: 'Sine.easeOut',
          onComplete: () => {
            this.time.delayedCall(3000, () => {
              this.tweens.add({
                targets: bubble, alpha: 0, y: al.y - 36, duration: 600, ease: 'Sine.easeIn',
                onComplete: () => {
                  bubble.y = al.y - 20;
                  this.time.delayedCall(8000 + Math.random() * 6000, showBubble);
                }
              });
            });
          }
        });
      };
      this.time.delayedCall(al.delay, showBubble);
      this.ambientBubbles.push(bubble);
    });

    // NPC idle sway
    this.npcSprites.forEach((s, i) => {
      this.tweens.add({
        targets: s,
        scaleX: (s.scaleX || 1.8) * 1.02,
        duration: 1200 + i * 200,
        yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });
    });

    // Opening narration
    if (!GameState.questFlags.jerusalemCityIntro) {
      GameState.questFlags.jerusalemCityIntro = true;
      this.time.delayedCall(500, () => {
        showDialogue(this, 'Narrator',
          'Jerusalem, 600 BC. The kingdom of Judah teeters on the edge of destruction. Babylon grows powerful in the east, and many prophets cry repentance to the people. Among them is Lehi, father of Nephi.',
          () => {
            showDialogue(this, 'Narrator',
              'Explore the city. Talk to the people. Then find Lehi at your family home. Walk up to anyone and press SPACE to interact.',
              () => {
                addJournal('Arrived in Jerusalem. The city is tense with political fear and prophetic warnings.');
              }
            );
          }
        );
      });
    }
  }

  triggerLehiVision() {
    GameState.questFlags.lehiVision = true;
    if (this.questMarker) this.questMarker.destroy();
    addJournal('Witnessed Lehi\'s vision of the pillar of fire and the heavenly book.');

    showDialogue(this, 'Lehi',
      'My child, I have seen a vision. A pillar of fire dwelt upon a rock before me, and I saw and heard much. I was given a book, and as I read, I was filled with the Spirit of the Lord.',
      () => {
        // Vision flash
        this.cameras.main.flash(800, 255, 240, 180);
        AudioEngine.sfx.chime();
        this.time.delayedCall(600, () => {
          showDialogue(this, 'Lehi',
            'The book told of the coming destruction of Jerusalem. Wo, wo unto Jerusalem! The people have rejected the prophets. Babylon will come, and this city will burn.',
            () => {
              showDialogue(this, 'Narrator',
                'Lehi goes out among the people and begins to prophesy. The citizens react with hostility. Some throw stones. Others mock.',
                () => {
                  // Player choice
                  showDialogue(this, 'Nephi', 'Father has spoken. What do I believe?', null, {
                    choices: [
                      {
                        id: 'lehi_vision_faith', text: '[Faith] I believe you, Father.',
                        faithVsDoubt: 1, onSelect: () => {
                          GameState.faith = Math.min(GameState.faith + 15, GameState.maxFaith);
                          GameState.testimony += 10;
                          gainFP(20);
                          addJournal('Chose to believe Lehi\'s vision immediately. Faith +15, Testimony +10.');
                          recordChoice({ id: 'lehi_vision_faith', label: 'Believed Lehi', faithVsDoubt: 1 });
                          showDialogue(this, 'Lehi', 'Blessed are you, my son. The Lord will strengthen your heart.');
                        }
                      },
                      {
                        id: 'lehi_vision_doubt', text: '[Doubt] Are you sure about this, Father?',
                        faithVsDoubt: -1, onSelect: () => {
                          addJournal('Doubted Lehi\'s vision, but sought the Lord in prayer.');
                          this.triggerNephiPrayerMini();
                        }
                      }
                    ]
                  });
                }
              );
            }
          );
        });
      }
    );
  }

  triggerNephiPrayerMini() {
    // Brief prayer scene — Nephi kneels, golden flash, receives witness (1 Nephi 2:16 foreshadow)
    const overlay = this.add.rectangle(this.cameras.main.scrollX + W / 2, this.cameras.main.scrollY + H / 2, W, H, 0x000000, 0).setDepth(200).setScrollFactor(0);
    this.tweens.add({ targets: overlay, alpha: 0.7, duration: 800 });
    this.time.delayedCall(800, () => {
      showDialogue(this, 'Narrator',
        'Nephi kneels in prayer. The room grows still. A warmth fills his heart, and the Spirit whispers peace.',
        () => {
          this.cameras.main.flash(600, 255, 215, 0);
          AudioEngine.sfx.chime();
          GameState.faith = Math.min(GameState.faith + 10, GameState.maxFaith);
          gainFP(15);
          this.time.delayedCall(400, () => {
            showDialogue(this, 'Nephi',
              'I do not understand all things, but the Lord has softened my heart. I believe the words of my father.',
              () => {
                overlay.destroy();
              }
            );
          });
        }
      );
    });
  }

  triggerDeparture() {
    showDialogue(this, 'Lehi',
      'The Lord has commanded us to flee Jerusalem. We must leave our home, our gold, our land — everything. We take only provisions and our family. The time is now.',
      () => {
        showDialogue(this, 'Nephi', 'What shall we bring, Father?', null, {
          choices: [
            { id: 'pack_food', text: 'Food & provisions', onSelect: () => {
              GameState.courage += 10;
              addJournal('Packed food and provisions. Courage +10.');
              this.startDepartureWalk();
            }},
            { id: 'pack_records', text: 'Family records', onSelect: () => {
              GameState.wisdom += 10;
              addJournal('Packed the family records. Wisdom +10.');
              this.startDepartureWalk();
            }},
            { id: 'pack_gold', text: 'Gold & silver', onSelect: () => {
              GameState.inventory.push('Gold and Silver');
              addJournal('Packed gold and silver — may be needed later.');
              this.startDepartureWalk();
            }},
            { id: 'pack_trust', text: 'Trust in God — He will provide', faithVsDoubt: 1, onSelect: () => {
              GameState.faith = Math.min(GameState.faith + 15, GameState.maxFaith);
              gainFP(15);
              addJournal('Trusted in God for provisions. Faith +15.');
              this.startDepartureWalk();
            }},
          ]
        });
      }
    );
  }

  startDepartureWalk() {
    // Nighttime stealth walk to city gate
    GameState.time.t = 0.85; // night
    this._lighting.setAmbient(0.45);

    showDialogue(this, 'Narrator',
      'Under cover of darkness, the family of Lehi gathers what little they can carry. They must reach the city gate without drawing attention.',
      () => {
        // Place 2 patrolling guards near the gate area (left side of map)
        this.departureMode = true;
        this.guards = [];

        const gateCenter = 29.5 * 16; // tile-based gate center
        const gPositions = [
          { x: gateCenter - 80, y: 39*16, patrol: 'h', range: 80 },
          { x: gateCenter + 80, y: 38*16, patrol: 'v', range: 60 },
        ];
        gPositions.forEach(gp => {
          let guard;
          if (this.textures.exists('guard')) {
            guard = this.add.image(gp.x, gp.y, 'guard').setScale(1.5).setDepth(14);
          } else {
            guard = this.add.rectangle(gp.x, gp.y, 16, 24, COLORS.red).setDepth(14);
          }
          const cone = this.add.triangle(gp.x, gp.y, 0, 0, 80, -28, 80, 28, 0xff6666, 0.08).setOrigin(0, 0.5).setDepth(13);
          this.tweens.add({
            targets: guard,
            x: gp.patrol === 'h' ? gp.x + gp.range : gp.x,
            y: gp.patrol === 'v' ? gp.y + gp.range : gp.y,
            duration: 2200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
          });
          this.guards.push({ sprite: guard, cone, lastX: gp.x, lastY: gp.y });
        });

        // Gate zone at bottom center
        this.gateZone = this.add.zone(gateCenter, 43*16, 80, 50);
        this.physics.add.existing(this.gateZone, true);
        this.add.text(gateCenter, 42*16, '\u2193 City Gate', {
          fontSize: '10px', fontFamily: 'monospace', color: '#6b8e23'
        }).setOrigin(0.5).setDepth(20);

        this.nearGate = false;
        this.physics.add.overlap(this.player, this.gateZone, () => this.nearGate = true);

        this.add.text(W / 2, 40, 'Reach the city gate!', {
          fontSize: '14px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold',
          stroke: '#000000', strokeThickness: 3
        }).setOrigin(0.5).setScrollFactor(0).setDepth(100);

        this.hud.setObjective(gateCenter, 43*16);
      }
    );
  }

  checkGuardDetection() {
    if (!this.guards || !this.departureMode) return false;
    for (const g of this.guards) {
      // Update cone position
      const dx = g.sprite.x - g.lastX;
      const dy = g.sprite.y - g.lastY;
      if (Math.abs(dx) + Math.abs(dy) > 0.05) {
        g.cone.rotation = Math.atan2(dy, dx);
        g.lastX = g.sprite.x;
        g.lastY = g.sprite.y;
      }
      g.cone.x = g.sprite.x;
      g.cone.y = g.sprite.y;

      const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, g.sprite.x, g.sprite.y);
      if (dist < 60) {
        return true;
      }
    }
    return false;
  }

  completeDeparture() {
    this.departureComplete = true;
    saveGame({ scene: 'ChapterTransition' });

    const cx = this.cameras.main.scrollX + W / 2;
    const cy = this.cameras.main.scrollY + H / 2;
    const overlay = this.add.rectangle(cx, cy, W + 200, H + 200, 0x000000, 0).setDepth(200);
    this.tweens.add({ targets: overlay, alpha: 0.92, duration: 1200, onComplete: () => {
      const depText = this.add.text(cx, cy,
        '"And he left his house, and the land of his inheritance,\nand his gold, and his silver, and his precious things,\nand took nothing with him, save it were his family..."\n\n\u2014 1 Nephi 2:4', {
        fontSize: '14px', fontFamily: 'Georgia, serif', color: '#ccccaa',
        align: 'center', lineSpacing: 6, wordWrap: { width: 500 }
      }).setOrigin(0.5).setDepth(202).setAlpha(0);
      this.tweens.add({ targets: depText, alpha: 1, duration: 2000 });
      this.time.delayedCall(5000, () => {
        this.cameras.main.fadeOut(1500);
        this.time.delayedCall(1500, () => {
          this.scene.start('ChapterTransition', {
            chapter: 'II', title: 'Into the Wilderness',
            quote: '"And my father dwelt in a tent."  \u2014 1 Nephi 2:15',
            nextScene: 'WildernessJourney'
          });
        });
      });
    }});
  }

  update(time, delta) {
    this._lighting?.update(time);
    if (this._pauseOpen || this._dialogueOpen) {
      if (this.player?.body) this.player.body.setVelocity(0);
      this.hud?.update(this.player, 'stone');
      return;
    }

    // Reset near flags
    Object.keys(this.nearFlags).forEach(k => this.nearFlags[k] = false);
    this.nearGate = false;

    const speed = 160;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) { this.player.body.setVelocityX(-speed); this.player.setFlipX(true); }
    if (this.cursors.right.isDown) { this.player.body.setVelocityX(speed); this.player.setFlipX(false); }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed);

    // Walk animation
    if (this.player.body.velocity.x !== 0 || this.player.body.velocity.y !== 0) {
      this.player.setScale(2, 2 + Math.sin(time * 0.01) * 0.05);
      this._stepCooldown -= delta;
      if (this._stepCooldown <= 0) { AudioEngine.sfx.step('stone'); this._stepCooldown = 230; }
    } else {
      this.player.setScale(2);
    }

    // Mini-map player dot update
    if (this.mmPlayerDot && this._mmBounds) {
      const mm = this._mmBounds;
      this.mmPlayerDot.x = mm.x + (this.player.x / mm.ww) * mm.w;
      this.mmPlayerDot.y = mm.y + (this.player.y / mm.wh) * mm.h;
    }

    // Departure mode: guard detection + gate check
    if (this.departureMode && !this.departureComplete) {
      if (this.checkGuardDetection() && !this._caughtCooldown) {
        this._caughtCooldown = true;
        GameState.faith = Math.max(GameState.faith - 5, 10);
        this.cameras.main.shake(300, 0.01);
        showDialogue(this, 'Guard', 'Hey! Who goes there?', () => {
          showDialogue(this, 'Narrator', 'You scramble away into the shadows. A close call, but you escape.', () => {
            this.time.delayedCall(1500, () => { this._caughtCooldown = false; });
          });
        });
      }
      if (this.nearGate && !this.departureComplete) {
        this.completeDeparture();
      }
      this.hud?.update(this.player, 'stone');
      return;
    }

    // Normal interaction mode
    this.interactPrompt.setVisible(false);
    const nf = this.nearFlags;
    if (nf.lehi) this.interactPrompt.setPosition(10*16, 30*16).setVisible(true);
    else if (nf.sam) this.interactPrompt.setPosition(14*16, 29*16).setVisible(true);
    else if (nf.sariah) this.interactPrompt.setPosition(8*16, 31*16).setVisible(true);
    else if (nf.laman) this.interactPrompt.setPosition(15*16, 26*16).setVisible(true);
    else if (nf.lemuel) this.interactPrompt.setPosition(17*16, 28*16).setVisible(true);
    else if (nf.citizen1) this.interactPrompt.setPosition(25*16, 19*16).setVisible(true);
    else if (nf.citizen2) this.interactPrompt.setPosition(35*16, 19*16).setVisible(true);
    else if (nf.citizen3) this.interactPrompt.setPosition(43*16, 23*16).setVisible(true);
    else if (nf.merchant) this.interactPrompt.setPosition(22*16, 37*16).setVisible(true);

    if (this.interactCooldown > 0) this.interactCooldown -= delta;
    if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && this.interactCooldown <= 0) {
      this.interactCooldown = 500;

      if (nf.lehi && !this._dialogueOpen) {
        if (!GameState.questFlags.lehiVision) {
          this.triggerLehiVision();
        } else if (!GameState.questFlags.departureStarted) {
          GameState.questFlags.departureStarted = true;
          this.triggerDeparture();
        } else {
          showDialogue(this, 'Lehi', 'We must go now. Head to the city gate.');
        }
      }
      if (nf.sam && !this._dialogueOpen) {
        showDialogue(this, 'Sam', 'I trust Father, Nephi. Whatever he says, I will follow. The Lord speaks to him — I can see it in his eyes.');
      }
      if (nf.sariah && !this._dialogueOpen) {
        showDialogue(this, 'Sariah', 'Leave everything? Our home, our friends? I... I will follow your father. But my heart is heavy.', null, {
          thought: 'Her hands tremble as she packs a small bundle. Her faith is quiet, but it is there.'
        });
      }
      if (nf.laman && !this._dialogueOpen) {
        showDialogue(this, 'Laman', 'Father has lost his mind, Nephi. Prophets? Visions? Jerusalem has stood for centuries. It will stand for centuries more.', () => {
          showDialogue(this, 'Lemuel', '...Laman may be right. This is our home. Why should we leave everything behind for a dream?');
        });
      }
      if (nf.lemuel && !nf.laman && !this._dialogueOpen) {
        showDialogue(this, 'Lemuel', 'I do not know what to think. Laman says Father is foolish. But... I saw his face when he spoke of the vision. He was not lying.');
      }
      if (nf.citizen1 && !this._dialogueOpen) {
        showDialogue(this, 'Citizen', 'Have you heard? The Babylonians grow stronger every day. King Zedekiah says we are safe, but I am not so sure.');
      }
      if (nf.citizen2 && !this._dialogueOpen) {
        showDialogue(this, 'Woman', 'So many prophets crying doom these days. Jeremiah, Lehi, others. The elders say they are all mad. But what if they are right?');
      }
      if (nf.citizen3 && !this._dialogueOpen) {
        showDialogue(this, 'Elder', 'Your father Lehi was a respected man once. Now he preaches that Jerusalem will be destroyed. The people want him silenced \u2014 or worse.');
      }
      if (nf.merchant && !this._dialogueOpen) {
        showDialogue(this, 'Merchant', 'Troubled times, young man. Trade with Babylon has dried up. Soldiers at the gates. I would leave this city if I had somewhere to go.', () => {
          showDialogue(this, 'Nephi', '', null, {
            choices: [
              { id: 'merchant_faith', text: 'My father says we should leave.', faithVsDoubt: 1, onSelect: () => {
                GameState.faith = Math.min(GameState.faith + 3, GameState.maxFaith);
                showDialogue(this, 'Merchant', 'Then perhaps your father is wiser than most. Go with God, boy.');
              }},
              { id: 'merchant_neutral', text: 'I hope things get better.', faithVsDoubt: 0, onSelect: () => {
                showDialogue(this, 'Merchant', 'Hope? Hope does not fill bellies or stop armies. But yes... I hope so too.');
              }},
            ]
          });
        });
      }
    }

    this.hud?.update(this.player, 'stone');
  }
}


// ============================================================
// SCENE 2: WILDERNESS JOURNEY — Valley of Lemuel (1 Nephi 2)
// ============================================================
class WildernessJourneyScene extends Phaser.Scene {
  constructor() { super('WildernessJourney'); }

  create() {
    AudioEngine.setTheme('wilderness');
    this.cameras.main.fadeIn(800);
    GameState.chapter = { book: '1 Nephi', chapter: 2, label: '1 Nephi \u00b7 Ch. 2' };

    // PART 1: Brief travel encounter, then camp
    this.phase = 'travel'; // 'travel' -> 'camp'
    this.setupTravel();
  }

  setupTravel() {
    // Side-scrolling travel scene
    const worldW = 1200, worldH = H;
    this.physics.world.setBounds(0, 0, worldW, worldH);
    this.cameras.main.setBounds(0, 0, worldW, worldH);

    this._pause = attachPauseMenu(this);
    this._lighting = FX.createLightingRig(this, { mode: 'day' });

    // Desert landscape (Sinai wilderness style from reference)
    const skyG = this.add.graphics();
    skyG.fillStyle(0x78c8f8);
    skyG.fillRect(0, 0, worldW, 280);
    skyG.fillStyle(0x98d8ff, 0.4);
    skyG.fillRect(0, 0, worldW, 140);

    // Sand ground — TILE SPRITE (pixel art sand texture)
    this.add.tileSprite(worldW / 2, 380 + (worldH - 380) / 2, worldW, worldH - 380, 'tile_sand').setOrigin(0.5);
    const groundG = this.add.graphics(); // keep for compatibility

    // Desert hills/dunes in background
    const hills = this.add.graphics();
    hills.fillStyle(COLORS.pokSandDark, 0.6);
    hills.beginPath(); hills.moveTo(0, 380);
    for (let x = 0; x <= worldW; x += 4) hills.lineTo(x, 340 + Math.sin(x * 0.006) * 30 + Math.sin(x * 0.018) * 12);
    hills.lineTo(worldW, 380); hills.closePath(); hills.fill();
    hills.fillStyle(COLORS.pokSand, 0.8);
    hills.beginPath(); hills.moveTo(0, 380);
    for (let x = 0; x <= worldW; x += 4) hills.lineTo(x, 355 + Math.sin(x * 0.009 + 1) * 20 + Math.sin(x * 0.025) * 8);
    hills.lineTo(worldW, 380); hills.closePath(); hills.fill();

    // Acacia trees in background — SPRITE TEXTURES
    [80, 300, 550, 800, 1050].forEach(ax => {
      this.add.image(ax, 350, 'sprite_acacia').setScale(1.3).setDepth(3);
    });

    // Rocky outcrops
    [[200, 365, 8], [650, 370, 6], [950, 360, 7]].forEach(([rx, ry, rs]) => {
      hills.fillStyle(0x8B6B2F);
      hills.beginPath(); hills.moveTo(rx, ry); hills.lineTo(rx - rs, ry + rs); hills.lineTo(rx + rs * 0.8, ry + rs);
      hills.closePath(); hills.fill();
    });

    // Walking party sprites
    const partyY = 460;
    const sprites = ['nephi', 'sam', 'laman', 'lemuel'];
    const partyX = [100, 140, 200, 240];
    sprites.forEach((key, i) => {
      if (this.textures.exists(key)) {
        const spr = this.add.image(partyX[i], partyY, key).setScale(1.8).setDepth(10);
        this.tweens.add({ targets: spr, y: partyY - 2, duration: 500 + i * 100, yoyo: true, repeat: -1 });
      }
    });

    FX.createWindDust(this, { x: 0, y: 300, w: worldW, h: 300 });

    this.add.text(worldW / 2, 340, 'The Wilderness of Judea', {
      fontSize: '12px', fontFamily: 'monospace', color: '#c8a060', fontStyle: 'italic',
      stroke: '#000000', strokeThickness: 2
    }).setOrigin(0.5);

    // Travel narration then combat encounter
    this.time.delayedCall(800, () => {
      showDialogue(this, 'Narrator',
        'The family of Lehi travels three days into the wilderness. The desert is harsh, the sun relentless. But they press forward.',
        () => {
          showDialogue(this, 'Narrator',
            'On the second day, desert bandits appear on the road ahead!',
            () => {
              // Start battle
              this.cameras.main.flash(500, 255, 255, 255);
              this.time.delayedCall(500, () => {
                this.scene.pause();
                this.scene.launch('Battle', {
                  enemies: [
                    { name: 'Desert Bandit', hp: 40, maxHp: 40, attacks: [
                      { name: 'Slash', damage: 8, msg: 'The bandit slashes with a crude blade!' },
                      { name: 'Threaten', damage: 5, msg: 'The bandit shouts a threat!' },
                    ], spriteKey: 'bandit' },
                  ],
                  party: ['Nephi', 'Sam', 'Laman', 'Lemuel'],
                  returnScene: 'WildernessJourney',
                  onReturn: 'camp',
                });
              });
            }
          );
        }
      );
    });

    this.hud = createHUD(this);
  }

  setupCamp() {
    // Clear previous phase
    this.children.removeAll(true);
    this.phase = 'camp';

    AudioEngine.setTheme('wilderness');
    GameState.time.t = 0.8; // evening

    const worldW = 1200, worldH = 700;
    this.physics.world.setBounds(0, 0, worldW, worldH);
    this.cameras.main.setBounds(0, 0, worldW, worldH);

    this._lighting = FX.createLightingRig(this, { mode: 'night' });
    this._pause = attachPauseMenu(this);

    // Night sky (desert night)
    const skyG = this.add.graphics();
    skyG.fillStyle(0x101830);
    skyG.fillRect(0, 0, worldW, 260);
    skyG.fillStyle(0x182040, 0.5);
    skyG.fillRect(0, 200, worldW, 60);
    for (let i = 0; i < 80; i++) {
      const star = this.add.circle(Phaser.Math.Between(0, worldW), Phaser.Math.Between(0, 230),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.3, 0.9));
      if (i % 4 === 0) this.tweens.add({ targets: star, alpha: 0.2, duration: Phaser.Math.Between(800, 1500), yoyo: true, repeat: -1 });
    }

    // Desert valley ground — TILE SPRITE (pixel art sand)
    this.add.tileSprite(worldW / 2, 350 + (worldH - 350) / 2, worldW, worldH - 350, 'tile_sand').setOrigin(0.5);
    // Dirt path in camp area — TILE SPRITE
    this.add.tileSprite(500, 450, 600, 100, 'tile_dirt').setOrigin(0.5);
    const groundG = this.add.graphics(); // keep for compatibility

    // River Laman — TILE SPRITE (pixel art water)
    const riverG = this.add.graphics();

    riverG.fillStyle(COLORS.pokSandDark);

    // Water tile sprite
    this.add.tileSprite(worldW / 2, 530, worldW, 40, 'tile_water').setOrigin(0.5).setDepth(1);

    for (let rx = 0; rx < worldW; rx += 18) {
      riverG.fillStyle(0xffffff, 0.35);
      riverG.fillRect(rx + 3, 509, 8, 1);
      riverG.fillStyle(0x90c8ff, 0.3);

      fontSize: '11px', fontFamily: 'monospace', color: '#68b0ff', fontStyle: 'bold',
      stroke: '#000000', strokeThickness: 2
    }).setOrigin(0.5);

    // Valley walls (rocky desert cliffs, not green)
    const mtns = this.add.graphics();
    // Far cliff layer
    mtns.fillStyle(COLORS.pokCliffDark, 0.6);
    mtns.beginPath();
    mtns.moveTo(0, 350); mtns.lineTo(80, 270); mtns.lineTo(200, 300);
    mtns.lineTo(350, 250); mtns.lineTo(550, 285); mtns.lineTo(750, 260);
    mtns.lineTo(950, 280); mtns.lineTo(1100, 265); mtns.lineTo(1200, 290); mtns.lineTo(1200, 350);
    mtns.closePath(); mtns.fill();
    // Near cliff layer
    mtns.fillStyle(COLORS.pokCliff, 0.7);
    mtns.beginPath();
    mtns.moveTo(0, 350); mtns.lineTo(100, 310); mtns.lineTo(250, 330);
    mtns.lineTo(400, 300); mtns.lineTo(600, 320); mtns.lineTo(800, 305);
    mtns.lineTo(1000, 315); mtns.lineTo(1200, 310); mtns.lineTo(1200, 350);

    // Acacia trees on valley edges — SPRITE TEXTURES
    [100, 350, 650, 900, 1100].forEach(ax => {

      fontSize: '11px', fontFamily: 'monospace', color: '#ccaa88', fontStyle: 'bold',

    // Tents

      tent.fillRect(t.x - tw / 2, t.y - th / 2, tw, 3);
      tent.fillStyle(lighten(t.color, 20));
      tent.beginPath();
      tent.moveTo(t.x - tw / 2 - 4, t.y - th / 2);
      tent.lineTo(t.x, t.y - th / 2 - 22);
      tent.lineTo(t.x + tw / 2 + 4, t.y - th / 2);
      tent.closePath(); tent.fill();
      tent.fillStyle(darken(t.color, 30));
      tent.fillRect(t.x - 6, t.y - 4, 12, 18);
      if (t.label) {
        this.add.text(t.x, t.y - th / 2 - 28, t.label, {
          fontSize: '9px', fontFamily: 'monospace', color: '#f8d830',
          stroke: '#000000', strokeThickness: 2

      }

    // Campfire
    this.add.circle(400, 450, 6, 0xff6600, 0.8);
    this.add.circle(400, 448, 4, 0xffdd00, 0.9);
    try { FX.createCampfire(this, 400, 445); } catch(e) {}
    this._lighting.addLight(400, 445, 'light_warm_256', 0.8, 0.5, 0.25);

    // NPCs
    const createNPC = (key, x, y, name, scale) => {
      if (this.textures.exists(key)) this.add.image(x, y, key).setScale(scale || 1.8).setDepth(10);
      this.add.text(x, y - 26, name, { fontSize: '9px', fontFamily: 'monospace', color: '#ffd700' }).setOrigin(0.5).setDepth(11);
      const zone = this.add.zone(x, y, 50, 50);
      this.physics.add.existing(zone, true);
      return zone;
    };

    this.lehiZone = createNPC('lehi', 310, 445, 'Lehi', 2);
    this.samZone = createNPC('sam', 510, 448, 'Sam', 1.8);
    this.lamanZone = createNPC('laman', 800, 445, 'Laman', 1.8);
    this.lemuelZone = createNPC('lemuel', 840, 448, 'Lemuel', 1.6);

    // Hillside for prayer (quest marker)
    this.add.text(1050, 370, '\u26ea Prayer Hill', {
      fontSize: '9px', fontFamily: 'monospace', color: '#ffe088',
      stroke: '#000000', strokeThickness: 2
    }).setOrigin(0.5);
    this.prayerZone = this.add.zone(1050, 400, 80, 60);
    this.physics.add.existing(this.prayerZone, true);
    if (!GameState.questFlags.nephiPrayer) {
      const pMarker = this.add.text(1050, 355, '\u2757', { fontSize: '20px' }).setOrigin(0.5).setDepth(20);
      this.tweens.add({ targets: pMarker, y: 345, duration: 600, yoyo: true, repeat: -1 });
    }

    // Player
    if (this.textures.exists('nephi')) {
      this.player = this.add.image(200, 445, 'nephi').setScale(2).setDepth(15);
    } else {
      this.player = this.add.rectangle(200, 445, 20, 28, COLORS.faithBlue);
    }
    this.physics.add.existing(this.player);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setSize(20, 30);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

    // Overlap flags
    this.nearFlags = {};
    const zones = { lehi: this.lehiZone, sam: this.samZone, laman: this.lamanZone, lemuel: this.lemuelZone, prayer: this.prayerZone };
    Object.entries(zones).forEach(([key, zone]) => {
      this.nearFlags[key] = false;
      this.physics.add.overlap(this.player, zone, () => this.nearFlags[key] = true);
    });

    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey('SPACE');
    this.interactCooldown = 0;

    this.hud = createHUD(this);
    if (!GameState.questFlags.nephiPrayer) this.hud.setObjective(1050, 400);

    this.interactPrompt = this.add.text(0, 0, 'Press SPACE', {
      fontSize: '10px', fontFamily: 'monospace', color: '#ffd700',
      backgroundColor: '#00000088', padding: { x: 4, y: 2 }
    }).setOrigin(0.5).setDepth(80).setVisible(false);

    // Lehi's speeches cutscene
    if (!GameState.questFlags.lehiRiverSpeech) {
      GameState.questFlags.lehiRiverSpeech = true;
      this.time.delayedCall(500, () => {
        showDialogue(this, 'Lehi',
          'O Laman, my eldest son \u2014 I would that thou mightest be like unto this river, continually flowing into the fountain of all righteousness.',
          () => {
            showDialogue(this, 'Lehi',
              'And O Lemuel \u2014 I would that thou mightest be like unto this valley, firm and steadfast, and immovable in keeping the commandments of the Lord.',
              () => {
                showDialogue(this, 'Narrator',
                  'Laman and Lemuel murmur against their father. But Nephi feels something stirring in his heart. Perhaps the Lord will speak to him on the hillside.',
                  () => {
                    addJournal('Heard Lehi\'s plea to Laman and Lemuel by the river.');
                  }
                );
              }
            );
          }
        );
      });
    }
  }

  triggerNephiPrayer() {
    GameState.questFlags.nephiPrayer = true;
    AudioEngine.setTheme('spiritual');

    // Screen dims, golden light descends
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0).setDepth(200).setScrollFactor(0);
    this.tweens.add({ targets: overlay, alpha: 0.6, duration: 1000 });

    this.time.delayedCall(1000, () => {
      showDialogue(this, 'Narrator',
        'Nephi climbs the hillside and kneels to pray. He cries unto the Lord, desiring to know the truth of his father\'s words.',
        () => {
          // Golden light effect
          this.cameras.main.flash(1200, 255, 215, 0);
          AudioEngine.sfx.chime();

          // Particle burst
          const { particles: burst, emitter: burstEmitter } = createEmitterCompat(this, W / 2, H / 2, 'particle_spark', {
            speed: { min: 60, max: 200 },
            lifespan: { min: 600, max: 1200 },
            scale: { start: 0.5, end: 0 },
            alpha: { start: 1, end: 0 },
            quantity: 25,
            blendMode: 'ADD',
            tint: [0xffe066, 0xffd27a, 0xffffff],
          }, 221);
          if (burstEmitter && typeof burstEmitter.explode === 'function') burstEmitter.explode(30, W / 2, H / 2);

          this.time.delayedCall(800, () => {
            showDialogue(this, 'Narrator',
              '"And the Lord did soften my heart that I did believe all the words which had been spoken by my father; wherefore, I did not rebel against him like unto my brothers."',
              () => {
                showScriptureUnlock(this,
                  '1 Nephi 2:16',
                  'I, Nephi, being exceedingly young, did cry unto the Lord; and the Lord did visit me, and did soften my heart that I did believe all the words which had been spoken by my father.',
                  () => {
                    // MAJOR MILESTONE - Softened Heart ability
                    GameState.faith = Math.min(GameState.faith + 20, GameState.maxFaith);
                    GameState.testimony += 15;
                    gainFP(40);

                    // Fanfare
                    const fanfare = this.add.text(W / 2, H / 2 - 40, '\u2728 SOFTENED HEART \u2728', {
                      fontSize: '28px', fontFamily: 'Palatino Linotype, Book Antiqua, Palatino, serif',
                      color: '#ffd700', fontStyle: 'bold',
                      stroke: '#000000', strokeThickness: 4
                    }).setOrigin(0.5).setDepth(250).setScrollFactor(0).setAlpha(0);

                    const sub = this.add.text(W / 2, H / 2 + 10, 'Ability Unlocked! Faith +20, Testimony +15', {
                      fontSize: '14px', fontFamily: 'Georgia, serif', color: '#ffe088',
                      stroke: '#000000', strokeThickness: 2
                    }).setOrigin(0.5).setDepth(250).setScrollFactor(0).setAlpha(0);

                    this.tweens.add({ targets: fanfare, alpha: 1, scale: 1.1, duration: 600, yoyo: true, hold: 2000 });
                    this.tweens.add({ targets: sub, alpha: 1, duration: 600, delay: 300, yoyo: true, hold: 2000 });

                    this.time.delayedCall(3500, () => {
                      fanfare.destroy();
                      sub.destroy();
                      overlay.destroy();
                      AudioEngine.setTheme('wilderness');

                      addJournal('Nephi prayed and the Lord softened his heart. Softened Heart ability unlocked!');
                      this.hud.setObjective(510, 448); // Point to Sam next
                    });
                  }
                );
              }
            );
          });
        }
      );
    });
  }

  triggerSamConvinced() {
    GameState.questFlags.samConvinced = true;
    showDialogue(this, 'Nephi',
      'Sam, I have prayed to the Lord, and He has softened my heart. I know that Father speaks truth. The Lord visited me.',
      () => {
        showDialogue(this, 'Sam',
          'I believe you, Nephi. I have felt it too, though I could not find the words. I will follow you and Father wherever the Lord leads.',
          () => {
            GameState.companion = { name: 'Sam', title: 'Faithful Brother' };
            GameState.faith = Math.min(GameState.faith + 5, GameState.maxFaith);
            gainFP(10);
            addJournal('Sam believes! He joins as a faithful companion.');

            const msg = this.add.text(W / 2, H / 2, 'Sam joined as a faithful companion!', {
              fontSize: '16px', fontFamily: 'Georgia, serif', color: '#ffd700', fontStyle: 'bold',
              stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(200).setScrollFactor(0);
            this.tweens.add({ targets: msg, alpha: 0, duration: 800, delay: 2000, onComplete: () => msg.destroy() });

            // Now point to Lehi for brass plates command
            this.hud.setObjective(310, 445);
          }
        );
      }
    );
  }

  triggerBrassPlatesCommand() {
    GameState.questFlags.brassPlatesCommand = true;
    showDialogue(this, 'Lehi',
      'Nephi, the Lord has commanded me. You and your brothers must return to Jerusalem, to the house of Laban, and obtain the brass plates. They contain the record of the Jews and the genealogy of our fathers.',
      () => {
        showDialogue(this, 'Laman',
          'Return to Jerusalem? After we just escaped? This is a hard thing Father requires of us!',
          () => {
            showDialogue(this, 'Lemuel', 'How can we possibly get the plates from Laban? He is a powerful man with many guards!', () => {
              // THE EPIC MOMENT
              showDialogue(this, 'Nephi', 'How do you respond?', null, {
                choices: [
                  {
                    id: 'iwillgoanddo', text: '[Courage] "I will go and do the things which the Lord hath commanded"',
                    faithVsDoubt: 1, onSelect: () => {
                      // EPIC MOMENT
                      this.cameras.main.flash(1000, 255, 215, 0);
                      AudioEngine.sfx.chime();

                      const epicText = this.add.text(W / 2, H / 2 - 20,
                        '"I will go and do the things which\nthe Lord hath commanded, for I know\nthat the Lord giveth no commandments\nunto the children of men, save he shall\nprepare a way for them."', {
                        fontSize: '18px', fontFamily: 'Palatino Linotype, Book Antiqua, Palatino, serif',
                        color: '#ffd700', fontStyle: 'bold', align: 'center', lineSpacing: 8,
                        stroke: '#000000', strokeThickness: 4, wordWrap: { width: 600 }
                      }).setOrigin(0.5).setDepth(300).setScrollFactor(0).setAlpha(0);

                      this.tweens.add({ targets: epicText, alpha: 1, duration: 800 });

                      // Particle burst
                      const { particles: burst, emitter: burstEmitter } = createEmitterCompat(this, W / 2, H / 2, 'particle_spark', {
                        speed: { min: 80, max: 260 },
                        lifespan: { min: 500, max: 1200 },
                        scale: { start: 0.6, end: 0 },
                        alpha: { start: 1, end: 0 },
                        quantity: 30,
                        blendMode: 'ADD',
                        tint: [0xffe066, 0xffd27a, 0xffffff],
                      }, 301);
                      if (burstEmitter && typeof burstEmitter.explode === 'function') burstEmitter.explode(40, W / 2, H / 2);

                      GameState.faith = Math.min(GameState.faith + 25, GameState.maxFaith);
                      GameState.courage += 20;
                      gainFP(50);

                      this.time.delayedCall(3500, () => {
                        epicText.destroy();
                        showScriptureUnlock(this,
                          '1 Nephi 3:7',
                          'I will go and do the things which the Lord hath commanded, for I know that the Lord giveth no commandments unto the children of men, save he shall prepare a way for them that they may accomplish the thing which he commandeth them.',
                          () => {
                            addJournal('"I will go and do!" Courage +20, Faith +25. The defining moment.');
                            this.transitionToBrassPlates();
                          }
                        );
                      });
                    }
                  },
                  {
                    id: 'hesitation', text: '[Hesitation] "How can we do this?"',
                    faithVsDoubt: 0, onSelect: () => {
                      showDialogue(this, 'Lehi', 'The Lord will provide a way, Nephi. He always does. Trust in Him.', () => {
                        GameState.faith = Math.min(GameState.faith + 10, GameState.maxFaith);
                        GameState.courage += 10;
                        gainFP(20);
                        addJournal('Hesitated but then chose to go. Courage +10, Faith +10.');
                        this.transitionToBrassPlates();
                      });
                    }
                  },
                ]
              });
            });
          }
        );
      }
    );
  }

  transitionToBrassPlates() {
    this.cameras.main.fadeOut(1000);
    this.time.delayedCall(1000, () => {
      this.scene.start('ChapterTransition', {
        chapter: 'III', title: 'Return for the Brass Plates',
        quote: '"Let us be faithful in keeping the commandments of the Lord."  \u2014 1 Nephi 3:16',
        nextScene: 'BrassPlatesQuest'
      });
    });
  }

  update(time, delta) {
    this._lighting?.update(time);
    if (this.phase === 'travel') {
      this.hud?.update(null, 'sand');
      return;
    }
    if (this._pauseOpen || this._dialogueOpen) {
      if (this.player?.body) this.player.body.setVelocity(0);
      this.hud?.update(this.player, 'sand');
      return;
    }

    Object.keys(this.nearFlags).forEach(k => this.nearFlags[k] = false);

    const speed = 150;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) { this.player.body.setVelocityX(-speed); this.player.setFlipX(true); }
    if (this.cursors.right.isDown) { this.player.body.setVelocityX(speed); this.player.setFlipX(false); }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed);

    if (this.player.body.velocity.x !== 0 || this.player.body.velocity.y !== 0) {
      this.player.setScale(2, 2 + Math.sin(time * 0.01) * 0.05);
    } else {
      this.player.setScale(2);
    }

    this.interactPrompt.setVisible(false);
    const nf = this.nearFlags;
    if (nf.lehi) this.interactPrompt.setPosition(310, 415).setVisible(true);
    else if (nf.sam) this.interactPrompt.setPosition(510, 418).setVisible(true);
    else if (nf.laman) this.interactPrompt.setPosition(800, 415).setVisible(true);
    else if (nf.prayer) this.interactPrompt.setPosition(1050, 375).setVisible(true);

    if (this.interactCooldown > 0) this.interactCooldown -= delta;
    if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && this.interactCooldown <= 0) {
      this.interactCooldown = 500;

      if (nf.prayer && !GameState.questFlags.nephiPrayer && !this._dialogueOpen) {
        this.triggerNephiPrayer();
      }
      if (nf.sam && !this._dialogueOpen) {
        if (GameState.questFlags.nephiPrayer && !GameState.questFlags.samConvinced) {
          this.triggerSamConvinced();
        } else if (GameState.questFlags.samConvinced) {
          showDialogue(this, 'Sam', 'I am ready to go wherever the Lord leads, Nephi.');
        } else {
          showDialogue(this, 'Sam', 'Have you prayed yet, brother? The hillside to the east calls to you.');
        }
      }
      if (nf.lehi && !this._dialogueOpen) {
        if (GameState.questFlags.samConvinced && !GameState.questFlags.brassPlatesCommand) {
          this.triggerBrassPlatesCommand();
        } else if (GameState.questFlags.brassPlatesCommand) {
          showDialogue(this, 'Lehi', 'Go, my sons. Return to Jerusalem and obtain the brass plates. The Lord will prepare the way.');
        } else {
          showDialogue(this, 'Lehi', 'Pray, Nephi. Seek the Lord on the hillside. He will answer you.');
        }
      }
      if (nf.laman && !this._dialogueOpen) {
        showDialogue(this, 'Laman', 'Father drags us from our riches for dreams. I do not understand his visions.', () => {
          showDialogue(this, 'Nephi', '', null, {
            choices: [
              { id: 'encourage_laman', text: 'I understand it is hard. But the Lord has confirmed it.', compassionVsHarshness: 1, onSelect: () => {
                showDialogue(this, 'Laman', '...Perhaps. But it is still hard to leave everything behind.');
                gainFP(5);
              }},
              { id: 'rebuke_laman', text: 'The Lord has spoken. We must obey.', faithVsDoubt: 1, onSelect: () => {
                showDialogue(this, 'Laman', 'You sound more like Father every day.');
              }},
            ]
          });
        });
      }
    }

    this.hud?.update(this.player, 'sand');
  }
}


// ============================================================
// SCENE 3: BRASS PLATES QUEST — Return for the Plates (1 Nephi 3-4)
// ============================================================
class BrassPlatesQuestScene extends Phaser.Scene {
  constructor() { super('BrassPlatesQuest'); }

  create() {
    AudioEngine.setTheme('jerusalem');
    this.cameras.main.fadeIn(800);
    GameState.chapter = { book: '1 Nephi', chapter: 3, label: '1 Nephi \u00b7 Ch. 3-4' };

    this.attempt = GameState.questFlags.attempt1 ? (GameState.questFlags.attempt2 ? 3 : 2) : 1;
    this.setupAttempt(this.attempt);
  }

  setupAttempt(num) {
    this.children.removeAll(true);
    this._pause = attachPauseMenu(this);

    if (num === 1) this.runAttempt1();
    else if (num === 2) this.runAttempt2();
    else this.runAttempt3();
  }

  // ATTEMPT 1: Laman goes to Laban
  runAttempt1() {
    this._lighting = FX.createLightingRig(this, { mode: 'night' });

    // Simple scene: outside Laban's house
    const bg = this.add.graphics();
    bg.fillStyle(0x182848);
    bg.fillRect(0, 0, W, H);
    drawPokemonPath(bg, 0, 400, W, H - 400);

    // Laban's house
    drawPokemonBuilding(bg, 300, 280, 200, 180, 0x8B0000, 0xd0c0a0);
    this.add.text(400, 270, "Laban's House", {
      fontSize: '12px', fontFamily: 'monospace', color: '#ffaaaa',
      stroke: '#000000', strokeThickness: 2
    }).setOrigin(0.5);

    // Guards
    if (this.textures.exists('guard')) {
      this.add.image(320, 460, 'guard').setScale(1.5);
      this.add.image(480, 460, 'guard').setScale(1.5).setFlipX(true);
    }

    // Brothers waiting outside
    const waiting = ['nephi', 'sam', 'lemuel'];
    waiting.forEach((key, i) => {
      if (this.textures.exists(key)) this.add.image(100 + i * 40, 500, key).setScale(1.5).setDepth(10);
    });

    this.hud = createHUD(this);

    this.time.delayedCall(500, () => {
      showDialogue(this, 'Narrator',
        'The brothers return to Jerusalem. They cast lots, and the lot falls upon Laman to go in unto the house of Laban and speak with him.',
        () => {
          showDialogue(this, 'Laman', 'Fine. I will go. Wait here.', () => {
            // Laman enters (brief cutscene)
            if (this.textures.exists('laman')) {
              const lamanSpr = this.add.image(200, 500, 'laman').setScale(1.5).setDepth(12);
              this.tweens.add({ targets: lamanSpr, x: 400, y: 430, duration: 1500, onComplete: () => {
                lamanSpr.setAlpha(0.3);
                this.time.delayedCall(2000, () => {
                  // Laman flees back
                  lamanSpr.setAlpha(1);
                  this.tweens.add({ targets: lamanSpr, x: 200, y: 500, duration: 800, ease: 'Cubic.easeOut' });
                  this.cameras.main.shake(200, 0.005);
                  showDialogue(this, 'Laman',
                    'He called me a robber and threatened to kill me! Laban is angry and will not give up the plates!',
                    () => {
                      showDialogue(this, 'Laman', 'Let us go back to Father. This is impossible.', () => {
                        showDialogue(this, 'Lemuel', 'I agree. This task cannot be done.', () => {
                          showDialogue(this, 'Nephi', '', null, {
                            choices: [
                              { id: 'press_forward', text: '[Press forward] "The Lord will provide. Let us try another way."', faithVsDoubt: 1, onSelect: () => {
                                GameState.questFlags.attempt1 = true;
                                GameState.faith = Math.min(GameState.faith + 5, GameState.maxFaith);
                                gainFP(10);
                                addJournal('First attempt failed. Laman rejected by Laban. Nephi pressed forward.');
                                this.setupAttempt(2);
                              }},
                              { id: 'encourage', text: '[Encourage] "Let us try with our family wealth."', onSelect: () => {
                                GameState.questFlags.attempt1 = true;
                                gainFP(5);
                                addJournal('First attempt failed. Nephi encouraged another try with wealth.');
                                this.setupAttempt(2);
                              }},
                            ]
                          });
                        });
                      });
                    }
                  );
                });
              }});
            } else {
              // Fallback without sprite
              this.time.delayedCall(2500, () => {
                GameState.questFlags.attempt1 = true;
                showDialogue(this, 'Laman', 'Laban rejected me! He called me a robber!', () => {
                  this.setupAttempt(2);
                });
              });
            }
          });
        }
      );
    });
  }

  // ATTEMPT 2: The family wealth
  runAttempt2() {
    this._lighting = FX.createLightingRig(this, { mode: 'night' });

    const bg = this.add.graphics();
    bg.fillStyle(0x182848);
    bg.fillRect(0, 0, W, H);
    drawPokemonPath(bg, 0, 400, W, H - 400);
    drawPokemonBuilding(bg, 300, 280, 200, 180, 0x8B0000, 0xd0c0a0);

    this.hud = createHUD(this);

    this.time.delayedCall(500, () => {
      showDialogue(this, 'Nephi',
        'We returned to our father\'s abandoned house and gathered our gold, silver, and precious things. Surely Laban will trade the plates for such wealth!',
        () => {
          // Brief collecting scene
          const items = ['Gold', 'Silver', 'Precious Things'];
          let itemIdx = 0;
          const showItem = () => {
            if (itemIdx >= items.length) {
              this.offerToLaban();
              return;
            }
            const item = items[itemIdx];
            const msg = this.add.text(W / 2, H / 2, `Found: ${item}!`, {
              fontSize: '18px', fontFamily: 'Georgia, serif', color: '#ffd700', fontStyle: 'bold',
              stroke: '#000000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(200);
            AudioEngine.sfx.click();
            this.tweens.add({ targets: msg, alpha: 0, y: H / 2 - 40, duration: 1200, delay: 600, onComplete: () => {
              msg.destroy();
              itemIdx++;
              showItem();
            }});
          };
          showItem();
        }
      );
    });
  }

  offerToLaban() {
    showDialogue(this, 'Narrator',
      'The brothers bring their family wealth to Laban. He sees the gold and silver, and his eyes gleam with greed.',
      () => {
        showDialogue(this, 'Narrator',
          'But Laban takes the wealth and sends his guards to kill them! The brothers flee for their lives.',
          () => {
            this.cameras.main.shake(400, 0.01);
            AudioEngine.sfx.whoosh();
            // Battle with Laban's guards
            this.cameras.main.flash(500, 255, 255, 255);
            this.time.delayedCall(500, () => {
              this.scene.pause();
              this.scene.launch('Battle', {
                enemies: [
                  { name: "Laban's Guard", hp: 50, maxHp: 50, attacks: [
                    { name: 'Sword Strike', damage: 10, msg: "The guard strikes with his sword!" },
                    { name: 'Shield Bash', damage: 7, msg: "The guard bashes with his shield!" },
                  ], spriteKey: 'guard' },
                  { name: "Laban's Guard", hp: 45, maxHp: 45, attacks: [
                    { name: 'Sword Strike', damage: 10, msg: "The guard strikes with his sword!" },
                    { name: 'Intimidate', damage: 5, msg: "The guard shouts a war cry!" },
                  ], spriteKey: 'guard' },

    this._lighting = FX.createLightingRig(this, { mode: 'night' });

    bg.fillStyle(0x0a0a10);
    bg.fillRect(0, 0, W, H);
    // Cave walls
    bg.fillStyle(0x2a2018);
    bg.fillRect(40, 40, W - 80, H - 80);
    bg.fillStyle(0x1a1008, 0.5);
    bg.fillRect(60, 60, W - 120, H - 120);

    this.time.delayedCall(500, () => {
      showDialogue(this, 'Narrator',
        'The brothers escape to a cave outside the city walls. Laman and Lemuel, furious and afraid, begin to beat Nephi and Sam with a rod.',
        () => {
          this.cameras.main.shake(300, 0.008);
          showDialogue(this, 'Narrator',
            'They blame their brothers for this disaster. All their family wealth is gone, and Laban still has the plates.',
            () => {

              this.cameras.main.flash(800, 255, 255, 255);

                  // Glow around angel

                  glow.setBlendMode(Phaser.BlendModes.SCREEN);
                  this.tweens.add({ targets: glow, alpha: 0.3, duration: 800 });
                }

                  () => {

                      'The angel departs. Laman and Lemuel murmur still: "How is it possible that the Lord will deliver Laban into our hands? He commands fifty men. He can slay fifty."',

                          'But Nephi will not turn back. Despite everything, he rises.',
                          () => {

  // ATTEMPT 3: Nephi alone (THE CLIMACTIC MISSION)
  runAttempt3() {
    AudioEngine.setTheme('jerusalem');
    GameState.time.t = 0.9;
    this._lighting = FX.createLightingRig(this, { mode: 'night' });
    this._lighting.setAmbient(0.45);

    const worldW = 1400, worldH = 700;
    this.physics.world.setBounds(0, 0, worldW, worldH);
    this.cameras.main.setBounds(0, 0, worldW, worldH);

    // Dark Jerusalem streets at night
    const bg = this.add.graphics();
    bg.fillStyle(0x0a0818);
    bg.fillRect(0, 0, worldW, worldH);
    drawPokemonPath(bg, 0, 400, worldW, worldH - 400);

    // Stars
    for (let i = 0; i < 40; i++) {
      this.add.circle(Phaser.Math.Between(0, worldW), Phaser.Math.Between(0, 300),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.7));
    }

    // Buildings (dark silhouettes)
    const bldgG = this.add.graphics();
    [
      { x: 50, y: 350, w: 80, h: 110 },
      { x: 180, y: 360, w: 70, h: 100 },
      { x: 400, y: 345, w: 90, h: 115 },
      { x: 600, y: 355, w: 75, h: 105 },
      { x: 800, y: 350, w: 85, h: 110 },
      { x: 1000, y: 360, w: 80, h: 100 },
      { x: 1200, y: 345, w: 90, h: 115 },
    ].forEach(b => {
      bldgG.fillStyle(0x18120a);
      bldgG.fillRect(b.x, b.y, b.w, b.h);
      // Occasional dim window
      if (Math.random() > 0.5) {
        bldgG.fillStyle(0xffdd88, 0.15);
        bldgG.fillRect(b.x + 15, b.y + 20, 10, 12);
      }
    });

    // Guards with sight cones (stealth section)
    this.guards = [];
    const guardPositions = [
      { x: 300, y: 490, patrol: 'h', range: 100 },
      { x: 600, y: 480, patrol: 'h', range: 80 },
      { x: 900, y: 490, patrol: 'v', range: 60 },
    ];
    guardPositions.forEach(gp => {
      let guard;
      if (this.textures.exists('guard')) {
        guard = this.add.image(gp.x, gp.y, 'guard').setScale(1.5).setDepth(14);
      } else {
        guard = this.add.rectangle(gp.x, gp.y, 16, 24, COLORS.red).setDepth(14);
      }
      const cone = this.add.triangle(gp.x, gp.y, 0, 0, 80, -28, 80, 28, 0xff6666, 0.08).setOrigin(0, 0.5).setDepth(13);
      this.tweens.add({
        targets: guard,
        x: gp.patrol === 'h' ? gp.x + gp.range : gp.x,
        y: gp.patrol === 'v' ? gp.y + gp.range : gp.y,
        duration: 2400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });
      this.guards.push({ sprite: guard, cone, lastX: gp.x, lastY: gp.y });
    });

    // Laban (passed out at far right)
    if (this.textures.exists('laban')) {
      this.labanSprite = this.add.image(1250, 500, 'laban').setScale(2).setDepth(10);
      // Laban on his side (rotated)
      this.labanSprite.setAngle(90);
    }
    this.add.text(1250, 470, 'Laban (drunk)', {
      fontSize: '9px', fontFamily: 'monospace', color: '#cc6666',
      stroke: '#000000', strokeThickness: 2
    }).setOrigin(0.5).setDepth(11);

    this.labanZone = this.add.zone(1250, 500, 60, 60);
    this.physics.add.existing(this.labanZone, true);

    // Player (Nephi alone)
    if (this.textures.exists('nephi')) {
      this.player = this.add.image(50, 500, 'nephi').setScale(2).setDepth(15);
    } else {
      this.player = this.add.rectangle(50, 500, 16, 22, COLORS.faithBlue);
    }
    this.physics.add.existing(this.player);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setSize(20, 30);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

    this.nearLaban = false;
    this.physics.add.overlap(this.player, this.labanZone, () => this.nearLaban = true);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey('SPACE');
    this.interactCooldown = 0;
    this.stealthPhase = true;
    this.labanPhase = false;
    this.caughtCooldown = false;

    this.hud = createHUD(this);
    this.hud.setObjective(1250, 500);

    this.interactPrompt = this.add.text(0, 0, 'Press SPACE', {
      fontSize: '10px', fontFamily: 'monospace', color: '#ffd700',
      backgroundColor: '#00000088', padding: { x: 4, y: 2 }
    }).setOrigin(0.5).setDepth(80).setVisible(false);

    this.add.text(W / 2, 70, 'Sneak through the streets to find Laban', {
      fontSize: '12px', fontFamily: 'monospace', color: '#ffd700',
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setScrollFactor(0).setDepth(100);

    this.time.delayedCall(500, () => {
      showDialogue(this, 'Nephi',
        'I am led by the Spirit, not knowing beforehand what I should do. But I must be faithful. I go alone into Jerusalem by night.',
        () => {
          addJournal('Nephi enters Jerusalem alone at night, led by the Spirit.');
        }
      );
    });
  }

  triggerLabanDecision() {
    this.labanPhase = true;
    this.stealthPhase = false;
    this.spiritCount = 0;

    showDialogue(this, 'Narrator',
      'Nephi finds Laban fallen to the earth, drunk with wine. His own sword lies by his side.',
      () => {
        this.showSpiritPrompt();
      }
    );
  }

  showSpiritPrompt() {
    this.spiritCount++;
    if (this.spiritCount === 1) {
      showDialogue(this, 'The Spirit',
        'Slay him, for the Lord hath delivered him into thy hands.',
        () => {
          showDialogue(this, 'Nephi', '', null, {
            choices: [
              { id: 'obey_spirit', text: '[Obey] Trust the Spirit and obey.', faithVsDoubt: 1, onSelect: () => { this.completeLabanScene(); }},
              { id: 'hesitate_1', text: '[Hesitate] I have never shed the blood of man...', onSelect: () => { this.showSpiritPrompt(); }},
            ]
          });
        }
      );
    } else if (this.spiritCount === 2) {
      showDialogue(this, 'The Spirit',
        'Behold, the Lord hath delivered him into thy hands. The Lord slayeth the wicked to bring forth His righteous purposes. It is better that one man should perish than that a nation should dwindle and perish in unbelief.',
        () => {
          showDialogue(this, 'Nephi', '', null, {
            choices: [
              { id: 'obey_spirit_2', text: '[Obey] The Lord has spoken. I will obey.', faithVsDoubt: 1, onSelect: () => { this.completeLabanScene(); }},
              { id: 'hesitate_2', text: '[Hesitate] This is the hardest thing I have ever faced...', onSelect: () => { this.showSpiritPrompt(); }},
            ]
          });
        }
      );
    } else {
      showDialogue(this, 'The Spirit',
        'Slay him, for the Lord hath delivered him into thy hands. Behold, the Lord commandeth thee. This is for the sake of all thy seed, and all the children of men.',
        () => {
          showDialogue(this, 'Narrator',
            'The Spirit speaks a third time. Nephi remembers the commandments. Without these records, his people will dwindle in unbelief. This is not about Laban \u2014 it is about the generations who will need these scriptures.',
            () => {
              this.completeLabanScene();
            }
          );
        }
      );
    }
  }

    GameState.questFlags.labanDefeated = true;
    GameState.questFlags.attempt3 = true;

    // Reverent, not graphic — focus on spiritual weight
    AudioEngine.setTheme('spiritual');
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0).setDepth(200).setScrollFactor(0);

    this.time.delayedCall(1200, () => {
      showDialogue(this, 'Narrator',
        'Nephi obeys the voice of the Spirit. He takes Laban\'s sword, and does as the Lord has commanded. This is the hardest act of obedience Nephi has ever faced, but he trusts in the Lord.',
        () => {
          GameState.faith = Math.min(GameState.faith + 15, GameState.maxFaith);
          GameState.courage += 10;

          // Equipment upgrade
          GameState.inventory.push("Laban's Armor");

          this.tweens.add({ targets: equipMsg, alpha: 1, duration: 600, yoyo: true, hold: 2000, onComplete: () => equipMsg.destroy() });

          addJournal('Nephi obeyed the Spirit regarding Laban. Obtained Laban\'s armor and sword.');

          this.time.delayedCall(3500, () => {

  update(time, delta) {
    this._lighting?.update(time);
    if (!this.stealthPhase || !this.player) {
      this.hud?.update(null, 'stone');
      return;
    }
    if (this._pauseOpen || this._dialogueOpen) {
      if (this.player?.body) this.player.body.setVelocity(0);
      this.hud?.update(this.player, 'stone');
      return;
    }

    this.nearLaban = false;

    const speed = 130;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) { this.player.body.setVelocityX(-speed); this.player.setFlipX(true); }
    if (this.cursors.right.isDown) { this.player.body.setVelocityX(speed); this.player.setFlipX(false); }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed);

    if (this.player.body.velocity.x !== 0 || this.player.body.velocity.y !== 0) {
      this.player.setScale(2, 2 + Math.sin(time * 0.01) * 0.05);
    } else {
      this.player.setScale(2);
    }

    // Guard detection
    if (this.guards && !this.caughtCooldown) {
      for (const g of this.guards) {
        const dx = g.sprite.x - g.lastX;
        const dy = g.sprite.y - g.lastY;
        if (Math.abs(dx) + Math.abs(dy) > 0.05) {
          g.cone.rotation = Math.atan2(dy, dx);
          g.lastX = g.sprite.x;
          g.lastY = g.sprite.y;
        }
        g.cone.x = g.sprite.x;
        g.cone.y = g.sprite.y;

        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, g.sprite.x, g.sprite.y);
        if (dist < 55) {
          this.caughtCooldown = true;
          this.cameras.main.shake(200, 0.008);
          showDialogue(this, 'Guard', 'Who goes there!?', () => {
            showDialogue(this, 'Narrator', 'You duck into the shadows and escape. Be more careful!', () => {
              GameState.faith = Math.max(GameState.faith - 3, 10);
              this.time.delayedCall(2000, () => { this.caughtCooldown = false; });
            });
          });
          break;
        }
      }
    }

    // Near Laban
    this.interactPrompt.setVisible(false);
    if (this.nearLaban) {
      this.interactPrompt.setPosition(1250, 450).setVisible(true);
    }

    if (this.interactCooldown > 0) this.interactCooldown -= delta;
    if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && this.interactCooldown <= 0) {
      this.interactCooldown = 500;
      if (this.nearLaban && !GameState.questFlags.labanDefeated && !this._dialogueOpen) {
        this.triggerLabanDecision();
      }
    }

    this.hud?.update(this.player, 'stone');
  }
}


// ============================================================
// SCENE: BATTLE — Reusable Pokemon-style turn-based combat
// ============================================================
class BattleScene extends Phaser.Scene {
  constructor() { super('Battle'); }

  init(data) {
    this.returnScene = data.returnScene || 'WorldMap';
    this.enemyConfigs = data.enemies || [{ name: 'Doubt', hp: 80, maxHp: 80, attacks: [
      { name: 'Whisper of Doubt', damage: 8, msg: 'Doubt whispers: "Are you sure?"' },
      { name: 'Cloud of Confusion', damage: 12, msg: 'Doubt clouds your mind!' },
    ], spriteKey: 'doubt' }];
    this.partyNames = data.party || ['Nephi'];
    this.onReturnAction = data.onReturn || null;
  }

  create() {
    AudioEngine.setTheme('battle');
    this._pause = attachPauseMenu(this);
    this._lighting = FX.createLightingRig(this, { mode: 'night', space: 'screen' });
    this._lighting.setAmbient(0.25);
    this._lighting.addLight(230, 360, 'light_warm_256', 1.0, 0.12, 0.05);
    this._lighting.addLight(580, 200, 'light_cool_256', 1.4, 0.10, 0.04);

    this.cameras.main.fadeIn(300);

    // Background
    this.add.rectangle(W / 2, H / 2, W, H, 0x1a1a2e);
    this.add.rectangle(W / 2, H - 150, W, 300, COLORS.darkSand, 0.4);
    this.add.rectangle(W / 2, H - 200, W, 100, COLORS.sand, 0.15);

    // Enemy platform
    this.add.ellipse(580, 240, 180, 35, COLORS.darkSand, 0.6);
    // Player platform
    this.add.ellipse(220, 400, 180, 35, COLORS.darkSand, 0.6);

    // Current enemy (first enemy from config)
    this.currentEnemyIdx = 0;
    const ec = this.enemyConfigs[this.currentEnemyIdx];
    this.enemy = { name: ec.name, hp: ec.hp, maxHp: ec.maxHp, attacks: ec.attacks };

    const sprKey = ec.spriteKey || 'doubt';
    if (this.textures.exists(sprKey)) {
      this.enemy.sprite = this.add.image(580, 200, sprKey).setScale(2.5);
    } else {
      this.enemy.sprite = this.add.rectangle(580, 200, 50, 60, COLORS.mist).setStrokeStyle(2, 0x556677);
    }

    this.add.text(580, 270, `A ${ec.name} appeared!`, {
      fontSize: '12px', fontFamily: 'monospace', color: '#aabbcc'
    }).setOrigin(0.5);

    // Party display on left
    const partyKeys = { 'Nephi': 'nephi', 'Sam': 'sam', 'Laman': 'laman', 'Lemuel': 'lemuel' };
    this.partyNames.forEach((name, i) => {
      const key = partyKeys[name] || 'nephi';
      if (this.textures.exists(key)) {
        this.add.image(180 + i * 30, 370 - i * 10, key).setScale(2 - i * 0.2).setDepth(10 - i);
      }
    });

    // Enemy HP bar
    this.add.rectangle(580, 140, 164, 14, 0x222222).setStrokeStyle(1, 0x555555);
    this.enemyHpBar = this.add.rectangle(500, 134, 156, 8, COLORS.red).setOrigin(0);
    this.add.text(580, 122, ec.name.toUpperCase(), {
      fontSize: '12px', fontFamily: 'monospace', color: '#aabbcc', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.enemyHpText = this.add.text(665, 131, `${this.enemy.hp}/${this.enemy.maxHp}`, {
      fontSize: '10px', fontFamily: 'monospace', color: '#cccccc'
    });

    // Player HP bar
    this.add.rectangle(220, 430, 164, 14, 0x222222).setStrokeStyle(1, 0x555555);
    this.playerHpBar = this.add.rectangle(140, 424, 156, 8, COLORS.green).setOrigin(0);
    this.add.text(220, 415, `${GameState.playerName}`, {
      fontSize: '12px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.playerHpText = this.add.text(305, 421, `${GameState.faith}/${GameState.maxFaith}`, {
      fontSize: '10px', fontFamily: 'monospace', color: '#cccccc'
    });

    this.createBattleMenu();
    this.battleLog = this.add.text(W / 2, H - 30, '', {
      fontSize: '11px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(0.5).setDepth(50);

    this.playerTurn = true;
    this.animating = false;
    this.currentPartyMember = 0;
  }

  createBattleMenu() {
    const menuBg = this.add.image(W / 2, H - 92, 'ui_parchment_wide').setDepth(40);
    menuBg.setDisplaySize(W - 36, 150);
    const menuShade = this.add.rectangle(W / 2, H - 92, W - 36, 150, 0x000000, 0.18).setDepth(40);
    menuShade.setBlendMode(Phaser.BlendModes.MULTIPLY);
    const menuBorder = this.add.rectangle(W / 2, H - 92, W - 36, 150, 0x000000, 0).setDepth(40);
    menuBorder.setStrokeStyle(2, COLORS.gold, 0.75);

    this.menuItems = [];
    const moves = [
      { name: '\u2694\uFE0F Faith Strike', desc: 'A faithful blow', stat: 'faith', power: 15, cost: 0 },
      { name: '\uD83D\uDCD6 Scripture Power', desc: 'Quote truth', stat: 'testimony', power: 25, cost: 0, superEffective: true },
      { name: '\uD83D\uDEE1\uFE0F Pray Always', desc: 'Restore faith', stat: 'charity', power: 0, heal: 20, cost: 0 },
      { name: '\u2728 "I Will Go"', desc: 'Never misses!', stat: 'courage', power: 20, cost: 0, neverMiss: true },
    ];

    moves.forEach((move, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const bx = 120 + col * 320;
      const by = H - 130 + row * 40;

      const btn = this.add.rectangle(bx + 130, by + 10, 290, 34, 0x16213e, 0.78)
        .setStrokeStyle(1, 0x334455, 0.7).setDepth(41).setInteractive({ useHandCursor: true });
      const txt = this.add.text(bx + 10, by, move.name, {
        fontSize: '13px', fontFamily: 'monospace', color: '#ffffff'
      }).setDepth(42);
      const descTxt = this.add.text(bx + 10, by + 16, move.desc, {
        fontSize: '9px', fontFamily: 'monospace', color: '#888888'
      }).setDepth(42);

      btn.on('pointerover', () => btn.setFillStyle(0x2a3a5e, 0.88));
      btn.on('pointerout', () => btn.setFillStyle(0x16213e, 0.78));
      btn.on('pointerdown', () => {
        if (this.playerTurn && !this.animating) this.playerAttack(move);
      });
      this.menuItems.push({ btn, txt, descTxt });
    });
  }

  playerAttack(move) {
    this.animating = true;
    this.playerTurn = false;

    if (move.heal) {
      GameState.faith = Math.min(GameState.faith + move.heal, GameState.maxFaith);
      AudioEngine.sfx.chime();
      this.cameras.main.flash(300, 100, 200, 255);
      this.battleLog.setText(`You prayed and restored ${move.heal} faith!`);
      this.updateBars();
      this.time.delayedCall(1200, () => this.partyTurns());
      return;
    }

    let damage = move.power + Math.floor((GameState[move.stat] || 0) / 5);
    let message = `Used ${move.name}!`;

    if (move.superEffective) {
      damage = Math.floor(damage * 1.5);
      message += ' Super effective!';
    }
    damage = Math.floor(damage * (0.85 + Math.random() * 0.3));
    if (damage < 1) damage = 1;

    this.enemy.hp = Math.max(0, this.enemy.hp - damage);
    this.battleLog.setText(`${message} Dealt ${damage} damage!`);
    AudioEngine.sfx.whoosh();

    const { particles: hit, emitter: hitEmitter } = createEmitterCompat(this, this.enemy.sprite.x, this.enemy.sprite.y, 'particle_spark', {
      speed: { min: 80, max: 240 },
      lifespan: { min: 280, max: 650 },
      scale: { start: 0.45, end: 0 },
      alpha: { start: 1, end: 0 },
      quantity: 14,
      blendMode: 'ADD',
      tint: [0xffe066, 0xffffff, 0xffaa44],
    }, 60);
    if (hitEmitter && typeof hitEmitter.explode === 'function') hitEmitter.explode(18, this.enemy.sprite.x, this.enemy.sprite.y);
    this.time.delayedCall(700, () => hit.destroy());

    this.tweens.add({ targets: this.enemy.sprite, x: this.enemy.sprite.x + 10, duration: 50, yoyo: true, repeat: 3 });
    this.cameras.main.flash(100, 255, 255, 255);
    this.updateBars();

    if (this.enemy.hp <= 0) {
      this.time.delayedCall(800, () => this.checkNextEnemy());
    } else {
      this.time.delayedCall(1200, () => this.partyTurns());
    }
  }

  partyTurns() {
    // Party members attack automatically
    const partyAttackers = this.partyNames.slice(1); // Skip Nephi (player)
    let idx = 0;
    const doNext = () => {
      if (idx >= partyAttackers.length || this.enemy.hp <= 0) {
        if (this.enemy.hp <= 0) {
          this.time.delayedCall(400, () => this.checkNextEnemy());
        } else {
          this.time.delayedCall(600, () => this.enemyTurn());
        }
        return;
      }
      const member = partyAttackers[idx];
      idx++;

      // Laman/Lemuel sometimes refuse to fight (20% chance)
      if ((member === 'Laman' || member === 'Lemuel') && Math.random() < 0.2) {
        this.battleLog.setText(`${member} is murmuring! Skipped turn.`);
        this.time.delayedCall(800, doNext);
        return;
      }

      const damage = Math.floor(8 + Math.random() * 6);
      this.enemy.hp = Math.max(0, this.enemy.hp - damage);
      this.battleLog.setText(`${member} attacks for ${damage} damage!`);
      this.tweens.add({ targets: this.enemy.sprite, x: this.enemy.sprite.x + 6, duration: 40, yoyo: true, repeat: 2 });
      this.updateBars();
      this.time.delayedCall(700, doNext);
    };
    doNext();
  }

  enemyTurn() {
    const attacks = this.enemy.attacks || [
      { name: 'Attack', damage: 10, msg: 'The enemy attacks!' },
    ];
    const attack = attacks[Phaser.Math.Between(0, attacks.length - 1)];
    let damage = attack.damage - Math.floor((GameState.courage || 0) / 10);
    if (damage < 1) damage = 1;

    GameState.faith = Math.max(0, GameState.faith - damage);
    this.battleLog.setText(`${attack.msg} Lost ${damage} faith.`);

    this.cameras.main.shake(200, 0.005);
    this.updateBars();

    if (GameState.faith <= 0) {
      this.time.delayedCall(800, () => {
        GameState.faith = Math.floor(GameState.maxFaith * 0.3);
        showDialogue(this, 'Nephi', 'Do not give up! The Lord is with us. We try again.', () => {
          this.enemy.hp = this.enemy.maxHp;
          this.updateBars();
          this.playerTurn = true;
          this.animating = false;
        });
      });
    } else {
      this.time.delayedCall(800, () => {
        this.playerTurn = true;
        this.animating = false;
      });
    }
  }

  checkNextEnemy() {
    this.currentEnemyIdx++;
    if (this.currentEnemyIdx < this.enemyConfigs.length) {
      // Next enemy
      const ec = this.enemyConfigs[this.currentEnemyIdx];
      this.tweens.add({ targets: this.enemy.sprite, alpha: 0, duration: 500, onComplete: () => {
        this.enemy.name = ec.name;
        this.enemy.hp = ec.hp;
        this.enemy.maxHp = ec.maxHp;
        this.enemy.attacks = ec.attacks;
        const sprKey = ec.spriteKey || 'doubt';
        if (this.textures.exists(sprKey)) {
          this.enemy.sprite.setTexture(sprKey);
        }
        this.enemy.sprite.setAlpha(1);
        this.updateBars();
        this.battleLog.setText(`A ${ec.name} appears!`);
        this.playerTurn = true;
        this.animating = false;
      }});
    } else {
      this.victory();
    }
  }

  updateBars() {
    const enemyRatio = Math.max(0, this.enemy.hp / this.enemy.maxHp);
    this.tweens.add({ targets: this.enemyHpBar, displayWidth: 156 * enemyRatio, duration: 300 });
    this.enemyHpText.setText(`${this.enemy.hp}/${this.enemy.maxHp}`);

    const playerRatio = Math.max(0, GameState.faith / GameState.maxFaith);
    this.tweens.add({ targets: this.playerHpBar, displayWidth: 156 * playerRatio, duration: 300 });
    this.playerHpText.setText(`${GameState.faith}/${GameState.maxFaith}`);
  }

  victory() {
    GameState.battleWon = true;
    gainFP(30);
    GameState.faith = Math.min(GameState.faith + 15, GameState.maxFaith);

    this.tweens.add({ targets: this.enemy.sprite, alpha: 0, scale: 0, duration: 800 });

    this.battleLog.setText('');
    showDialogue(this, 'Narrator', 'Victory! The Lord has given you strength in the trial.', () => {
      this.cameras.main.fadeOut(500);
      this.time.delayedCall(500, () => {
        saveGame({ scene: this.returnScene, milestone: 'battle_won' });
        this.scene.stop();
        const returnedScene = this.scene.get(this.returnScene);
        if (this.onReturnAction && returnedScene && typeof returnedScene[this.onReturnAction] === 'function') {
          this.scene.resume(this.returnScene);
          returnedScene[this.onReturnAction]();
        } else if (this.onReturnAction === 'camp' && returnedScene && typeof returnedScene.setupCamp === 'function') {
          this.scene.resume(this.returnScene);
          returnedScene.setupCamp();
        } else {
          this.scene.resume(this.returnScene);
        }
      });
    });
  }

  update(time) {
    this._lighting?.update(time);
  }
}
