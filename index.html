<style>

canvas { image-rendering: pixelated; }
</style>

<body>
<script>
// ============================================================
// BOOK OF MORMON RPG — PHASER.JS GAME
// ============================================================

// --- CONSTANTS ---
const W = 800, H = 600;
const TILE = 32;
const COLORS = {
  sand: 0xd4a574, darkSand: 0xb8956a, gold: 0xffd700, olive: 0x6b8e23,
  deepBlue: 0x16213e, skyBlue: 0x87ceeb, nightBlue: 0x0f3460, white: 0xffffff,
  red: 0xc0392b, darkRed: 0x8b0000, green: 0x27ae60, darkGreen: 0x1e8449,
  brown: 0x8b4513, lightBrown: 0xdeb887, gray: 0x808080, darkGray: 0x404040,
  purple: 0x8e44ad, black: 0x000000, cream: 0xfff8dc, iron: 0x708090,
  mist: 0x778899, treeGold: 0xffe066, faithBlue: 0x3498db, pink: 0xffb6c1
};

// --- GAME STATE ---
const GameState = {
  playerName: 'Traveler',
  faith: 50, courage: 30, testimony: 20, charity: 25, wisdom: 15,
  maxFaith: 100, level: 1, faithPoints: 0, fpToNext: 100,
  scriptures: [],
  prophetCards: [],
  journal: [],
  currentWorld: 1,
  questFlags: {},
  companion: null,
  inventory: [],
  battleWon: false,
  ironRodComplete: false,
  brassPlatesObtained: false,
};

function addScripture(ref, text) {
  if (!GameState.scriptures.find(s => s.ref === ref)) {
    GameState.scriptures.push({ ref, text });
    return true;
  }
  return false;
}

function addJournal(entry) {
  GameState.journal.push({ entry, time: Date.now() });
}

function gainFP(amount) {
  GameState.faithPoints += amount;
  while (GameState.faithPoints >= GameState.fpToNext) {
    GameState.faithPoints -= GameState.fpToNext;
    GameState.level++;
    GameState.maxFaith += 10;
    GameState.faith = Math.min(GameState.faith + 20, GameState.maxFaith);
    GameState.courage += 5;
    GameState.testimony += 5;
    GameState.charity += 5;
    GameState.wisdom += 3;
    GameState.fpToNext = Math.floor(GameState.fpToNext * 1.5);
  }
}

// ============================================================
// PIXEL ART SPRITE GENERATION SYSTEM
// Characters are drawn onto canvas textures at 2x pixel scale
// for a chunky retro RPG look with 600 BC clothing
// ============================================================

function hexToRGB(hex) {
  return { r: (hex >> 16) & 0xff, g: (hex >> 8) & 0xff, b: hex & 0xff };
}

function darken(hex, amt = 40) {
  const c = hexToRGB(hex);
  return Phaser.Display.Color.GetColor(
    Math.max(0, c.r - amt), Math.max(0, c.g - amt), Math.max(0, c.b - amt)
  );
}

function lighten(hex, amt = 40) {
  const c = hexToRGB(hex);
  return Phaser.Display.Color.GetColor(
    Math.min(255, c.r + amt), Math.min(255, c.g + amt), Math.min(255, c.b + amt)
  );
}

// Draw a pixel on a graphics object at 2x scale
function px(g, x, y, color, alpha = 1) {
  g.fillStyle(color, alpha);
  g.fillRect(x * 2, y * 2, 2, 2);
}

// Generate a character texture and register it with the scene
function generateCharacterTexture(scene, key, config) {
  const {
    skinTone = 0xd4a574,     // Middle Eastern olive/tan skin
    hairColor = 0x2c1810,    // Dark brown/black hair
    hairStyle = 'short',     // short, long, bald
    beardStyle = 'none',     // none, short, long, prophet
    robeColor = 0x8B7355,    // Main robe color
    robeAccent = 0x6B5335,   // Robe trim/belt
    cloakColor = null,       // Optional outer cloak
    headwear = 'none',       // none, headband, turban, hood
    headwearColor = 0xffd700,
    sandals = 0x8B6914,
    hasStaff = false,
    staffColor = 0x8B6914,
    hasSword = false,
    isArmored = false,
    armorColor = 0x708090,
    eyeColor = 0x3D2B1F,
    expression = 'neutral',  // neutral, brave, wise, kind
    accessory = 'none',      // none, scroll, plates
    accessoryColor = 0xffd700,
  } = config;

  const sprW = 32, sprH = 48; // sprite dimensions in 2x pixels
  const g = scene.make.graphics({ x: 0, y: 0, add: false });

  const skinDark = darken(skinTone, 30);
  const skinLight = lighten(skinTone, 20);
  const robeDark = darken(robeColor, 30);
  const robeLight = lighten(robeColor, 30);
  const hairDark = darken(hairColor, 20);

  // === SANDALS (bottom) ===
  px(g, 5, 22, sandals); px(g, 6, 22, sandals); px(g, 7, 22, sandals);
  px(g, 9, 22, sandals); px(g, 10, 22, sandals); px(g, 11, 22, sandals);
  px(g, 5, 23, darken(sandals)); px(g, 6, 23, sandals); px(g, 7, 23, darken(sandals));
  px(g, 9, 23, darken(sandals)); px(g, 10, 23, sandals); px(g, 11, 23, darken(sandals));

  // === LEGS (showing below robe) ===
  px(g, 6, 20, skinTone); px(g, 7, 20, skinTone);
  px(g, 6, 21, skinTone); px(g, 7, 21, skinDark);
  px(g, 9, 20, skinTone); px(g, 10, 20, skinTone);
  px(g, 9, 21, skinDark); px(g, 10, 21, skinTone);

  // === ROBE (main body) ===
  // Lower robe (wider, flowing)
  for (let y = 16; y <= 19; y++) {
    for (let x = 4; x <= 12; x++) {
      const c = (x === 4 || x === 12) ? robeDark : (x === 8 ? robeLight : robeColor);
      px(g, x, y, c);
    }
  }
  // Robe hem detail
  for (let x = 4; x <= 12; x++) {
    px(g, x, 19, (x % 2 === 0) ? robeAccent : robeDark);
  }

  // Upper robe / torso
  for (let y = 10; y <= 15; y++) {
    for (let x = 5; x <= 11; x++) {
      const c = (x === 5 || x === 11) ? robeDark : robeColor;
      px(g, x, y, c);
    }
  }

  // Belt/sash
  for (let x = 5; x <= 11; x++) {
    px(g, x, 14, robeAccent);
  }
  px(g, 8, 15, robeAccent); // belt hanging bit

  // Neckline / collar
  px(g, 7, 10, skinTone); px(g, 8, 10, skinTone); px(g, 9, 10, skinTone);

  // === CLOAK (if specified) ===
  if (cloakColor) {
    const cloakDark = darken(cloakColor, 25);
    // Left cloak drape
    px(g, 3, 11, cloakColor); px(g, 4, 11, cloakColor);
    px(g, 3, 12, cloakColor); px(g, 3, 13, cloakDark);
    px(g, 3, 14, cloakColor); px(g, 3, 15, cloakDark);
    px(g, 3, 16, cloakColor); px(g, 4, 16, cloakDark);
    // Right cloak drape
    px(g, 12, 11, cloakColor); px(g, 13, 11, cloakColor);
    px(g, 13, 12, cloakColor); px(g, 13, 13, cloakDark);
    px(g, 13, 14, cloakColor); px(g, 13, 15, cloakDark);
    px(g, 13, 16, cloakColor); px(g, 12, 16, cloakDark);
    // Shoulders
    px(g, 4, 10, cloakColor); px(g, 5, 10, cloakColor);
    px(g, 11, 10, cloakColor); px(g, 12, 10, cloakColor);
  }

  // === ARMS ===
  // Left arm
  px(g, 4, 11, robeColor); px(g, 3, 12, robeColor); px(g, 3, 13, robeColor);
  px(g, 3, 14, skinTone); // hand
  // Right arm
  px(g, 12, 11, robeColor); px(g, 13, 12, robeColor); px(g, 13, 13, robeColor);
  px(g, 13, 14, skinTone); // hand

  // === ARMOR (if specified) ===
  if (isArmored) {
    const armorLight = lighten(armorColor, 30);
    for (let y = 11; y <= 13; y++) {
      for (let x = 6; x <= 10; x++) {
        px(g, x, y, (y === 12 && x === 8) ? armorLight : armorColor);
      }
    }
    // Shoulder guards
    px(g, 4, 10, armorColor); px(g, 5, 10, armorLight);
    px(g, 11, 10, armorLight); px(g, 12, 10, armorColor);
  }

  // === HEAD ===
  // Face shape (round-ish)
  for (let y = 4; y <= 9; y++) {
    for (let x = 6; x <= 10; x++) {
      if (y === 4 && (x === 6 || x === 10)) continue; // round top corners
      if (y === 9 && (x === 6 || x === 10)) continue; // round chin
      px(g, x, y, skinTone);
    }
  }
  // Jaw/chin shading
  px(g, 7, 9, skinDark); px(g, 8, 9, skinTone); px(g, 9, 9, skinDark);

  // === EYES ===
  // Eye whites
  px(g, 7, 6, 0xffffff); px(g, 9, 6, 0xffffff);
  // Pupils
  px(g, 7, 6, eyeColor); px(g, 9, 6, eyeColor);
  // Eyebrows
  px(g, 7, 5, hairColor); px(g, 9, 5, hairColor);

  // Expression variations
  if (expression === 'brave') {
    px(g, 6, 5, hairColor); px(g, 10, 5, hairColor); // strong brows
  } else if (expression === 'wise') {
    px(g, 7, 5, hairDark); px(g, 9, 5, hairDark);
  } else if (expression === 'kind') {
    // slight smile
    px(g, 7, 8, darken(skinTone, 50)); px(g, 8, 8, darken(skinTone, 60)); px(g, 9, 8, darken(skinTone, 50));
  }

  // Nose
  px(g, 8, 7, skinDark);

  // Mouth
  px(g, 8, 8, darken(skinTone, 45));

  // Ears
  px(g, 6, 6, skinDark); px(g, 10, 6, skinDark);

  // === HAIR ===
  if (hairStyle === 'short') {
    for (let x = 6; x <= 10; x++) px(g, x, 3, hairColor);
    px(g, 6, 4, hairColor); px(g, 10, 4, hairColor);
    px(g, 6, 5, hairDark); px(g, 10, 5, hairDark);
  } else if (hairStyle === 'long') {
    for (let x = 5; x <= 11; x++) px(g, x, 3, hairColor);
    px(g, 5, 4, hairColor); px(g, 6, 4, hairColor); px(g, 10, 4, hairColor); px(g, 11, 4, hairColor);
    px(g, 5, 5, hairDark); px(g, 11, 5, hairDark);
    px(g, 5, 6, hairColor); px(g, 11, 6, hairColor);
    px(g, 5, 7, hairDark); px(g, 11, 7, hairDark);
    px(g, 5, 8, hairColor); px(g, 11, 8, hairColor);
  } else if (hairStyle === 'bald') {
    for (let x = 7; x <= 9; x++) px(g, x, 3, skinLight);
    px(g, 6, 4, skinLight); px(g, 10, 4, skinLight);
  }

  // === BEARD ===
  if (beardStyle === 'short') {
    px(g, 7, 9, hairColor); px(g, 8, 9, hairColor); px(g, 9, 9, hairColor);
    px(g, 8, 10, hairColor);
  } else if (beardStyle === 'long') {
    px(g, 7, 9, hairColor); px(g, 8, 9, hairColor); px(g, 9, 9, hairColor);
    px(g, 7, 10, hairColor); px(g, 8, 10, hairColor); px(g, 9, 10, hairColor);
    px(g, 8, 11, hairDark);
  } else if (beardStyle === 'prophet') {
    px(g, 6, 8, hairColor); px(g, 10, 8, hairColor);
    px(g, 6, 9, hairColor); px(g, 7, 9, hairColor); px(g, 8, 9, hairColor);
    px(g, 9, 9, hairColor); px(g, 10, 9, hairColor);
    px(g, 7, 10, hairColor); px(g, 8, 10, hairColor); px(g, 9, 10, hairColor);
    px(g, 7, 11, hairDark); px(g, 8, 11, hairColor); px(g, 9, 11, hairDark);
    px(g, 8, 12, hairDark);
  }

  // === HEADWEAR ===
  if (headwear === 'headband') {
    for (let x = 6; x <= 10; x++) px(g, x, 4, headwearColor);
    px(g, 5, 4, headwearColor);
    px(g, 11, 4, headwearColor);
  } else if (headwear === 'turban') {
    for (let x = 5; x <= 11; x++) px(g, x, 2, headwearColor);
    for (let x = 5; x <= 11; x++) px(g, x, 3, lighten(headwearColor, 15));
    for (let x = 6; x <= 10; x++) px(g, x, 4, headwearColor);
    px(g, 5, 4, darken(headwearColor, 15)); px(g, 11, 4, darken(headwearColor, 15));
  } else if (headwear === 'hood') {
    for (let x = 5; x <= 11; x++) px(g, x, 2, headwearColor);
    for (let x = 5; x <= 11; x++) px(g, x, 3, darken(headwearColor, 15));
    px(g, 5, 4, headwearColor); px(g, 11, 4, headwearColor);
    px(g, 5, 5, darken(headwearColor, 15)); px(g, 11, 5, darken(headwearColor, 15));
    px(g, 5, 6, headwearColor);
  }

  // === STAFF ===
  if (hasStaff) {
    for (let y = 3; y <= 22; y++) {
      px(g, 14, y, staffColor);
    }
    px(g, 14, 2, lighten(staffColor, 30));
    px(g, 15, 2, lighten(staffColor, 30));
  }

  // === SWORD ===
  if (hasSword) {
    // Sword on hip
    px(g, 13, 14, 0xaaaaaa); px(g, 14, 15, 0xcccccc); px(g, 14, 16, 0xcccccc);
    px(g, 14, 17, 0xdddddd); px(g, 14, 18, 0xcccccc);
    px(g, 13, 13, 0x8B6914); px(g, 14, 13, 0x8B6914); // hilt
  }

  // === ACCESSORY ===
  if (accessory === 'scroll') {
    px(g, 2, 13, accessoryColor); px(g, 2, 14, accessoryColor);
    px(g, 2, 15, lighten(accessoryColor, 30));
  } else if (accessory === 'plates') {
    px(g, 1, 13, accessoryColor); px(g, 2, 13, accessoryColor);
    px(g, 1, 14, darken(accessoryColor)); px(g, 2, 14, accessoryColor);
    px(g, 1, 15, accessoryColor); px(g, 2, 15, darken(accessoryColor));
    px(g, 1, 16, darken(accessoryColor)); px(g, 2, 16, accessoryColor);
  }

  g.generateTexture(key, sprW, sprH);
  g.destroy();
}

// Generate the "Doubt" enemy sprite
function generateDoubtTexture(scene, key) {
  const g = scene.make.graphics({ x: 0, y: 0, add: false });
  const sprW = 48, sprH = 56;

  // Shadowy amorphous body
  const base = 0x556677;
  const dark = 0x334455;
  const light = 0x778899;

  // Main ghostly body
  for (let y = 8; y <= 24; y++) {
    const width = Math.floor(8 + Math.sin((y - 8) / 16 * Math.PI) * 6);
    for (let x = 12 - width/2; x <= 12 + width/2; x++) {
      const wobble = Math.sin(x * 0.5 + y * 0.3) > 0 ? base : dark;
      px(g, Math.floor(x), y, wobble, 0.8);
    }
  }

  // Wisps/tendrils at bottom
  for (let t = 0; t < 5; t++) {
    const tx = 8 + t * 3;
    for (let y = 22; y <= 26; y++) {
      px(g, tx + (y % 2), y, dark, 0.4 - (y - 22) * 0.08);
    }
  }

  // Face - hollow eyes
  px(g, 10, 13, 0x000000); px(g, 11, 13, 0x000000);
  px(g, 14, 13, 0x000000); px(g, 15, 13, 0x000000);
  px(g, 10, 14, 0x111122); px(g, 11, 14, 0x000000);
  px(g, 14, 14, 0x000000); px(g, 15, 14, 0x111122);

  // Eerie glowing pupils
  px(g, 10, 13, 0x99aacc); px(g, 14, 13, 0x99aacc);

  // Gaping question-mark mouth
  px(g, 11, 17, dark); px(g, 12, 17, 0x223344); px(g, 13, 17, dark);
  px(g, 12, 18, 0x223344);
  px(g, 12, 16, light);

  // ? symbol faintly
  px(g, 12, 9, light); px(g, 13, 9, light);
  px(g, 13, 10, light); px(g, 12, 11, light);
  px(g, 12, 12, 0x000000); // gap
  // dot
  px(g, 12, 13, 0x000000);

  // Horns/dark wisps on top
  px(g, 9, 7, dark); px(g, 8, 6, dark);
  px(g, 15, 7, dark); px(g, 16, 6, dark);

  g.generateTexture(key, sprW, sprH);
  g.destroy();
}

// Generate guard sprite (armored)
function generateGuardTexture(scene, key) {
  generateCharacterTexture(scene, key, {
    skinTone: 0xc49a6c,
    hairColor: 0x1a1a1a,
    hairStyle: 'short',
    beardStyle: 'short',
    robeColor: 0x8B0000,
    robeAccent: 0x5c0000,
    isArmored: true,
    armorColor: 0x808080,
    hasSword: true,
    headwear: 'headband',
    headwearColor: 0x8B0000,
    expression: 'brave',
  });
}

// --- HELPER: Dialogue box ---
function showDialogue(scene, speaker, text, onComplete, options) {
  // Speaker portrait
  const portraitMap = {
    'Nephi': 'nephi', 'Lehi': 'lehi', 'Sariah': 'sariah',
    'Sam': 'sam', 'Laman': 'laman',
  };

  const bg = scene.add.rectangle(W/2, H - 80, W - 40, 140, 0x000000, 0.9)
    .setStrokeStyle(2, COLORS.gold).setDepth(100).setScrollFactor(0);

  let portraitSprite = null;
  const portraitKey = portraitMap[speaker];
  if (portraitKey && scene.textures.exists(portraitKey)) {
    // Portrait background
    const pBg = scene.add.rectangle(55, H - 80, 70, 70, 0x16213e, 0.8)
      .setStrokeStyle(1, COLORS.gold).setDepth(101).setScrollFactor(0);
    portraitSprite = scene.add.image(55, H - 80, portraitKey)
      .setScale(1.4).setDepth(102).setScrollFactor(0);
  }

  const textX = portraitKey ? 100 : 40;
  const nameText = scene.add.text(textX, H - 145, speaker, {
    fontSize: '16px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
  }).setDepth(101).setScrollFactor(0);

  if (options) {
    const optTexts = [];
    const extraEls = [portraitSprite].filter(Boolean);
    options.forEach((opt, i) => {
      const t = scene.add.text(textX + 10, H - 115 + i * 28, `► ${opt.text}`, {
        fontSize: '14px', fontFamily: 'monospace', color: '#ffffff'
      }).setDepth(101).setInteractive({ useHandCursor: true }).setScrollFactor(0);
      t.on('pointerover', () => t.setColor('#ffd700'));
      t.on('pointerout', () => t.setColor('#ffffff'));
      t.on('pointerdown', () => {
        bg.destroy(); nameText.destroy();
        optTexts.forEach(ot => ot.destroy());
        extraEls.forEach(e => e.destroy());
        // destroy portrait bg
        if (portraitKey) bg.parentContainer; // handled by destroying all
        if (opt.onSelect) opt.onSelect();
      });
      optTexts.push(t);
    });
    return { bg, nameText, optTexts };
  }

  const msgText = scene.add.text(textX, H - 120, '', {
    fontSize: '14px', fontFamily: 'monospace', color: '#ffffff',
    wordWrap: { width: W - textX - 60 }, lineSpacing: 4
  }).setDepth(101).setScrollFactor(0);

  let charIndex = 0;
  let typing = true;
  const timer = scene.time.addEvent({
    delay: 25,
    callback: () => {
      if (charIndex < text.length) {
        msgText.setText(text.substring(0, ++charIndex));
      } else {
        typing = false;
        timer.remove();
        const cont = scene.add.text(W - 80, H - 25, '▼ Continue', {
          fontSize: '12px', fontFamily: 'monospace', color: '#ffd700'
        }).setDepth(101).setScrollFactor(0);
        scene.tweens.add({ targets: cont, alpha: 0.3, duration: 500, yoyo: true, repeat: -1 });

        const handler = () => {
          bg.destroy(); nameText.destroy(); msgText.destroy(); cont.destroy();
          if (portraitSprite) portraitSprite.destroy();
          scene.input.off('pointerdown', handler);
          scene.input.keyboard.off('keydown-SPACE', handler);
          if (onComplete) onComplete();
        };
        scene.input.on('pointerdown', handler);
        scene.input.keyboard.on('keydown-SPACE', handler);
      }
    },
    loop: true
  });

  const skipHandler = () => {
    if (typing) { charIndex = text.length; msgText.setText(text); }
  };
  scene.input.once('pointerdown', skipHandler);

  return { bg, nameText, msgText };
}

// --- HELPER: Scripture unlock popup ---
function showScriptureUnlock(scene, ref, text, onDone) {
  if (!addScripture(ref, text)) { if (onDone) onDone(); return; }
  gainFP(25);

  const overlay = scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.7).setDepth(200).setScrollFactor(0);
  const scroll = scene.add.rectangle(W/2, H/2, 500, 280, COLORS.cream, 0.95)
    .setStrokeStyle(3, COLORS.gold).setDepth(201).setScrollFactor(0);
  const icon = scene.add.text(W/2, H/2 - 110, '📜', { fontSize: '40px' })
    .setOrigin(0.5).setDepth(202).setScrollFactor(0);
  const title = scene.add.text(W/2, H/2 - 70, 'SCRIPTURE UNLOCKED', {
    fontSize: '20px', fontFamily: 'monospace', color: '#b8860b', fontStyle: 'bold'
  }).setOrigin(0.5).setDepth(202).setScrollFactor(0);
  const refText = scene.add.text(W/2, H/2 - 40, ref, {
    fontSize: '16px', fontFamily: 'monospace', color: '#8b4513', fontStyle: 'bold'
  }).setOrigin(0.5).setDepth(202).setScrollFactor(0);

  }).setOrigin(0.5).setDepth(202).setScrollFactor(0);

  }).setOrigin(0.5).setDepth(202).setScrollFactor(0);

    fontSize: '12px', fontFamily: 'monospace', color: '#888888'
  }).setOrigin(0.5).setDepth(202).setScrollFactor(0);

  const els = [overlay, scroll, icon, title, refText, verseText, fpText, cont];
  scroll.setScale(0); icon.setAlpha(0);
  scene.tweens.add({ targets: scroll, scale: 1, duration: 400, ease: 'Back.easeOut' });
  scene.tweens.add({ targets: [icon, title, refText, verseText, fpText], alpha: 1, duration: 300, delay: 300 });
  scene.tweens.add({ targets: cont, alpha: 0.4, duration: 600, yoyo: true, repeat: -1, delay: 600 });

  scene.time.delayedCall(500, () => {

  });
}

  }).setDepth(91).setScrollFactor(0);

    fontSize: '10px', fontFamily: 'monospace', color: '#aaaaaa'
  }).setDepth(91).setScrollFactor(0);

  // Companion portrait in HUD
  if (GameState.companion) {
    hud.compBg = scene.add.rectangle(W - 160, 5, 150, 40, 0x16213e, 0.8)
      .setOrigin(0).setDepth(91).setScrollFactor(0).setStrokeStyle(1, COLORS.gold);

      hud.compIcon = scene.add.image(W - 140, 25, 'nephi').setDepth(92).setScrollFactor(0);
    }
    hud.compName = scene.add.text(W - 120, 10, GameState.companion.name, {
      fontSize: '11px', fontFamily: 'monospace', color: '#ffd700'
    }).setDepth(92).setScrollFactor(0);
    hud.compTitle = scene.add.text(W - 120, 26, GameState.companion.title, {
      fontSize: '9px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setDepth(92).setScrollFactor(0);
  }

  hud.scriptureIcon = scene.add.text(W/2 - 40, 8, `📜 ${GameState.scriptures.length}`, {
    fontSize: '12px', fontFamily: 'monospace', color: '#ffd700'
  }).setDepth(91).setScrollFactor(0);

  hud.update = () => {
    const ratio = Math.min(GameState.faith / GameState.maxFaith, 1);
    hud.faithBar.setDisplaySize(120 * ratio, 12);
    hud.faithNum.setText(`${GameState.faith}/${GameState.maxFaith}`);
    hud.levelText.setText(`Lv.${GameState.level}`);
    hud.fpText.setText(`FP: ${GameState.faithPoints}/${GameState.fpToNext}`);
    hud.scriptureIcon.setText(`📜 ${GameState.scriptures.length}`);
  };
  return hud;
}

    this.lehiZone = this.add.zone(500, 610, 60, 60);
    this.physics.add.existing(this.lehiZone, true);
    this.labanZone = this.add.zone(1300, 530, 100, 60);
    this.physics.add.existing(this.labanZone, true);

    this.physics.add.overlap(this.player, this.nephiZone, () => this.nearNephi = true);
    this.physics.add.overlap(this.player, this.lehiZone, () => this.nearLehi = true);
    this.physics.add.overlap(this.player, this.labanZone, () => this.nearLaban = true);
    this.physics.add.overlap(this.player, this.ironRodZone, () => this.nearIronRod = true);
    this.physics.add.overlap(this.player, this.battleZone, () => {
      if (!this.battleTriggered && !GameState.battleWon) {
        this.battleTriggered = true;
        this.startBattle();
      }
    });

    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey('SPACE');
    this.interactCooldown = 0;

    this.hud = createHUD(this);

    this.interactPrompt = this.add.text(0, 0, 'Press SPACE', {
      fontSize: '10px', fontFamily: 'monospace', color: '#ffd700',
      backgroundColor: '#00000088', padding: { x: 4, y: 2 }
    }).setOrigin(0.5).setDepth(80).setVisible(false);

    // Opening dialogue
    if (!GameState.questFlags.jerusalemIntro) {
      GameState.questFlags.jerusalemIntro = true;
      this.time.delayedCall(500, () => {
        showDialogue(this, 'Narrator', 'Jerusalem, 600 BC. The prophet Lehi has been warned by God to take his family and flee into the wilderness. But first, his sons must return for the brass plates — the sacred records held by Laban.', () => {
          showDialogue(this, 'Nephi', 'I know the Lord will provide a way for us to accomplish what He has commanded. Will you come with me to retrieve the plates from Laban?', () => {
            showDialogue(this, '', 'Choose your response:', null, [
              { text: 'I will go and do! Let\'s get those plates.', onSelect: () => {
                GameState.faith = Math.min(GameState.faith + 10, GameState.maxFaith);
                gainFP(15);
                addJournal('Chose to follow Nephi with faith');
                showDialogue(this, 'Nephi', 'That is the spirit! The Lord has commanded my father to send us, and I know He will prepare a way. Let us go to Laban\'s treasury to the east.', () => {});
              }},
              { text: 'I\'m a little scared, but I\'ll try...', onSelect: () => {
                gainFP(10);
                addJournal('Chose to follow Nephi despite fear');
                showDialogue(this, 'Nephi', 'It is alright to be afraid. Courage is not the absence of fear — it is choosing to move forward in faith. Come, the Lord will be with us.', () => {});
              }}
            ]);
          });
        });
      });
    }
  }

  startBattle() {
    this.cameras.main.flash(500, 255, 255, 255);
    this.time.delayedCall(500, () => {
      this.scene.pause();
      this.scene.launch('Battle', { returnScene: 'Jerusalem' });
    });
  }

  update(time, delta) {
    this.nearNephi = false;
    this.nearLehi = false;
    this.nearLaban = false;
    this.nearIronRod = false;

    const speed = 160;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) {
      this.player.body.setVelocityX(-speed);
      this.player.setFlipX(true);
    }
    if (this.cursors.right.isDown) {
      this.player.body.setVelocityX(speed);
      this.player.setFlipX(false);
    }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed);

    // Walking bob animation
    if (this.player.body.velocity.x !== 0 || this.player.body.velocity.y !== 0) {
      this.player.setScale(2, 2 + Math.sin(time * 0.01) * 0.05);
    } else {
      this.player.setScale(2);
    }

    this.interactPrompt.setVisible(false);
    if (this.nearNephi) {
      this.interactPrompt.setPosition(350, 565).setVisible(true);
    } else if (this.nearLehi) {
      this.interactPrompt.setPosition(500, 565).setVisible(true);
    } else if (this.nearLaban) {
      this.interactPrompt.setPosition(1300, 410).setVisible(true);
    } else if (this.nearIronRod) {
      this.interactPrompt.setPosition(50, 570).setVisible(true);
    }

    if (this.interactCooldown > 0) this.interactCooldown -= delta;
    if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && this.interactCooldown <= 0) {
      this.interactCooldown = 500;

      if (this.nearNephi) {
        if (!GameState.brassPlatesObtained) {
          showDialogue(this, 'Nephi', 'We must go east to Laban\'s treasury and retrieve the brass plates. They contain the record of our fathers and the commandments of God. We cannot go into the wilderness without them.');
        } else if (!GameState.ironRodComplete) {
          showDialogue(this, 'Nephi', 'My father Lehi has had a vision — a dream of a tree whose fruit was most precious. Go to the west and experience the vision. Hold to the iron rod!');
        } else {
          showDialogue(this, 'Nephi', 'You have done well, friend. You have seen the power of faith. Soon we will build a ship and cross the great waters to the promised land!');
        }
      }

      if (this.nearLehi) {
        showDialogue(this, 'Lehi', 'My child, the Lord has commanded us to leave Jerusalem, for it will soon be destroyed for its wickedness. But we do not go empty-handed — we need the brass plates. Go with my son Nephi.', () => {
          if (!GameState.questFlags.lehiTalked) {
            GameState.questFlags.lehiTalked = true;
            gainFP(10);
          }
        });
      }

      if (this.nearLaban && !GameState.brassPlatesObtained) {
        this.scene.pause();
        this.scene.launch('BrassPlates');
      }

      if (this.nearIronRod) {
        this.cameras.main.fadeOut(500);
        this.time.delayedCall(500, () => this.scene.start('IronRod'));
      }
    }

    this.hud.update();
  }
}


// ============================================================
// SCENE: BRASS PLATES QUEST
// ============================================================
class BrassPlatesScene extends Phaser.Scene {
  constructor() { super('BrassPlates'); }

  create() {
    this.cameras.main.fadeIn(500);

    // Dark interior
    this.add.rectangle(W/2, H/2, W, H, 0x1a0a0a);
    this.add.rectangle(W/2, H/2, W - 40, H - 80, 0x2a1a0a).setStrokeStyle(2, 0x4a2a0a);

    // Stone floor tiles
    for (let fy = 80; fy < H - 40; fy += 40) {
      for (let fx = 30; fx < W - 30; fx += 40) {
        this.add.rectangle(fx + 20, fy + 20, 38, 38, 0x332211, 0.3).setStrokeStyle(1, 0x221100, 0.2);
      }
    }

    // Torches
    [60, W - 60, W/2].forEach(tx => {
      this.add.rectangle(tx, 130, 4, 24, COLORS.brown);
      const flame = this.add.circle(tx, 118, 6, 0xff6600, 0.9);
      const flameInner = this.add.circle(tx, 116, 3, 0xffdd00, 0.9);
      this.tweens.add({ targets: flame, scale: 1.4, alpha: 0.5, duration: 250, yoyo: true, repeat: -1 });
      this.tweens.add({ targets: flameInner, scale: 1.3, alpha: 0.6, duration: 200, yoyo: true, repeat: -1, delay: 100 });
      this.add.circle(tx, 140, 50, 0xffaa00, 0.04);
    });

    // Guards with proper sprites
    this.guards = [];
    const guardPositions = [
      { x: 250, y: 250, patrol: 'h', range: 100 },
      { x: 500, y: 350, patrol: 'v', range: 80 },
      { x: 600, y: 200, patrol: 'h', range: 120 },
    ];
    guardPositions.forEach(gp => {
      let guard;
      if (this.textures.exists('guard')) {
        guard = this.add.image(gp.x, gp.y, 'guard').setScale(1.5);
      } else {
        guard = this.add.rectangle(gp.x, gp.y, 16, 24, COLORS.red);
      }
      // Vision cone (subtle red glow)
      const vision = this.add.circle(gp.x, gp.y, 45, COLORS.red, 0.08);

      if (gp.patrol === 'h') {
        this.tweens.add({ targets: [guard, vision], x: gp.x + gp.range, duration: 2000, yoyo: true, repeat: -1 });
      } else {
        this.tweens.add({ targets: [guard, vision], y: gp.y + gp.range, duration: 2000, yoyo: true, repeat: -1 });
      }
      this.guards.push({ sprite: guard, vision });
    });

    // Brass plates (goal)
    this.plates = this.add.rectangle(680, 120, 30, 40, COLORS.gold)
      .setStrokeStyle(2, 0xb8860b);
    this.add.text(680, 110, '📜', { fontSize: '20px' }).setOrigin(0.5);
    const plateGlow = this.add.circle(680, 120, 25, COLORS.gold, 0.15);
    this.tweens.add({ targets: plateGlow, scale: 2, alpha: 0, duration: 1500, repeat: -1 });

    // Player sprite
    if (this.textures.exists('player')) {
      this.player = this.add.image(100, H - 100, 'player').setScale(1.5);
    } else {
      this.player = this.add.rectangle(100, H - 100, 16, 22, COLORS.green).setOrigin(0.5, 1);
    }
    this.physics.add.existing(this.player);
    this.player.body.setSize(16, 22);

    // Obstacles (pillars and tables)
    [
      { x: 200, y: 180, w: 80, h: 20 },
      { x: 400, y: 280, w: 20, h: 80 },
      { x: 350, y: 150, w: 60, h: 20 },
      { x: 550, y: 300, w: 20, h: 60 },
    ].forEach(ob => {
      this.add.rectangle(ob.x, ob.y, ob.w, ob.h, 0x4a2a0a).setStrokeStyle(1, 0x3a1a00);
    });

    this.add.text(W/2, H - 30, 'Sneak past the guards to reach the brass plates! Arrow keys to move.', {
      fontSize: '11px', fontFamily: 'monospace', color: '#aa8866'
    }).setOrigin(0.5);

    this.add.text(W/2, 60, 'LABAN\'S TREASURY', {
      fontSize: '16px', fontFamily: 'monospace', color: '#8b4513', fontStyle: 'bold'
    }).setOrigin(0.5);

    this.statusText = this.add.text(W/2, H - 50, '', {
      fontSize: '12px', fontFamily: 'monospace', color: '#ff6666'
    }).setOrigin(0.5);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.caught = false;
    this.won = false;
  }

  update() {
    if (this.caught || this.won) return;

    const speed = 120;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) { this.player.body.setVelocityX(-speed); this.player.setFlipX && this.player.setFlipX(true); }
    if (this.cursors.right.isDown) { this.player.body.setVelocityX(speed); this.player.setFlipX && this.player.setFlipX(false); }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed);

    this.guards.forEach(g => {
      const dist = Phaser.Math.Distance.Between(
        this.player.x, this.player.y, g.sprite.x, g.sprite.y
      );
      if (dist < 45) {
        this.caught = true;
        this.statusText.setText('Caught! The guards spotted you!');
        this.cameras.main.shake(300, 0.01);
        this.time.delayedCall(1500, () => {
          this.statusText.setText('');
          this.player.setPosition(100, H - 100);
          this.caught = false;
        });
      }
    });

    const plateDist = Phaser.Math.Distance.Between(
      this.player.x, this.player.y, this.plates.x, this.plates.y
    );
    if (plateDist < 35) {
      this.won = true;
      GameState.brassPlatesObtained = true;
      GameState.faith = Math.min(GameState.faith + 15, GameState.maxFaith);
      gainFP(30);
      addJournal('Retrieved the brass plates from Laban\'s treasury');

      this.cameras.main.flash(500, 255, 215, 0);
      showDialogue(this, 'Narrator', 'You have obtained the brass plates! These sacred records contain the scriptures and the genealogy of Lehi\'s family. The Lord has provided a way, just as Nephi said He would.', () => {
        showScriptureUnlock(this,
          '1 Nephi 3:7',
          'I will go and do the things which the Lord hath commanded, for I know that the Lord giveth no commandments unto the children of men, save he shall prepare a way for them that they may accomplish the thing which he commandeth them.',
          () => {
            this.scene.stop();
            this.scene.resume('Jerusalem');
          }
        );
      });
    }
  }
}


// ============================================================
// SCENE: BATTLE (Pokemon-style)
// ============================================================
class BattleScene extends Phaser.Scene {
  constructor() { super('Battle'); }

  init(data) {
    this.returnScene = data.returnScene || 'Jerusalem';
  }

  create() {
    this.cameras.main.fadeIn(300);

    // Background - desert battlefield
    this.add.rectangle(W/2, H/2, W, H, 0x1a1a2e);
    // Sandy ground with gradient
    this.add.rectangle(W/2, H - 150, W, 300, COLORS.darkSand, 0.4);
    this.add.rectangle(W/2, H - 200, W, 100, COLORS.sand, 0.15);

    // Enemy platform
    this.add.ellipse(580, 240, 180, 35, COLORS.darkSand, 0.6);

    // Player platform
    this.add.ellipse(220, 400, 180, 35, COLORS.darkSand, 0.6);

    // Enemy: Doubt (use generated sprite)
    this.enemy = {
      name: 'Doubt', hp: 80, maxHp: 80,
      weakness: 'testimony',
    };

    if (this.textures.exists('doubt')) {
      this.enemy.sprite = this.add.image(580, 200, 'doubt').setScale(2.5);
    } else {
      this.enemy.sprite = this.add.rectangle(580, 200, 50, 60, COLORS.mist).setStrokeStyle(2, 0x556677);
    }

    // Shadow tendrils around doubt
    for (let i = 0; i < 8; i++) {
      const tendril = this.add.ellipse(
        580 + Phaser.Math.Between(-40, 40), 230 + i * 4,
        Phaser.Math.Between(10, 25), 4, COLORS.mist, 0.3
      );
      this.tweens.add({
        targets: tendril,
        x: tendril.x + Phaser.Math.Between(-20, 20),
        alpha: 0.05, duration: 1200 + i * 200,
        yoyo: true, repeat: -1
      });
    }

    this.add.text(580, 270, 'A wild DOUBT appeared!', {
      fontSize: '12px', fontFamily: 'monospace', color: '#aabbcc'
    }).setOrigin(0.5);

    // Player characters in battle (larger sprites)
    if (this.textures.exists('player_battle')) {
      this.add.image(230, 370, 'player_battle').setScale(3);
    }
    if (this.textures.exists('nephi_battle')) {
      this.add.image(170, 375, 'nephi_battle').setScale(2.5).setAlpha(0.9);
    }

    // Enemy HP bar
    this.add.rectangle(580, 140, 164, 14, 0x222222).setStrokeStyle(1, 0x555555);
    this.enemyHpBar = this.add.rectangle(500, 134, 156, 8, COLORS.red).setOrigin(0);
    this.add.text(580, 122, 'DOUBT', {
      fontSize: '12px', fontFamily: 'monospace', color: '#aabbcc', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.enemyHpText = this.add.text(665, 131, `${this.enemy.hp}/${this.enemy.maxHp}`, {
      fontSize: '10px', fontFamily: 'monospace', color: '#cccccc'
    });

    // Player HP bar
    this.add.rectangle(220, 430, 164, 14, 0x222222).setStrokeStyle(1, 0x555555);
    this.playerHpBar = this.add.rectangle(140, 424, 156, 8, COLORS.green).setOrigin(0);
    this.add.text(220, 415, `${GameState.playerName} & Nephi`, {
      fontSize: '12px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
    }).setOrigin(0.5);
    this.playerHpText = this.add.text(305, 421, `${GameState.faith}/${GameState.maxFaith}`, {
      fontSize: '10px', fontFamily: 'monospace', color: '#cccccc'
    });

    this.createBattleMenu();
    this.battleLog = this.add.text(W/2, H - 30, '', {
      fontSize: '11px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(0.5).setDepth(50);

    this.playerTurn = true;
    this.animating = false;
  }

  createBattleMenu() {
    this.add.rectangle(W/2, H - 95, W - 40, 120, 0x000000, 0.85)
      .setStrokeStyle(2, COLORS.gold).setDepth(40);

    this.menuItems = [];
    const moves = [
      { name: '⚔️ Faith Strike', desc: 'A faithful blow', stat: 'faith', power: 15, cost: 0 },
      { name: '📖 Scripture Power', desc: 'Quote truth against doubt', stat: 'testimony', power: 25, cost: 0, superEffective: 'testimony' },
      { name: '🛡️ Pray Always', desc: 'Restore faith', stat: 'charity', power: 0, heal: 20, cost: 0 },
      { name: '✨ Nephi: "I Will Go"', desc: 'Never misses!', stat: 'courage', power: 20, cost: 0, neverMiss: true },
    ];

    moves.forEach((move, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const bx = 120 + col * 320;
      const by = H - 130 + row * 40;

      const btn = this.add.rectangle(bx + 130, by + 10, 290, 32, 0x16213e, 0.8)
        .setStrokeStyle(1, 0x334455).setDepth(41).setInteractive({ useHandCursor: true });
      const txt = this.add.text(bx + 10, by, move.name, {
        fontSize: '13px', fontFamily: 'monospace', color: '#ffffff'
      }).setDepth(42);
      const descTxt = this.add.text(bx + 10, by + 16, move.desc, {
        fontSize: '9px', fontFamily: 'monospace', color: '#888888'
      }).setDepth(42);

      btn.on('pointerover', () => btn.setFillStyle(0x2a3a5e));
      btn.on('pointerout', () => btn.setFillStyle(0x16213e, 0.8));
      btn.on('pointerdown', () => {
        if (this.playerTurn && !this.animating) this.playerAttack(move);
      });
      this.menuItems.push({ btn, txt, descTxt });
    });
  }

  playerAttack(move) {
    this.animating = true;
    this.playerTurn = false;

    if (move.heal) {
      GameState.faith = Math.min(GameState.faith + move.heal, GameState.maxFaith);
      this.cameras.main.flash(300, 100, 200, 255);
      this.battleLog.setText(`You prayed and restored ${move.heal} faith!`);
      this.updateBars();
      this.time.delayedCall(1200, () => this.enemyTurn());
      return;
    }

    let damage = move.power + Math.floor(GameState[move.stat] / 5);
    let message = `Used ${move.name}!`;

    if (move.superEffective === 'testimony') {
      damage = Math.floor(damage * 1.8);
      message += ' It\'s super effective against Doubt!';
    }

    damage = Math.floor(damage * (0.85 + Math.random() * 0.3));
    if (damage < 1) damage = 1;

    this.enemy.hp = Math.max(0, this.enemy.hp - damage);
    this.battleLog.setText(`${message} Dealt ${damage} damage!`);

    this.tweens.add({
      targets: this.enemy.sprite, x: this.enemy.sprite.x + 10, duration: 50,
      yoyo: true, repeat: 3
    });
    this.cameras.main.flash(100, 255, 255, 255);
    this.updateBars();

    if (this.enemy.hp <= 0) {
      this.time.delayedCall(800, () => this.victory());
    } else {
      this.time.delayedCall(1200, () => this.enemyTurn());
    }
  }

  enemyTurn() {
    const attacks = [
      { name: 'Whisper of Doubt', damage: 8, msg: 'Doubt whispers: "Are you sure about this?"' },
      { name: 'Cloud of Confusion', damage: 12, msg: 'Doubt clouds your mind with confusion!' },
      { name: 'Fear Strike', damage: 15, msg: 'Doubt strikes with fear!' },
    ];

    const attack = attacks[Phaser.Math.Between(0, attacks.length - 1)];
    let damage = attack.damage - Math.floor(GameState.courage / 10);
    if (damage < 1) damage = 1;

    GameState.faith = Math.max(0, GameState.faith - damage);
    this.battleLog.setText(`${attack.msg} Lost ${damage} faith.`);

    this.cameras.main.shake(200, 0.005);
    this.updateBars();

    if (GameState.faith <= 0) {
      this.time.delayedCall(800, () => {
        GameState.faith = Math.floor(GameState.maxFaith * 0.3);
        showDialogue(this, 'Nephi', 'Do not give up! Remember, the Lord is with us. Let us try again with faith.', () => {
          this.enemy.hp = this.enemy.maxHp;
          this.updateBars();
          this.playerTurn = true;
          this.animating = false;
        });
      });
    } else {
      this.time.delayedCall(800, () => {
        this.playerTurn = true;
        this.animating = false;
      });
    }
  }

  updateBars() {
    const enemyRatio = Math.max(0, this.enemy.hp / this.enemy.maxHp);
    this.tweens.add({ targets: this.enemyHpBar, displayWidth: 156 * enemyRatio, duration: 300 });
    this.enemyHpText.setText(`${this.enemy.hp}/${this.enemy.maxHp}`);

    const playerRatio = Math.max(0, GameState.faith / GameState.maxFaith);
    this.tweens.add({ targets: this.playerHpBar, displayWidth: 156 * playerRatio, duration: 300 });
    this.playerHpText.setText(`${GameState.faith}/${GameState.maxFaith}`);
  }

  victory() {
    GameState.battleWon = true;
    gainFP(40);
    addJournal('Overcame Doubt through faith and testimony');
    GameState.faith = Math.min(GameState.faith + 20, GameState.maxFaith);

    this.tweens.add({ targets: this.enemy.sprite, alpha: 0, scale: 0, duration: 800 });

    this.battleLog.setText('');
    showDialogue(this, 'Narrator', 'Doubt has been vanquished! Your faith grew stronger through the trial. Remember — doubt is overcome not by ignoring it, but by choosing faith and seeking truth.', () => {
      showDialogue(this, 'Nephi', 'Well fought! Doubt flees when we hold firm to what we know is true. The Lord has blessed us this day.', () => {
        this.cameras.main.fadeOut(500);
        this.time.delayedCall(500, () => {
          this.scene.stop();
          this.scene.resume(this.returnScene);
        });
      });
    });
  }
}


// ============================================================
// SCENE: IRON ROD (Lehi's Vision)
// ============================================================
class IronRodScene extends Phaser.Scene {
  constructor() { super('IronRod'); }

  create() {
    this.cameras.main.fadeIn(1000);

    const worldW = 2400, worldH = H;
    this.physics.world.setBounds(0, 0, worldW, worldH);
    this.cameras.main.setBounds(0, 0, worldW, worldH);

    // Dreamy dark background
    this.add.rectangle(worldW/2, worldH/2, worldW, worldH, COLORS.nightBlue);

    // Stars in the dream
    for (let i = 0; i < 150; i++) {
      const star = this.add.circle(
        Phaser.Math.Between(0, worldW), Phaser.Math.Between(0, worldH/3),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.8)
      );
      this.tweens.add({ targets: star, alpha: 0.1, duration: Phaser.Math.Between(500, 2000), yoyo: true, repeat: -1 });
    }

    // Ground path
    this.add.rectangle(worldW/2, worldH - 30, worldW, 60, COLORS.darkSand, 0.3);

    // THE IRON ROD
    for (let rx = 0; rx < worldW - 200; rx += 4) {
      this.add.rectangle(rx, worldH - 65, 4, 6, COLORS.iron, 0.7);
    }
    // Iron rod posts
    for (let rx = 0; rx < worldW - 200; rx += 80) {
      this.add.rectangle(rx, worldH - 75, 4, 20, COLORS.iron, 0.8);
    }
    this.add.text(80, worldH - 90, '═══ The Iron Rod (Word of God) ═══', {
      fontSize: '10px', fontFamily: 'monospace', color: '#708090'
    });

    // Mists of Darkness
    this.mists = [];
    const mistPositions = [400, 700, 1000, 1300, 1600, 1900];
    mistPositions.forEach(mx => {
      const mistGroup = [];
      for (let i = 0; i < 10; i++) {
        const mist = this.add.ellipse(
          mx + Phaser.Math.Between(-90, 90),
          Phaser.Math.Between(worldH - 220, worldH - 40),
          Phaser.Math.Between(40, 100), Phaser.Math.Between(20, 50),
          COLORS.mist, Phaser.Math.FloatBetween(0.12, 0.3)
        );
        this.tweens.add({
          targets: mist, x: mist.x + Phaser.Math.Between(-50, 50),
          alpha: mist.alpha * 0.2, duration: Phaser.Math.Between(2000, 5000),
          yoyo: true, repeat: -1
        });
        mistGroup.push(mist);
      }
      this.mists.push({ x: mx, clouds: mistGroup });
    });

    // Great and spacious building
    const bldg = this.add.rectangle(1200, 150, 300, 180, 0x4a3728).setStrokeStyle(2, 0x6a5738);
    // Windows with people silhouettes
    for (let wy = 80; wy < 280; wy += 30) {
      for (let wx = 1070; wx < 1330; wx += 35) {
        this.add.rectangle(wx, wy, 12, 16, 0xffdd88, 0.5);
        // Tiny person silhouette in window
        if (Math.random() > 0.5) {
          this.add.rectangle(wx, wy + 4, 4, 8, 0x2a1a0a, 0.4);
        }
      }
    }
    // Pillars
    this.add.rectangle(1055, 150, 8, 180, 0x6a5738);
    this.add.rectangle(1345, 150, 8, 180, 0x6a5738);

    this.add.text(1200, 70, 'The Great &\nSpacious Building', {
      fontSize: '11px', fontFamily: 'monospace', color: '#aa8866', align: 'center', fontStyle: 'italic'
    }).setOrigin(0.5);

    // People mocking from building
    const mockText = this.add.text(1200, 270, '"Come join us! This path is foolish!"', {
      fontSize: '9px', fontFamily: 'monospace', color: '#cc9966', fontStyle: 'italic'
    }).setOrigin(0.5);
    this.tweens.add({ targets: mockText, alpha: 0.3, duration: 1500, yoyo: true, repeat: -1 });

    // People who wandered off the path (lost souls)
    if (this.textures.exists('laman')) {
      const lost1 = this.add.image(1180, 300, 'laman').setScale(1.2).setAlpha(0.4);
      this.add.text(1180, 320, '(lost in mist)', { fontSize: '8px', fontFamily: 'monospace', color: '#666666' }).setOrigin(0.5);
    }

    // THE TREE OF LIFE
    const treeX = worldW - 150;
    // Trunk
    this.add.rectangle(treeX, worldH - 120, 16, 80, 0xB8860B);
    this.add.rectangle(treeX - 4, worldH - 130, 8, 20, 0x8B6914);
    this.add.rectangle(treeX + 4, worldH - 125, 6, 15, 0x8B6914);
    // Branches
    this.add.rectangle(treeX - 20, worldH - 165, 30, 6, 0x8B6914);
    this.add.rectangle(treeX + 15, worldH - 175, 25, 5, 0x8B6914);
    // Canopy (radiant white/gold)
    this.add.circle(treeX, worldH - 190, 55, COLORS.treeGold, 0.25);
    this.add.circle(treeX - 15, worldH - 200, 35, 0xffffff, 0.2);
    this.add.circle(treeX + 15, worldH - 185, 40, COLORS.treeGold, 0.3);
    this.add.circle(treeX, worldH - 210, 30, 0xffffff, 0.25);
    // Glowing fruit
    for (let i = 0; i < 15; i++) {
      const angle = (i / 15) * Math.PI * 2;
      const fr = this.add.circle(
        treeX + Math.cos(angle) * (20 + Math.random() * 20),
        worldH - 195 + Math.sin(angle) * (15 + Math.random() * 15),
        4, 0xffffff, 0.95
      );
      this.tweens.add({ targets: fr, scale: 1.5, alpha: 0.3, duration: 800 + i * 120, yoyo: true, repeat: -1 });
    }
    this.add.text(treeX, worldH - 265, '🌳 Tree of Life', {
      fontSize: '14px', fontFamily: 'monospace', color: '#ffe066', fontStyle: 'bold'
    }).setOrigin(0.5);
    const treeGlow = this.add.circle(treeX, worldH - 190, 90, 0xffffff, 0.06);
    this.tweens.add({ targets: treeGlow, scale: 2.5, alpha: 0, duration: 3000, repeat: -1 });

    // Player sprite
    if (this.textures.exists('player')) {
      this.player = this.add.image(60, worldH - 65, 'player').setScale(2).setDepth(10);
    } else {
      this.player = this.add.rectangle(60, worldH - 65, 16, 22, COLORS.green).setOrigin(0.5, 1);
    }
    this.physics.add.existing(this.player);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setSize(16, 22);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

    this.visionFaith = 100;
    this.holdingRod = true;
    this.faithLabel = this.add.text(10, 10, 'Hold to the Rod: ✦ 100', {
      fontSize: '14px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
    }).setScrollFactor(0).setDepth(100);

    this.rodHint = this.add.text(W/2, H - 15, 'Stay on the lower path near the rod! Arrow keys to move.', {
      fontSize: '10px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(100);

    this.treeZone = this.add.zone(treeX, worldH - 150, 80, 120);
    this.physics.add.existing(this.treeZone, true);
    this.reachedTree = false;

    this.cursors = this.input.keyboard.createCursorKeys();

    showDialogue(this, 'Lehi', 'In my dream, I saw a tree whose fruit was most desirable above all things. Hold to the iron rod — the word of God — and it will lead you through the mists of darkness to the tree of life. Do not let go!');
  }

  update() {
    if (this.reachedTree) return;

    const speed = 140;
    this.player.body.setVelocity(0);
    if (this.cursors.left.isDown) { this.player.body.setVelocityX(-speed); this.player.setFlipX && this.player.setFlipX(true); }
    if (this.cursors.right.isDown) { this.player.body.setVelocityX(speed); this.player.setFlipX && this.player.setFlipX(false); }
    if (this.cursors.up.isDown) this.player.body.setVelocityY(-speed * 0.7);
    if (this.cursors.down.isDown) this.player.body.setVelocityY(speed * 0.7);

    this.holdingRod = this.player.y > H - 100;

    let inMist = false;
    this.mists.forEach(m => {
      if (Math.abs(this.player.x - m.x) < 100) inMist = true;
    });

    if (inMist && !this.holdingRod) {
      this.visionFaith -= 0.3;
      this.faithLabel.setColor('#ff6666');
    } else if (this.holdingRod) {
      this.visionFaith = Math.min(100, this.visionFaith + 0.15);
      this.faithLabel.setColor('#ffd700');
    }

    this.faithLabel.setText(`Hold to the Rod: ✦ ${Math.floor(this.visionFaith)}`);

    if (this.visionFaith <= 0) {
      this.visionFaith = 50;
      this.player.setPosition(this.player.x - 200, H - 65);
      this.cameras.main.flash(500, 100, 100, 100);
      showDialogue(this, 'Narrator', 'You lost your way in the mist! Hold to the iron rod — stay near the bottom of the path.');
    }

    const treeDist = Phaser.Math.Distance.Between(this.player.x, this.player.y, 2250, H - 150);
    if (treeDist < 60) {
      this.reachedTree = true;
      GameState.ironRodComplete = true;
      GameState.faith = Math.min(GameState.faith + 25, GameState.maxFaith);
      gainFP(50);
      addJournal('Held to the iron rod and reached the Tree of Life');

      this.cameras.main.flash(1000, 255, 255, 230);
      this.time.delayedCall(500, () => {
        showDialogue(this, 'Narrator', 'You have reached the Tree of Life! Its fruit is the love of God — the most joyous thing the soul can experience. Lehi reached out and partook, and his joy was full.', () => {
          showDialogue(this, 'Lehi', 'This fruit is most sweet, above all that I ever tasted. It filled my soul with exceeding great joy. I want all of my family to taste of it.', () => {
            showScriptureUnlock(this,
              '1 Nephi 11:25',
              'The love of God, which sheddeth itself abroad in the hearts of the children of men; wherefore, it is the most desirable above all things.',
              () => {
                this.cameras.main.fadeOut(800);
                this.time.delayedCall(800, () => this.scene.start('Jerusalem'));
              }
            );
          });
        });
      });
    }
  }
}


// ============================================================
// PHASER CONFIG
// ============================================================
const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#1a1a2e',
  parent: document.body,
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scene: [BootScene, TitleScene, WorldMapScene, JerusalemScene, BrassPlatesScene, BattleScene, IronRodScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  pixelArt: true,
};

const game = new Phaser.Game(config);
</script>
</body>
</html>
