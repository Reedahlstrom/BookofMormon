<script>

// If a scene crashes on GitHub Pages, show the actual exception on-screen (not just in DevTools).
(function initErrorOverlay() {
  const el = document.createElement('pre');
  el.id = 'bom_debug_overlay';
  el.style.cssText = [
    'position:fixed',
    'left:12px',
    'top:12px',
    'right:12px',
    'max-height:45vh',
    'overflow:auto',
    'padding:10px 12px',
    'background:rgba(0,0,0,0.85)',
    'color:#ffd27a',
    'border:1px solid rgba(255,215,0,0.5)',
    'border-radius:8px',
    'font:12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
    'z-index:99999',
    'display:none',
    'white-space:pre-wrap',
  ].join(';');
  document.body.appendChild(el);

  function show(msg) {
    el.style.display = 'block';
    el.textContent = String(msg || 'Unknown error');
  }

  window.addEventListener('error', (e) => {
    const err = e.error;
    show(`JS ERROR:\n${e.message}\n\n${(err && (err.stack || err.message)) || ''}`);
  });
  window.addEventListener('unhandledrejection', (e) => {
    const r = e.reason;
    show(`UNHANDLED PROMISE:\n${(r && (r.stack || r.message)) || String(r)}`);
  });
})();

// --- CONSTANTS ---
const W = 800, H = 600;
const TILE = 32;
const COLORS = {
  sand: 0xd4a574, darkSand: 0xb8956a, gold: 0xffd700, olive: 0x6b8e23,
  deepBlue: 0x16213e, skyBlue: 0x87ceeb, nightBlue: 0x0f3460, white: 0xffffff,
  red: 0xc0392b, darkRed: 0x8b0000, green: 0x27ae60, darkGreen: 0x1e8449,
  brown: 0x8b4513, lightBrown: 0xdeb887, gray: 0x808080, darkGray: 0x404040,
  purple: 0x8e44ad, black: 0x000000, cream: 0xfff8dc, iron: 0x708090,
  mist: 0x778899, treeGold: 0xffe066, faithBlue: 0x3498db, pink: 0xffb6c1
};

// --- GAME STATE ---
const GameState = {
  playerName: 'Traveler',
  playerAppearance: {
    skinTone: 0xd4a574, hairColor: 0x3d2b1f, hairStyle: 'short',
    robeColor: 0x5b8c5a, robeAccent: 0x3d6b3c, headwear: 'headband',
    headwearColor: 0x8B7355, beardStyle: 'none', expression: 'brave',
  },
  faith: 50, courage: 30, testimony: 20, charity: 25, wisdom: 15,
  maxFaith: 100, level: 1, faithPoints: 0, fpToNext: 100,

  prophetCards: [],
  journal: [],
  currentWorld: 1,
  questFlags: {},
  companion: null,
  inventory: [],
  battleWon: false,
  ironRodComplete: false,
  brassPlatesObtained: false,
  completedScenes: [],
  shipProgress: 0,
  liahonaActive: false,
  // Premium systems
  alignment: { faithVsDoubt: 0, compassionVsHarshness: 0, choices: [] },
  chapter: { book: '1 Nephi', chapter: 3, label: '1 Nephi \u00b7 Ch. 3' },

const STORAGE_KEY_SAVE = 'bomrpg_save_v1';

function clamp01(n) { return Math.max(0, Math.min(1, n)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function nowMs() { return Date.now(); }

function safeParseJSON(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

function saveGame(meta = {}) {
  const payload = {
    version: 1,
    savedAt: nowMs(),
    meta,
    state: GameState,
  };
  try { localStorage.setItem(STORAGE_KEY_SAVE, JSON.stringify(payload)); } catch {}
}

function loadGame() {
  const raw = localStorage.getItem(STORAGE_KEY_SAVE);
  if (!raw) return false;
  const payload = safeParseJSON(raw, null);
  if (!payload || payload.version !== 1 || !payload.state) return false;

  // Shallow-merge for forwards compatibility (keeps new defaults if missing).
  Object.keys(payload.state).forEach((k) => { GameState[k] = payload.state[k]; });
  return true;
}

function hasSaveGame() {
  return !!localStorage.getItem(STORAGE_KEY_SAVE);
}

function resetGameState() {
  const keepSettings = GameState.settings;
  const keepName = GameState.playerName;
  const keepScriptures = [];
  Object.keys(GameState).forEach(k => delete GameState[k]);
  Object.assign(GameState, {
    playerName: keepName || 'Traveler',
    faith: 50, courage: 30, testimony: 20, charity: 25, wisdom: 15,
    maxFaith: 100, level: 1, faithPoints: 0, fpToNext: 100,
    scriptures: keepScriptures,
    prophetCards: [],
    journal: [],
    currentWorld: 1,
    questFlags: {},
    companion: null,
    inventory: [],
    battleWon: false,
    ironRodComplete: false,
    brassPlatesObtained: false,
    completedScenes: [],
    shipProgress: 0,
    liahonaActive: false,
    alignment: { faithVsDoubt: 0, compassionVsHarshness: 0, choices: [] },
    chapter: { book: '1 Nephi', chapter: 3, label: '1 Nephi \u00b7 Ch. 3' },
    time: { t: 0.72 },
    settings: keepSettings || {
      difficulty: 'disciple',
      textSize: 'medium',
      colorblind: false,
      music: 0.65,
      sfx: 0.8,
      textSpeedMs: 22,
      autoAdvance: false,
    },
  });
}

function recordChoice(choice) {
  if (!choice) return;
  const { id, faithVsDoubt = 0, compassionVsHarshness = 0, label = '' } = choice;
  GameState.alignment.faithVsDoubt += faithVsDoubt;
  GameState.alignment.compassionVsHarshness += compassionVsHarshness;
  GameState.alignment.choices.push({ id: id || `choice_${GameState.alignment.choices.length + 1}`, label, faithVsDoubt, compassionVsHarshness, time: nowMs() });
}

function addScripture(ref, text) {
  if (!GameState.scriptures.find(s => s.ref === ref)) {
    GameState.scriptures.push({ ref, text });
    return true;
  }
  return false;
}

function addJournal(entry) {
  GameState.journal.push({ entry, time: Date.now() });
}

function gainFP(amount) {
  GameState.faithPoints += amount;
  while (GameState.faithPoints >= GameState.fpToNext) {
    GameState.faithPoints -= GameState.fpToNext;
    GameState.level++;
    GameState.maxFaith += 10;
    GameState.faith = Math.min(GameState.faith + 20, GameState.maxFaith);
    GameState.courage += 5;
    GameState.testimony += 5;
    GameState.charity += 5;
    GameState.wisdom += 3;
    GameState.fpToNext = Math.floor(GameState.fpToNext * 1.5);
  }
}

// ============================================================
// PIXEL ART SPRITE GENERATION SYSTEM
// Characters are drawn onto canvas textures at 2x pixel scale
// for a chunky retro RPG look with 600 BC clothing
// ============================================================

function hexToRGB(hex) {
  return { r: (hex >> 16) & 0xff, g: (hex >> 8) & 0xff, b: hex & 0xff };
}

function darken(hex, amt = 40) {
  const c = hexToRGB(hex);
  return Phaser.Display.Color.GetColor(
    Math.max(0, c.r - amt), Math.max(0, c.g - amt), Math.max(0, c.b - amt)
  );
}

function lighten(hex, amt = 40) {
  const c = hexToRGB(hex);
  return Phaser.Display.Color.GetColor(
    Math.min(255, c.r + amt), Math.min(255, c.g + amt), Math.min(255, c.b + amt)
  );
}

// Draw a pixel on a graphics object at 2x scale
function px(g, x, y, color, alpha = 1) {
  g.fillStyle(color, alpha);
  g.fillRect(x * 2, y * 2, 2, 2);
}

// Generate a character texture and register it with the scene
function generateCharacterTexture(scene, key, config) {
  const {
    skinTone = 0xd4a574,     // Middle Eastern olive/tan skin
    hairColor = 0x2c1810,    // Dark brown/black hair
    hairStyle = 'short',     // short, long, bald
    beardStyle = 'none',     // none, short, long, prophet
    robeColor = 0x8B7355,    // Main robe color
    robeAccent = 0x6B5335,   // Robe trim/belt
    cloakColor = null,       // Optional outer cloak
    headwear = 'none',       // none, headband, turban, hood
    headwearColor = 0xffd700,
    sandals = 0x8B6914,
    hasStaff = false,
    staffColor = 0x8B6914,
    hasSword = false,
    isArmored = false,
    armorColor = 0x708090,
    eyeColor = 0x3D2B1F,
    expression = 'neutral',  // neutral, brave, wise, kind
    accessory = 'none',      // none, scroll, plates
    accessoryColor = 0xffd700,
  } = config;

  const sprW = 32, sprH = 48; // sprite dimensions in 2x pixels
  const g = scene.make.graphics({ x: 0, y: 0, add: false });

  const skinDark = darken(skinTone, 30);
  const skinLight = lighten(skinTone, 20);
  const robeDark = darken(robeColor, 30);
  const robeLight = lighten(robeColor, 30);
  const hairDark = darken(hairColor, 20);

  // === SANDALS (bottom) ===
  px(g, 5, 22, sandals); px(g, 6, 22, sandals); px(g, 7, 22, sandals);
  px(g, 9, 22, sandals); px(g, 10, 22, sandals); px(g, 11, 22, sandals);
  px(g, 5, 23, darken(sandals)); px(g, 6, 23, sandals); px(g, 7, 23, darken(sandals));
  px(g, 9, 23, darken(sandals)); px(g, 10, 23, sandals); px(g, 11, 23, darken(sandals));

  // === LEGS (showing below robe) ===
  px(g, 6, 20, skinTone); px(g, 7, 20, skinTone);
  px(g, 6, 21, skinTone); px(g, 7, 21, skinDark);
  px(g, 9, 20, skinTone); px(g, 10, 20, skinTone);
  px(g, 9, 21, skinDark); px(g, 10, 21, skinTone);

  // === ROBE (main body) ===
  // Lower robe (wider, flowing)
  for (let y = 16; y <= 19; y++) {
    for (let x = 4; x <= 12; x++) {
      const c = (x === 4 || x === 12) ? robeDark : (x === 8 ? robeLight : robeColor);
      px(g, x, y, c);
    }
  }
  // Robe hem detail
  for (let x = 4; x <= 12; x++) {
    px(g, x, 19, (x % 2 === 0) ? robeAccent : robeDark);
  }

  // Upper robe / torso
  for (let y = 10; y <= 15; y++) {
    for (let x = 5; x <= 11; x++) {
      const c = (x === 5 || x === 11) ? robeDark : robeColor;
      px(g, x, y, c);
    }
  }

  // Belt/sash
  for (let x = 5; x <= 11; x++) {
    px(g, x, 14, robeAccent);
  }
  px(g, 8, 15, robeAccent); // belt hanging bit

  // Neckline / collar
  px(g, 7, 10, skinTone); px(g, 8, 10, skinTone); px(g, 9, 10, skinTone);

  // === CLOAK (if specified) ===
  if (cloakColor) {
    const cloakDark = darken(cloakColor, 25);
    // Left cloak drape
    px(g, 3, 11, cloakColor); px(g, 4, 11, cloakColor);
    px(g, 3, 12, cloakColor); px(g, 3, 13, cloakDark);
    px(g, 3, 14, cloakColor); px(g, 3, 15, cloakDark);
    px(g, 3, 16, cloakColor); px(g, 4, 16, cloakDark);
    // Right cloak drape
    px(g, 12, 11, cloakColor); px(g, 13, 11, cloakColor);
    px(g, 13, 12, cloakColor); px(g, 13, 13, cloakDark);
    px(g, 13, 14, cloakColor); px(g, 13, 15, cloakDark);
    px(g, 13, 16, cloakColor); px(g, 12, 16, cloakDark);
    // Shoulders
    px(g, 4, 10, cloakColor); px(g, 5, 10, cloakColor);
    px(g, 11, 10, cloakColor); px(g, 12, 10, cloakColor);
  }

  // === ARMS ===
  // Left arm
  px(g, 4, 11, robeColor); px(g, 3, 12, robeColor); px(g, 3, 13, robeColor);
  px(g, 3, 14, skinTone); // hand
  // Right arm
  px(g, 12, 11, robeColor); px(g, 13, 12, robeColor); px(g, 13, 13, robeColor);
  px(g, 13, 14, skinTone); // hand

  // === ARMOR (if specified) ===
  if (isArmored) {
    const armorLight = lighten(armorColor, 30);
    for (let y = 11; y <= 13; y++) {
      for (let x = 6; x <= 10; x++) {
        px(g, x, y, (y === 12 && x === 8) ? armorLight : armorColor);
      }
    }
    // Shoulder guards
    px(g, 4, 10, armorColor); px(g, 5, 10, armorLight);
    px(g, 11, 10, armorLight); px(g, 12, 10, armorColor);
  }

  // === HEAD ===
  // Face shape (round-ish)
  for (let y = 4; y <= 9; y++) {
    for (let x = 6; x <= 10; x++) {
      if (y === 4 && (x === 6 || x === 10)) continue; // round top corners
      if (y === 9 && (x === 6 || x === 10)) continue; // round chin
      px(g, x, y, skinTone);
    }
  }
  // Jaw/chin shading
  px(g, 7, 9, skinDark); px(g, 8, 9, skinTone); px(g, 9, 9, skinDark);

  // === EYES ===
  // Eye whites
  px(g, 7, 6, 0xffffff); px(g, 9, 6, 0xffffff);
  // Pupils
  px(g, 7, 6, eyeColor); px(g, 9, 6, eyeColor);
  // Eyebrows
  px(g, 7, 5, hairColor); px(g, 9, 5, hairColor);

  // Expression variations
  if (expression === 'brave') {
    px(g, 6, 5, hairColor); px(g, 10, 5, hairColor); // strong brows
  } else if (expression === 'wise') {
    px(g, 7, 5, hairDark); px(g, 9, 5, hairDark);
  } else if (expression === 'kind') {
    // slight smile
    px(g, 7, 8, darken(skinTone, 50)); px(g, 8, 8, darken(skinTone, 60)); px(g, 9, 8, darken(skinTone, 50));
  }

  // Nose
  px(g, 8, 7, skinDark);

  // Mouth
  px(g, 8, 8, darken(skinTone, 45));

  // Ears
  px(g, 6, 6, skinDark); px(g, 10, 6, skinDark);

  // === HAIR ===
  if (hairStyle === 'short') {
    for (let x = 6; x <= 10; x++) px(g, x, 3, hairColor);
    px(g, 6, 4, hairColor); px(g, 10, 4, hairColor);
    px(g, 6, 5, hairDark); px(g, 10, 5, hairDark);
  } else if (hairStyle === 'long') {
    for (let x = 5; x <= 11; x++) px(g, x, 3, hairColor);
    px(g, 5, 4, hairColor); px(g, 6, 4, hairColor); px(g, 10, 4, hairColor); px(g, 11, 4, hairColor);
    px(g, 5, 5, hairDark); px(g, 11, 5, hairDark);
    px(g, 5, 6, hairColor); px(g, 11, 6, hairColor);
    px(g, 5, 7, hairDark); px(g, 11, 7, hairDark);
    px(g, 5, 8, hairColor); px(g, 11, 8, hairColor);
  } else if (hairStyle === 'bald') {
    for (let x = 7; x <= 9; x++) px(g, x, 3, skinLight);
    px(g, 6, 4, skinLight); px(g, 10, 4, skinLight);
  }

  // === BEARD ===
  if (beardStyle === 'short') {
    px(g, 7, 9, hairColor); px(g, 8, 9, hairColor); px(g, 9, 9, hairColor);
    px(g, 8, 10, hairColor);
  } else if (beardStyle === 'long') {
    px(g, 7, 9, hairColor); px(g, 8, 9, hairColor); px(g, 9, 9, hairColor);
    px(g, 7, 10, hairColor); px(g, 8, 10, hairColor); px(g, 9, 10, hairColor);
    px(g, 8, 11, hairDark);
  } else if (beardStyle === 'prophet') {
    px(g, 6, 8, hairColor); px(g, 10, 8, hairColor);
    px(g, 6, 9, hairColor); px(g, 7, 9, hairColor); px(g, 8, 9, hairColor);
    px(g, 9, 9, hairColor); px(g, 10, 9, hairColor);
    px(g, 7, 10, hairColor); px(g, 8, 10, hairColor); px(g, 9, 10, hairColor);
    px(g, 7, 11, hairDark); px(g, 8, 11, hairColor); px(g, 9, 11, hairDark);
    px(g, 8, 12, hairDark);
  }

  // === HEADWEAR ===
  if (headwear === 'headband') {
    for (let x = 6; x <= 10; x++) px(g, x, 4, headwearColor);
    px(g, 5, 4, headwearColor);
    px(g, 11, 4, headwearColor);
  } else if (headwear === 'turban') {
    for (let x = 5; x <= 11; x++) px(g, x, 2, headwearColor);
    for (let x = 5; x <= 11; x++) px(g, x, 3, lighten(headwearColor, 15));
    for (let x = 6; x <= 10; x++) px(g, x, 4, headwearColor);
    px(g, 5, 4, darken(headwearColor, 15)); px(g, 11, 4, darken(headwearColor, 15));
  } else if (headwear === 'hood') {
    for (let x = 5; x <= 11; x++) px(g, x, 2, headwearColor);
    for (let x = 5; x <= 11; x++) px(g, x, 3, darken(headwearColor, 15));
    px(g, 5, 4, headwearColor); px(g, 11, 4, headwearColor);
    px(g, 5, 5, darken(headwearColor, 15)); px(g, 11, 5, darken(headwearColor, 15));
    px(g, 5, 6, headwearColor);
  }

  // === STAFF ===
  if (hasStaff) {
    for (let y = 3; y <= 22; y++) {
      px(g, 14, y, staffColor);
    }
    px(g, 14, 2, lighten(staffColor, 30));
    px(g, 15, 2, lighten(staffColor, 30));
  }

  // === SWORD ===
  if (hasSword) {
    // Sword on hip
    px(g, 13, 14, 0xaaaaaa); px(g, 14, 15, 0xcccccc); px(g, 14, 16, 0xcccccc);
    px(g, 14, 17, 0xdddddd); px(g, 14, 18, 0xcccccc);
    px(g, 13, 13, 0x8B6914); px(g, 14, 13, 0x8B6914); // hilt
  }

  // === ACCESSORY ===
  if (accessory === 'scroll') {
    px(g, 2, 13, accessoryColor); px(g, 2, 14, accessoryColor);
    px(g, 2, 15, lighten(accessoryColor, 30));
  } else if (accessory === 'plates') {
    px(g, 1, 13, accessoryColor); px(g, 2, 13, accessoryColor);
    px(g, 1, 14, darken(accessoryColor)); px(g, 2, 14, accessoryColor);
    px(g, 1, 15, accessoryColor); px(g, 2, 15, darken(accessoryColor));
    px(g, 1, 16, darken(accessoryColor)); px(g, 2, 16, accessoryColor);
  }

  g.generateTexture(key, sprW, sprH);
  g.destroy();
}

// Generate the "Doubt" enemy sprite
function generateDoubtTexture(scene, key) {
  const g = scene.make.graphics({ x: 0, y: 0, add: false });
  const sprW = 48, sprH = 56;

  // Shadowy amorphous body
  const base = 0x556677;
  const dark = 0x334455;
  const light = 0x778899;

  // Main ghostly body
  for (let y = 8; y <= 24; y++) {
    const width = Math.floor(8 + Math.sin((y - 8) / 16 * Math.PI) * 6);
    for (let x = 12 - width/2; x <= 12 + width/2; x++) {
      const wobble = Math.sin(x * 0.5 + y * 0.3) > 0 ? base : dark;
      px(g, Math.floor(x), y, wobble, 0.8);
    }
  }

  // Wisps/tendrils at bottom
  for (let t = 0; t < 5; t++) {
    const tx = 8 + t * 3;
    for (let y = 22; y <= 26; y++) {
      px(g, tx + (y % 2), y, dark, 0.4 - (y - 22) * 0.08);
    }
  }

  // Face - hollow eyes
  px(g, 10, 13, 0x000000); px(g, 11, 13, 0x000000);
  px(g, 14, 13, 0x000000); px(g, 15, 13, 0x000000);
  px(g, 10, 14, 0x111122); px(g, 11, 14, 0x000000);
  px(g, 14, 14, 0x000000); px(g, 15, 14, 0x111122);

  // Eerie glowing pupils
  px(g, 10, 13, 0x99aacc); px(g, 14, 13, 0x99aacc);

  // Gaping question-mark mouth
  px(g, 11, 17, dark); px(g, 12, 17, 0x223344); px(g, 13, 17, dark);
  px(g, 12, 18, 0x223344);
  px(g, 12, 16, light);

  // ? symbol faintly
  px(g, 12, 9, light); px(g, 13, 9, light);
  px(g, 13, 10, light); px(g, 12, 11, light);
  px(g, 12, 12, 0x000000); // gap
  // dot
  px(g, 12, 13, 0x000000);

  // Horns/dark wisps on top
  px(g, 9, 7, dark); px(g, 8, 6, dark);
  px(g, 15, 7, dark); px(g, 16, 6, dark);

  g.generateTexture(key, sprW, sprH);
  g.destroy();
}

// Generate guard sprite (armored)
function generateGuardTexture(scene, key) {
  generateCharacterTexture(scene, key, {
    skinTone: 0xc49a6c,
    hairColor: 0x1a1a1a,
    hairStyle: 'short',
    beardStyle: 'short',
    robeColor: 0x8B0000,
    robeAccent: 0x5c0000,
    isArmored: true,
    armorColor: 0x808080,
    hasSword: true,
    headwear: 'headband',
    headwearColor: 0x8B0000,
    expression: 'brave',
  });
}

// Pre-generate all character textures
function generateAllSprites(scene) {
  // Player (young traveler)
  generateCharacterTexture(scene, 'player', {
    skinTone: 0xd4a574,
    hairColor: 0x3d2b1f,
    hairStyle: 'short',
    beardStyle: 'none',
    robeColor: 0x5b8c5a,    // Green tunic
    robeAccent: 0x3d6b3c,
    headwear: 'headband',
    headwearColor: 0x8B7355,
    expression: 'brave',
  });

  // Nephi (young, strong, faithful)
  generateCharacterTexture(scene, 'nephi', {
    skinTone: 0xc49a6c,
    hairColor: 0x1a1208,
    hairStyle: 'short',
    beardStyle: 'short',
    robeColor: 0x2c6fbb,    // Blue robe
    robeAccent: 0x1a4d8f,
    headwear: 'headband',
    headwearColor: 0xdaa520,
    hasSword: true,
    isArmored: true,
    armorColor: 0x708090,
    expression: 'brave',
  });

  // Lehi (elderly prophet)
  generateCharacterTexture(scene, 'lehi', {
    skinTone: 0xc49a6c,
    hairColor: 0xaaaaaa,     // Gray hair

function ensureCanvasTexture(scene, key, width, height, drawFn) {
  if (scene.textures.exists(key)) return key;
  const tx = scene.textures.createCanvas(key, width, height);
  const ctx = tx.getContext();
  drawFn(ctx, width, height);
  tx.refresh();
  return key;
}

function hexToCss(hex) {
  return `#${hex.toString(16).padStart(6, '0')}`;
}

function makeRadialLightTexture(scene, key, size, innerHex, outerHex, innerA = 1, outerA = 0) {
  return ensureCanvasTexture(scene, key, size, size, (ctx, w, h) => {
    ctx.clearRect(0, 0, w, h);
    const g = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w / 2);
    g.addColorStop(0, `${hexToCss(innerHex)}${Math.round(innerA * 255).toString(16).padStart(2, '0')}`);
    g.addColorStop(1, `${hexToCss(outerHex)}${Math.round(outerA * 255).toString(16).padStart(2, '0')}`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  });
}

function makeParchmentTexture(scene, key, width, height) {
  return ensureCanvasTexture(scene, key, width, height, (ctx, w, h) => {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#f6eed8';
    ctx.fillRect(0, 0, w, h);

    // Subtle fiber noise.
    for (let i = 0; i < (w * h) / 45; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const a = 0.04 + Math.random() * 0.06;
      ctx.fillStyle = `rgba(140, 110, 70, ${a.toFixed(3)})`;
      ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 2);
    }

    // Edge vignette.
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, 'rgba(90, 60, 20, 0.18)');
    g.addColorStop(0.1, 'rgba(90, 60, 20, 0)');
    g.addColorStop(0.9, 'rgba(90, 60, 20, 0)');
    g.addColorStop(1, 'rgba(90, 60, 20, 0.16)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  });
}

function makeIconTextures(scene) {
  ensureCanvasTexture(scene, 'icon_heart', 32, 32, (ctx) => {
    ctx.clearRect(0, 0, 32, 32);
    ctx.fillStyle = '#ffcc66';
    ctx.beginPath();
    ctx.moveTo(16, 26);
    ctx.bezierCurveTo(6, 18, 4, 10, 10, 8);
    ctx.bezierCurveTo(14, 6, 16, 10, 16, 10);
    ctx.bezierCurveTo(16, 10, 18, 6, 22, 8);
    ctx.bezierCurveTo(28, 10, 26, 18, 16, 26);
    ctx.closePath();
    ctx.fill();
  });

  ensureCanvasTexture(scene, 'icon_flame', 32, 32, (ctx) => {
    ctx.clearRect(0, 0, 32, 32);
    const g = ctx.createRadialGradient(16, 18, 2, 16, 18, 12);
    g.addColorStop(0, 'rgba(255, 255, 220, 1)');
    g.addColorStop(0.4, 'rgba(255, 210, 80, 0.95)');
    g.addColorStop(1, 'rgba(255, 120, 0, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(16, 18, 12, 0, Math.PI * 2);
    ctx.fill();
  });

  ensureCanvasTexture(scene, 'icon_compass', 48, 48, (ctx) => {
    ctx.clearRect(0, 0, 48, 48);
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(24, 24, 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(20, 30, 50, 0.65)';
    ctx.beginPath();
    ctx.arc(24, 24, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 215, 0, 0.9)';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('N', 24, 12);
  });
}

function initPremiumTextures(scene) {
  makeRadialLightTexture(scene, 'light_warm_256', 256, 0xffb24a, 0x000000, 0.95, 0);
  makeRadialLightTexture(scene, 'light_cool_256', 256, 0xbfdcff, 0x000000, 0.75, 0);

  makeRadialLightTexture(scene, 'light_white_256', 256, 0xffffff, 0x000000, 0.75, 0);
  ensureCanvasTexture(scene, 'particle_dot', 8, 8, (ctx) => {
    ctx.clearRect(0, 0, 8, 8);
    ctx.fillStyle = 'rgba(255,255,255,1)';
    ctx.beginPath();
    ctx.arc(4, 4, 3, 0, Math.PI * 2);
    ctx.fill();
  });
  ensureCanvasTexture(scene, 'particle_smoke', 24, 24, (ctx) => {
    ctx.clearRect(0, 0, 24, 24);
    const g = ctx.createRadialGradient(12, 12, 2, 12, 12, 12);
    g.addColorStop(0, 'rgba(180,190,210,0.25)');
    g.addColorStop(1, 'rgba(180,190,210,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(12, 12, 12, 0, Math.PI * 2);
    ctx.fill();
  });
  ensureCanvasTexture(scene, 'particle_spark', 16, 16, (ctx) => {
    ctx.clearRect(0, 0, 16, 16);
    const g = ctx.createRadialGradient(8, 8, 1, 8, 8, 8);
    g.addColorStop(0, 'rgba(255,255,220,1)');
    g.addColorStop(0.4, 'rgba(255,190,60,0.9)');
    g.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(8, 8, 8, 0, Math.PI * 2);

  makeParchmentTexture(scene, 'ui_parchment_panel', 520, 220);
  makeParchmentTexture(scene, 'ui_parchment_wide', 760, 180);

  makeIconTextures(scene);
}

// Phaser 3.60+ particle factory returns a ParticleEmitter directly.
// Keep this helper small and non-throwing so effects can never hard-crash scenes.
function createEmitterCompat(scene, x, y, key, config, depth = null) {
  const emitter = scene.add.particles(x, y, key, config);
  if (emitter && depth != null && typeof emitter.setDepth === 'function') emitter.setDepth(depth);
  return { particles: emitter, emitter };
}

const FX = {
  // Creates an overlay-based lighting rig that works with generated textures (no external assets).
  createLightingRig(scene, opts = {}) {
    const rig = { lights: [], pulse: 0, enabled: true };

    // Darkness overlay: NORMAL blend so we never fully black-screen the scene.
    // Light sprites (SCREEN blend) sit above this to "carve" brightness back in.
    rig.darkness = scene.add.rectangle(0, 0, W, H, 0x000000, 0.0)
      .setOrigin(0).setScrollFactor(0).setDepth(80);
    rig.darkness.setBlendMode(Phaser.BlendModes.NORMAL);

    const worldSpace = (opts.space || 'world') !== 'screen';
    rig.overlay = scene.add.container(0, 0).setScrollFactor(worldSpace ? 1 : 0).setDepth(81);

    rig.setAmbient = (alpha) => {
      rig.darkness.setAlpha(clamp01(alpha));
    };

    rig.addLight = (x, y, textureKey, baseScale = 1, baseAlpha = 1, flicker = 0) => {
      const spr = scene.add.image(x, y, textureKey);
      if (!worldSpace) spr.setScrollFactor(0);
      spr.setBlendMode(Phaser.BlendModes.SCREEN);
      spr.setDepth(81);
      spr.setScale(baseScale);
      spr.setAlpha(baseAlpha);
      const light = { spr, baseScale, baseAlpha, flicker, seed: Math.random() * 1000 };
      rig.lights.push(light);
      rig.overlay.add(spr);
      return light;
    };

    rig.attachWarmTo = (target, offsetX, offsetY, radiusScale = 0.45, alpha = 0.35) => {
      const spr = scene.add.image(target.x + offsetX, target.y + offsetY, 'light_warm_256')
        .setBlendMode(Phaser.BlendModes.SCREEN)
        .setDepth(target.depth + 1)
        .setScale(radiusScale)
        .setAlpha(alpha);
      if (!worldSpace) spr.setScrollFactor(0);
      const link = { spr, target, ox: offsetX, oy: offsetY };
      rig.lights.push({ spr, baseScale: radiusScale, baseAlpha: alpha, flicker: 0.12, seed: Math.random() * 1000, link });
      return spr;
    };

    rig.update = (time) => {
      if (!rig.enabled) return;
      rig.lights.forEach((l) => {
        if (l.link) {
          l.spr.x = l.link.target.x + l.link.ox;
          l.spr.y = l.link.target.y + l.link.oy;
        }
        if (l.flicker) {
          const n = Math.sin((time * 0.006) + l.seed) * 0.5 + Math.sin((time * 0.014) + l.seed * 1.7) * 0.5;
          const j = 1 + n * l.flicker;
          l.spr.setAlpha(clamp01(l.baseAlpha * j));
          l.spr.setScale(l.baseScale * (1 + (j - 1) * 0.35));
        }
      });

      if (opts.spiritualPulse) {
        const p = 0.02 + Math.max(0, Math.sin(time * 0.0015)) * 0.03;
        rig.darkness.setAlpha(clamp01(rig.darkness.alpha + p));
      }
    };

    // Default ambient tuning per scene type.
    // Tuned to avoid crushing contrast on dark palettes.
    if (opts.mode === 'night') rig.setAmbient(0.32);
    if (opts.mode === 'interior') rig.setAmbient(0.58);
    if (opts.mode === 'dream') rig.setAmbient(0.28);
    if (opts.mode === 'day') rig.setAmbient(0.12);

    return rig;
  },

  createWindDust(scene, area = { x: 0, y: 0, w: W, h: H }, intensity = 1) {
    const { particles: mgr, emitter } = createEmitterCompat(scene, 0, 0, 'particle_dot', {
      x: { min: area.x - 20, max: area.x + area.w + 20 },
      y: { min: area.y + 30, max: area.y + area.h - 40 },
      lifespan: { min: 2200, max: 3800 },
      quantity: 1,
      frequency: Math.floor(180 / Math.max(0.4, intensity)),
      speedX: { min: 35, max: 75 },
      speedY: { min: -10, max: 10 },
      scale: { start: 0.12, end: 0.0 },
      alpha: { start: 0.15, end: 0 },
      tint: 0xd7c3a3,
    }, 20);
    return { mgr, emitter };
  },

  createCampfire(scene, x, y) {
    const light = scene._lighting?.addLight(x, y + 2, 'light_warm_256', 0.55, 0.55, 0.28);
    const { particles: sparksMgr } = createEmitterCompat(scene, x, y, 'particle_spark', {
      x: x, y: y,
      lifespan: { min: 450, max: 900 },
      speedY: { min: -55, max: -95 },
      speedX: { min: -18, max: 18 },
      scale: { start: 0.25, end: 0 },
      alpha: { start: 0.8, end: 0 },
      quantity: 1,
      frequency: 60,
      blendMode: 'ADD',
      tint: [0xffdd88, 0xffaa44, 0xff6622],
    }, 25);
    const { particles: smokeMgr } = createEmitterCompat(scene, x, y - 10, 'particle_smoke', {
      x: x, y: y - 10,
      lifespan: { min: 1800, max: 2800 },
      speedY: { min: -15, max: -30 },
      speedX: { min: -8, max: 8 },
      scale: { start: 0.5, end: 1.2 },
      alpha: { start: 0.18, end: 0 },
      frequency: 140,
      tint: 0xaab6c4,
    }, 24);
    return { light, sparks: sparksMgr, smoke: smokeMgr };
  },
};

const AudioEngine = (() => {
  let ctx = null;
  let master = null;
  let musicBus = null;
  let sfxBus = null;
  let activeTheme = null;
  let themeGain = null;
  let themeInterval = null;

  function ensure() {
    if (ctx) return true;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return false;
    ctx = new Ctx();
    master = ctx.createGain();
    musicBus = ctx.createGain();
    sfxBus = ctx.createGain();
    master.gain.value = 0.9;
    musicBus.gain.value = clamp01(GameState.settings.music ?? 0.65);
    sfxBus.gain.value = clamp01(GameState.settings.sfx ?? 0.8);
    musicBus.connect(master);
    sfxBus.connect(master);
    master.connect(ctx.destination);
    return true;
  }

  function unlock() {
    if (!ensure()) return;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  }

  function setVolumes() {
    if (!ctx) return;
    musicBus.gain.value = clamp01(GameState.settings.music ?? 0.65);
    sfxBus.gain.value = clamp01(GameState.settings.sfx ?? 0.8);
  }

  function playClick() {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(660, t + 0.04);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.05, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
    o.connect(g).connect(sfxBus);
    o.start(t);
    o.stop(t + 0.08);
  }

  function playChime() {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const freqs = [880, 1320, 1760];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, t + i * 0.02);
      g.gain.setValueAtTime(0.0001, t + i * 0.02);
      g.gain.exponentialRampToValueAtTime(0.06, t + i * 0.02 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.02 + 0.35);
      o.connect(g).connect(sfxBus);
      o.start(t + i * 0.02);
      o.stop(t + i * 0.02 + 0.4);
    });
  }

  function playWhoosh() {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.25, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1200, t);
    bp.frequency.exponentialRampToValueAtTime(400, t + 0.2);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
    src.connect(bp).connect(g).connect(sfxBus);
    src.start(t);
    src.stop(t + 0.25);
  }

  function step(surface = 'sand') {
    if (!ensure()) return;
    const t = ctx.currentTime;
    const f = surface === 'stone' ? 160 : surface === 'wood' ? 210 : surface === 'grass' ? 130 : 110;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(f * 0.6, t + 0.06);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.05, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
    o.connect(g).connect(sfxBus);
    o.start(t);
    o.stop(t + 0.09);
  }

  function stopTheme() {
    if (themeInterval) {
      clearInterval(themeInterval);
      themeInterval = null;
    }
    if (themeGain) {
      themeGain.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.2);
      themeGain = null;
    }
    activeTheme = null;
  }

  function setTheme(name) {
    if (!ensure()) return;
    if (activeTheme === name) return;

    const t0 = ctx.currentTime;
    const newGain = ctx.createGain();
    newGain.gain.setValueAtTime(0.0001, t0);
    newGain.gain.exponentialRampToValueAtTime(0.28, t0 + 2.0);
    newGain.connect(musicBus);

    // Fade out previous theme.
    if (themeGain) themeGain.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.0);
    if (themeInterval) clearInterval(themeInterval);

    activeTheme = name;
    themeGain = newGain;

    const scales = {
      jerusalem: [0, 2, 3, 7, 8, 10], // Phrygian-ish
      wilderness: [0, 3, 5, 7, 10],
      dream: [0, 2, 5, 7, 9],
      battle: [0, 2, 3, 5, 7, 8, 10],
      spiritual: [0, 5, 7, 9],
    };
    const base = name === 'battle' ? 110 : name === 'dream' ? 84 : name === 'wilderness' ? 78 : 96;
    const scale = scales[name] || scales.jerusalem;
    let stepN = 0;

    themeInterval = setInterval(() => {
      const t = ctx.currentTime;
      const degree = scale[stepN % scale.length];
      const octave = (stepN % 8 < 4) ? 0 : 1;
      const freq = base * Math.pow(2, (degree + octave * 12) / 12);

      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const f = ctx.createBiquadFilter();
      o.type = name === 'dream' ? 'sine' : 'triangle';
      o.frequency.setValueAtTime(freq, t);
      f.type = 'lowpass';
      f.frequency.setValueAtTime(name === 'battle' ? 1400 : 900, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(name === 'battle' ? 0.09 : 0.065, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (name === 'battle' ? 0.16 : 0.22));
      o.connect(f).connect(g).connect(newGain);
      o.start(t);
      o.stop(t + (name === 'battle' ? 0.18 : 0.26));

      // Simple bass pulse.
      if (stepN % 4 === 0) {
        const bo = ctx.createOscillator();
        const bg = ctx.createGain();
        bo.type = 'sine';
        bo.frequency.setValueAtTime(base / 2, t);
        bg.gain.setValueAtTime(0.0001, t);
        bg.gain.exponentialRampToValueAtTime(name === 'wilderness' ? 0.035 : 0.05, t + 0.02);
        bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
        bo.connect(bg).connect(newGain);
        bo.start(t);
        bo.stop(t + 0.26);
      }

      stepN++;
    }, name === 'battle' ? 160 : name === 'wilderness' ? 280 : 220);
  }

  return {
    unlock,
    setTheme,
    stopTheme,
    setVolumes,
    sfx: { click: playClick, chime: playChime, whoosh: playWhoosh, step },
  };
})();

  return GameState.settings.textSize === 'large' ? 1.15 : GameState.settings.textSize === 'small' ? 0.92 : 1;

function makePortraitCircle(scene, textureKey, x, y, size, depth = 210) {
  const frame = scene.add.circle(x, y, size / 2 + 2, 0x16213e, 0.75).setDepth(depth).setScrollFactor(0);
  frame.setStrokeStyle(2, COLORS.gold, 0.9);
  const img = scene.add.image(x, y, textureKey).setDepth(depth + 1).setScrollFactor(0);
  img.setScale(size / Math.max(img.width, 1));
  const maskG = scene.add.graphics().setScrollFactor(0).setDepth(depth + 2);
  maskG.fillStyle(0xffffff, 1);
  maskG.fillCircle(x, y, size / 2);
  img.setMask(maskG.createGeometryMask());
  maskG.setVisible(false);
  return { frame, img, maskG };
}

// --- HELPER: Dialogue box (premium parchment UI) ---
function showDialogue(scene, speaker, text, onComplete, optionsOrOpts) {
  AudioEngine.unlock();

  const opts = Array.isArray(optionsOrOpts) ? { choices: optionsOrOpts } : (optionsOrOpts || {});
  const portraitMap = {
    'Nephi': 'nephi', 'Lehi': 'lehi', 'Sariah': 'sariah',
    'Sam': 'sam', 'Laman': 'laman', 'Lemuel': 'lemuel',
    'Zoram': 'zoram', 'Mormon': 'mormon', 'Angel': 'angel', 'Ishmael': 'ishmael',
    'Narrator': null,
  };
  const portraitKey = portraitMap[speaker] || null;

  if (scene._dialogueOpen) return null;
  scene._dialogueOpen = true;

  const scale = uiTextScale();
  const ui = scene.add.container(0, 0).setDepth(200).setScrollFactor(0);

  const dim = scene.add.rectangle(0, 0, W, H, 0x000000, 0.25).setOrigin(0);
  dim.setBlendMode(Phaser.BlendModes.MULTIPLY);
  ui.add(dim);

  const panel = scene.add.image(W / 2, H - 88, 'ui_parchment_wide');
  panel.setDisplaySize(W - 36, 170);
  ui.add(panel);

  const panelShadow = scene.add.rectangle(W / 2, H - 88, W - 40, 170, 0x000000, 0.18);
  panelShadow.setBlendMode(Phaser.BlendModes.MULTIPLY);
  ui.add(panelShadow);

  const goldLine = scene.add.rectangle(40, H - 168, W - 80, 2, COLORS.gold, 0.55).setOrigin(0);
  ui.add(goldLine);

  const titleFont = 'Palatino Linotype, Book Antiqua, Palatino, serif';
  const bodyFont = 'Georgia, serif';

  const name = scene.add.text(52, H - 160, speaker, {
    fontSize: `${Math.floor(18 * scale)}px`,
    fontFamily: titleFont,
    color: '#8b5a2b',
    fontStyle: 'bold',
  });
  ui.add(name);

  let portrait = null;
  const textLeft = portraitKey && scene.textures.exists(portraitKey) ? 138 : 60;
  if (portraitKey && scene.textures.exists(portraitKey)) {
    portrait = makePortraitCircle(scene, portraitKey, 88, H - 105, 72, 210);
    ui.add(portrait.frame);
    ui.add(portrait.img);
  }

  // Optional Nephi internal monologue.
  let thoughtText = null;
  if (opts.thought) {
    thoughtText = scene.add.text(60, H - 198, opts.thought, {
      fontSize: `${Math.floor(12 * scale)}px`,
      fontFamily: bodyFont,
      color: '#2f2a20',
      fontStyle: 'italic',
      alpha: 0.85,
      wordWrap: { width: W - 120 },
    });
    ui.add(thoughtText);
  }

  // Typewriter text
  const msg = scene.add.text(textLeft, H - 132, '', {
    fontSize: `${Math.floor(16 * scale)}px`,
    fontFamily: bodyFont,
    color: '#1f1a12',
    wordWrap: { width: W - textLeft - 70 },
    lineSpacing: 6,
  });
  ui.add(msg);

  const prompt = scene.add.text(W - 92, H - 28, 'Tap', {
    fontSize: `${Math.floor(12 * scale)}px`,
    fontFamily: 'monospace',
    color: '#8b5a2b',
    alpha: 0,
  });
  ui.add(prompt);

  const progressBg = scene.add.rectangle(60, H - 28, W - 150, 6, 0x000000, 0.08).setOrigin(0, 0.5);
  const progress = scene.add.rectangle(60, H - 28, 0, 6, COLORS.gold, 0.55).setOrigin(0, 0.5);
  progressBg.setVisible(false);
  progress.setVisible(false);
  ui.add(progressBg);
  ui.add(progress);

  let typing = true;
  let charIndex = 0;
  const full = String(text ?? '');
  const speed = Math.max(10, GameState.settings.textSpeedMs ?? 22);

  const typeEvt = scene.time.addEvent({
    delay: speed,
    callback: () => {
      if (charIndex < full.length) {
        charIndex++;
        msg.setText(full.substring(0, charIndex));
      } else {
        typing = false;
        typeEvt.remove(false);
        prompt.setAlpha(0.85);
        scene.tweens.add({ targets: prompt, alpha: 0.35, duration: 700, yoyo: true, repeat: -1 });

        if (GameState.settings.autoAdvance) {
          progressBg.setVisible(true);
          progress.setVisible(true);
          const dur = Math.min(6500, 1200 + full.length * 28);
          progress.width = 0;
          scene.tweens.add({
            targets: progress,
            displayWidth: W - 150,
            duration: dur,
            onComplete: () => advance(),
          });
        }
      }
    },
    loop: true,
  });

  const cleanup = () => {
    ui.destroy(true);
    if (portrait) {
      portrait.maskG.destroy();
    }
    scene._dialogueOpen = false;
  };

  const advance = () => {
    if (typing) {
      charIndex = full.length;
      msg.setText(full);
      typing = false;
      AudioEngine.sfx.click();
      return;
    }
    AudioEngine.sfx.click();
    cleanup();
    if (onComplete) onComplete();
  };

  const handlePointer = () => advance();
  const handleSpace = () => advance();

  scene.input.on('pointerdown', handlePointer);
  scene.input.keyboard.on('keydown-SPACE', handleSpace);

  // Choice prompt (replaces typewriter with options).
  if (opts.choices && opts.choices.length) {
    typeEvt.remove(false);
    typing = false;
    msg.setText(full);
    prompt.setAlpha(0);

    const choices = [];
    const baseY = H - 76;
    opts.choices.forEach((c, i) => {
      const t = scene.add.text(textLeft, baseY + i * (28 * scale), `\u25ba ${c.text}`, {
        fontSize: `${Math.floor(15 * scale)}px`,
        fontFamily: 'Georgia, serif',
        color: '#e8d8b8',
        backgroundColor: '#1a1a2e',
        padding: { x: 8, y: 4 },
      }).setScrollFactor(0).setDepth(210).setInteractive({ useHandCursor: true });
      t.on('pointerover', () => { t.setColor('#ffd700'); t.setBackgroundColor('#2a2a4e'); });
      t.on('pointerout', () => { t.setColor('#e8d8b8'); t.setBackgroundColor('#1a1a2e'); });
      t.on('pointerdown', () => {
        recordChoice({ id: c.id, label: c.text, faithVsDoubt: c.faithVsDoubt || 0, compassionVsHarshness: c.compassionVsHarshness || 0 });
        choices.forEach(ct => ct.destroy());
        cleanup();
        if (c.onSelect) c.onSelect();
        else if (onComplete) onComplete();
      });
      choices.push(t);
    });

    scene.input.off('pointerdown', handlePointer);
    scene.input.keyboard.off('keydown-SPACE', handleSpace);
    dim.setAlpha(0.35);

    // Ensure choices get cleaned up if ui is destroyed
    ui.once(Phaser.GameObjects.Events.DESTROY, () => {
      choices.forEach(ct => { if (ct.active) ct.destroy(); });
    });
    return ui;
  }

  // Ensure listeners are removed when UI is destroyed.
  ui.once(Phaser.GameObjects.Events.DESTROY, () => {
    scene.input.off('pointerdown', handlePointer);
    scene.input.keyboard.off('keydown-SPACE', handleSpace);
  });

  return ui;
}

// --- HELPER: Scripture unlock (slide toast + particles) ---
function showScriptureUnlock(scene, ref, text, onDone) {
  AudioEngine.unlock();
  if (!addScripture(ref, text)) { if (onDone) onDone(); return; }
  gainFP(25);

  const scale = uiTextScale();
  const toast = scene.add.container(0, 0).setDepth(220).setScrollFactor(0);

  const panel = scene.add.image(W / 2, H + 90, 'ui_parchment_panel');
  panel.setDisplaySize(560, 160);
  toast.add(panel);

  const outline = scene.add.rectangle(W / 2, H + 90, 560, 160, 0x000000, 0);
  outline.setStrokeStyle(2, COLORS.gold, 0.85);
  toast.add(outline);

  const title = scene.add.text(W / 2, H + 40, 'SCRIPTURE UNLOCKED', {
    fontSize: `${Math.floor(16 * scale)}px`,
    fontFamily: 'Palatino Linotype, Book Antiqua, Palatino, serif',
    color: '#8b5a2b',
    fontStyle: 'bold',
  }).setOrigin(0.5);
  toast.add(title);

  const refText = scene.add.text(W / 2, H + 66, ref, {
    fontSize: `${Math.floor(14 * scale)}px`,
    fontFamily: 'Georgia, serif',
    color: '#1f1a12',
    fontStyle: 'bold',
  }).setOrigin(0.5);
  toast.add(refText);

  const verse = scene.add.text(W / 2, H + 106, text, {
    fontSize: `${Math.floor(12 * scale)}px`,
    fontFamily: 'Georgia, serif',
    color: '#2a241b',
    fontStyle: 'italic',
    wordWrap: { width: 520 },
    align: 'center',
    lineSpacing: 4,
  }).setOrigin(0.5);
  toast.add(verse);

  const quill = scene.add.text(W / 2 + 250, H + 40, '\u270d', { fontSize: `${Math.floor(18 * scale)}px`, color: '#8b5a2b' }).setOrigin(0.5);
  toast.add(quill);

  // Burst particles
  const { particles: burst, emitter: burstEmitter } = createEmitterCompat(scene, W / 2, H - 30, 'particle_spark', {
    speed: { min: 80, max: 220 },
    angle: { min: 200, max: 340 },
    lifespan: { min: 450, max: 900 },
    scale: { start: 0.5, end: 0 },
    alpha: { start: 1, end: 0 },
    quantity: 18,
    blendMode: 'ADD',
    tint: [0xffe066, 0xffd27a, 0xffffff],
  }, 221);
  if (burstEmitter && typeof burstEmitter.explode === 'function') burstEmitter.explode(22, W / 2, H - 40);

  AudioEngine.sfx.chime();

  scene.tweens.add({
    targets: [panel, outline, title, refText, verse, quill],
    y: '-=190',
    duration: 550,
    ease: 'Cubic.easeOut',
  });

  let dismissed = false;
  const dismiss = () => {
    if (dismissed) return;
    dismissed = true;
    toast.destroy(true);
    burst.destroy();
    if (onDone) onDone();
  };

  scene.time.delayedCall(4000, dismiss);
  scene.input.once('pointerdown', dismiss);
}

  const hud = { objective: null };
  const scale = uiTextScale();

  hud.root = root;

  const topBg = scene.add.rectangle(0, 0, W, 64, 0x000000, 0.08).setOrigin(0);
  topBg.setBlendMode(Phaser.BlendModes.MULTIPLY);
  root.add(topBg);

  const leftPanel = scene.add.image(12, 8, 'ui_parchment_panel').setOrigin(0);
  leftPanel.setDisplaySize(330, 56);
  leftPanel.setAlpha(0.95);
  root.add(leftPanel);

  // Main portrait (Nephi when present, otherwise player).
  const mainPortraitKey = scene.textures.exists('nephi') ? 'nephi' : 'player';
  const mainPortrait = makePortraitCircle(scene, mainPortraitKey, 46, 36, 44, 160);
  root.add(mainPortrait.frame);
  root.add(mainPortrait.img);

  // Companion portrait (if any).
  hud.compPortrait = null;

    comp.frame.setAlpha(0.7);
    comp.img.setAlpha(0.85);
    root.add(comp.frame);
    root.add(comp.img);
    hud.compPortrait = comp;
  }

  // HP (Faith-as-HP for now)
  const hpIcon = scene.add.image(132, 22, 'icon_heart').setScale(0.65).setAlpha(0.9);
  root.add(hpIcon);
  const hpLabel = scene.add.text(152, 14, 'HP', {
    fontSize: `${Math.floor(11 * scale)}px`,
    fontFamily: 'monospace',
    color: '#8b5a2b',
  });
  root.add(hpLabel);
  const hpBg = scene.add.rectangle(152, 30, 160, 10, 0x000000, 0.12).setOrigin(0, 0.5);
  const hpFill = scene.add.rectangle(152, 30, 160, 10, 0xffcc66, 0.85).setOrigin(0, 0.5);
  root.add(hpBg);
  root.add(hpFill);
  const hpNum = scene.add.text(318, 24, '', { fontSize: `${Math.floor(10 * scale)}px`, fontFamily: 'monospace', color: '#2a241b' }).setOrigin(1, 0);
  root.add(hpNum);

  // Faith Points to next level (gold cascade on gain handled by scripture unlock + FX).
  const fpIcon = scene.add.image(132, 48, 'icon_flame').setScale(0.58).setAlpha(0.9);
  root.add(fpIcon);
  const fpLabel = scene.add.text(152, 40, 'FAITH', {
    fontSize: `${Math.floor(11 * scale)}px`,
    fontFamily: 'monospace',
    color: '#8b5a2b',
  });
  root.add(fpLabel);
  const fpBg = scene.add.rectangle(152, 56, 160, 8, 0x000000, 0.12).setOrigin(0, 0.5);
  const fpFill = scene.add.rectangle(152, 56, 160, 8, COLORS.gold, 0.65).setOrigin(0, 0.5);
  root.add(fpBg);
  root.add(fpFill);
  const lvText = scene.add.text(318, 44, '', { fontSize: `${Math.floor(10 * scale)}px`, fontFamily: 'monospace', color: '#2a241b' }).setOrigin(1, 0);
  root.add(lvText);

  // Right cluster: compass + chapter + day/night
  const rightPanel = scene.add.image(W - 12, 8, 'ui_parchment_panel').setOrigin(1, 0);
  rightPanel.setDisplaySize(300, 56);
  rightPanel.setAlpha(0.95);
  root.add(rightPanel);

  const compass = scene.add.image(W - 270, 36, 'icon_compass').setScale(0.7);
  root.add(compass);
  const needle = scene.add.triangle(W - 270, 36, 0, -12, 4, 10, -4, 10, COLORS.gold, 0.9);
  needle.setStrokeStyle(1, darken(COLORS.gold, 60), 0.7);
  root.add(needle);
  hud.compass = { compass, needle, spin: 0 };

  const chapter = scene.add.text(W - 232, 16, GameState.chapter.label, {
    fontSize: `${Math.floor(12 * scale)}px`,
    fontFamily: 'Palatino Linotype, Book Antiqua, Palatino, serif',
    color: '#8b5a2b',
    fontStyle: 'bold',
  });
  root.add(chapter);
  hud.chapterText = chapter;

  const dayNightIcon = scene.add.image(W - 36, 20, 'light_gold_256').setScale(0.12).setAlpha(0.85);
  dayNightIcon.setBlendMode(Phaser.BlendModes.SCREEN);
  root.add(dayNightIcon);
  hud.dayNightIcon = dayNightIcon;

  // Small scripture counter
  const scr = scene.add.text(W - 232, 38, '', { fontSize: `${Math.floor(11 * scale)}px`, fontFamily: 'monospace', color: '#2a241b' });
  root.add(scr);
  hud.scriptureText = scr;

  hud.setObjective = (x, y) => { hud.objective = { x, y }; };

  hud.update = (player, surfaceHint = 'sand') => {
    const hpRatio = clamp01(GameState.faith / Math.max(1, GameState.maxFaith));
    hpFill.displayWidth = 160 * hpRatio;
    hpNum.setText(`${GameState.faith}/${GameState.maxFaith}`);

    const fpRatio = clamp01(GameState.faithPoints / Math.max(1, GameState.fpToNext));
    fpFill.displayWidth = 160 * fpRatio;
    lvText.setText(`Lv.${GameState.level}`);
    hud.scriptureText.setText(`\uD83D\uDCDC ${GameState.scriptures.length}`);

    // Liahona behavior: low faith spins, high faith points true (if objective known).
    const low = hpRatio < 0.35;
    if (low) {
      hud.compass.spin += 0.03;
      needle.rotation = hud.compass.spin;
      needle.fillColor = 0xd0b070;
    } else if (hud.objective && player) {
      const dx = hud.objective.x - player.x;
      const dy = hud.objective.y - player.y;
      const ang = Math.atan2(dy, dx) + Math.PI / 2;
      needle.rotation = ang;
      needle.fillColor = hpRatio > 0.75 ? COLORS.gold : 0xd0b070;
    } else {
      needle.rotation *= 0.92;
    }

    const isNight = (GameState.time.t < 0.25 || GameState.time.t > 0.75);
    hud.dayNightIcon.setTexture(isNight ? 'light_cool_256' : 'light_gold_256');
    hud.dayNightIcon.setAlpha(isNight ? 0.7 : 0.85);
  };

  return hud;
}

function attachPauseMenu(scene) {
  const scale = uiTextScale();
  const menu = { open: false };

  const root = scene.add.container(0, 0).setDepth(300).setScrollFactor(0);
  root.setVisible(false);

  const dim = scene.add.rectangle(0, 0, W, H, 0x000000, 0.55).setOrigin(0);
  dim.setBlendMode(Phaser.BlendModes.MULTIPLY);
  root.add(dim);

  const panel = scene.add.image(W + 260, H / 2, 'ui_parchment_tall');
  panel.setDisplaySize(520, 420);
  root.add(panel);

  const border = scene.add.rectangle(W + 260, H / 2, 520, 420, 0x000000, 0);
  border.setStrokeStyle(2, COLORS.gold, 0.85);
  root.add(border);

  // Tiny animated lantern (stylized).
  const lantern = scene.add.image(W + 470, H / 2 - 180, 'light_warm_256').setScale(0.12).setAlpha(0.65);
  lantern.setBlendMode(Phaser.BlendModes.SCREEN);
  root.add(lantern);
  scene.tweens.add({ targets: lantern, alpha: 0.35, duration: 900, yoyo: true, repeat: -1 });

  const title = scene.add.text(W + 40, H / 2 - 195, 'PAUSED', {
    fontSize: `${Math.floor(22 * scale)}px`,
    fontFamily: 'Palatino Linotype, Book Antiqua, Palatino, serif',
    color: '#8b5a2b',
    fontStyle: 'bold',
  });
  root.add(title);

  const tabs = ['Journey', 'Scriptures', 'Companions', 'Wardrobe', 'Inventory', 'Settings'];
  let activeTab = 'Journey';
  const tabTexts = [];
  const content = scene.add.text(W + 40, H / 2 - 110, '', {
    fontSize: `${Math.floor(13 * scale)}px`,
    fontFamily: 'Georgia, serif',
    color: '#1f1a12',
    wordWrap: { width: 440 },
    lineSpacing: 6,
  });
  root.add(content);

  const updateContent = () => {
    if (activeTab === 'Journey') {
      content.setText(`Current: ${GameState.chapter.label}\n\nLast journal:\n${GameState.journal[GameState.journal.length - 1]?.entry || '...'}\n\nAlignment:\nFaith vs Doubt: ${GameState.alignment.faithVsDoubt}\nCompassion vs Harshness: ${GameState.alignment.compassionVsHarshness}`);
      return;
    }
    if (activeTab === 'Scriptures') {
      const list = GameState.scriptures.slice(-6).map(s => `- ${s.ref}`).join('\n') || '- None yet';
      content.setText(`Collected scriptures (${GameState.scriptures.length}):\n${list}\n\n(Full journal formatting is next.)`);
      return;
    }
    if (activeTab === 'Companions') {
      content.setText(GameState.companion ? `Companion:\n${GameState.companion.name}\n${GameState.companion.title}` : 'No companion currently.');
      return;
    }
    if (activeTab === 'Wardrobe') {
      content.setText('Wardrobe is stubbed for now.\nNext: apply palette swaps to Nephi + player sprites from a settings panel.');
      return;
    }
    if (activeTab === 'Inventory') {
      const inv = GameState.inventory.length ? GameState.inventory.map(i => `- ${i}`).join('\n') : '- Empty';
      content.setText(`Inventory:\n${inv}`);
      return;
    }
    // Settings
    content.setText(
      `Difficulty: ${GameState.settings.difficulty}\nText size: ${GameState.settings.textSize}\nColorblind mode: ${GameState.settings.colorblind ? 'On' : 'Off'}\n\nMusic: ${Math.round((GameState.settings.music ?? 0.65) * 100)}%\nSFX: ${Math.round((GameState.settings.sfx ?? 0.8) * 100)}%\nType speed: ${GameState.settings.textSpeedMs}ms\nAuto-advance: ${GameState.settings.autoAdvance ? 'On' : 'Off'}\n\nClick buttons below to adjust.`
    );
  };

  tabs.forEach((t, i) => {
    const tt = scene.add.text(W + 40 + i * 78, H / 2 - 150, t, {
      fontSize: `${Math.floor(11 * scale)}px`,
      fontFamily: 'monospace',
      color: t === activeTab ? '#8b5a2b' : '#3b3428',
      fontStyle: 'bold',
    }).setInteractive({ useHandCursor: true });
    tt.on('pointerdown', () => {
      AudioEngine.sfx.click();
      activeTab = t;
      tabTexts.forEach(o => o.setColor(o.text === activeTab ? '#8b5a2b' : '#3b3428'));
      updateContent();
    });
    tabTexts.push(tt);
    root.add(tt);
  });

  // Settings quick buttons (only visible on Settings tab, but low cost to always show).
  const btns = [];
  const addBtn = (x, y, label, onClick) => {
    const r = scene.add.rectangle(x, y, 210, 34, 0x16213e, 0.65).setStrokeStyle(1, COLORS.gold, 0.45)
      .setInteractive({ useHandCursor: true });
    const tx = scene.add.text(x, y, label, { fontSize: `${Math.floor(12 * scale)}px`, fontFamily: 'monospace', color: '#ffffff' }).setOrigin(0.5);
    r.on('pointerover', () => r.setFillStyle(0x223055, 0.8));
    r.on('pointerout', () => r.setFillStyle(0x16213e, 0.65));
    r.on('pointerdown', () => { AudioEngine.sfx.click(); onClick(); updateContent(); saveGame({ paused: true }); });
    btns.push(r, tx);
    root.add(r); root.add(tx);
  };

  const baseX = W + 160;
  const baseY = H / 2 + 130;
  addBtn(baseX - 120, baseY, 'Difficulty', () => {
    const d = GameState.settings.difficulty;
    GameState.settings.difficulty = d === 'explorer' ? 'disciple' : d === 'disciple' ? 'warrior' : 'explorer';
  });
  addBtn(baseX + 120, baseY, 'Text Size', () => {
    const t = GameState.settings.textSize;
    GameState.settings.textSize = t === 'small' ? 'medium' : t === 'medium' ? 'large' : 'small';
  });
  addBtn(baseX - 120, baseY + 44, 'Music +/-', () => {
    GameState.settings.music = clamp01((GameState.settings.music ?? 0.65) + 0.1);
    if (GameState.settings.music > 0.95) GameState.settings.music = 0.25;
    AudioEngine.setVolumes();
  });
  addBtn(baseX + 120, baseY + 44, 'SFX +/-', () => {
    GameState.settings.sfx = clamp01((GameState.settings.sfx ?? 0.8) + 0.1);
    if (GameState.settings.sfx > 0.95) GameState.settings.sfx = 0.25;
    AudioEngine.setVolumes();
  });
  addBtn(baseX - 120, baseY + 88, 'Type Speed', () => {
    const v = GameState.settings.textSpeedMs ?? 22;
    GameState.settings.textSpeedMs = v === 32 ? 22 : v === 22 ? 14 : 32;
  });
  addBtn(baseX + 120, baseY + 88, 'Auto-Advance', () => {
    GameState.settings.autoAdvance = !GameState.settings.autoAdvance;
  });

  const closeHint = scene.add.text(W + 40, H / 2 + 190, 'Esc: close', {
    fontSize: `${Math.floor(11 * scale)}px`,
    fontFamily: 'monospace',
    color: '#3b3428',
    alpha: 0.8,
  });
  root.add(closeHint);

  const openMenu = () => {
    if (menu.open) return;
    menu.open = true;
    root.setVisible(true);
    updateContent();
    scene._pauseOpen = true;
    scene.tweens.add({ targets: [panel, border, lantern, title, content, closeHint, ...tabTexts, ...btns], x: '-=560', duration: 350, ease: 'Cubic.easeOut' });
  };

  const closeMenu = () => {
    if (!menu.open) return;
    menu.open = false;
    scene._pauseOpen = false;
    scene.tweens.add({
      targets: [panel, border, lantern, title, content, closeHint, ...tabTexts, ...btns],
      x: '+=560',
      duration: 260,
      ease: 'Cubic.easeIn',
      onComplete: () => root.setVisible(false),
    });
  };

  const esc = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
  esc.on('down', () => {
    AudioEngine.unlock();
    if (menu.open) closeMenu();
    else openMenu();
  });

  dim.setInteractive();
  dim.on('pointerdown', () => { if (menu.open) closeMenu(); });

  menu.openMenu = openMenu;
  menu.closeMenu = closeMenu;
  return menu;
}

// ============================================================
// SCENE: CINEMATIC INTRO
// ============================================================
class CinematicIntro extends Phaser.Scene {
  constructor() { super('CinematicIntro'); }

  create() {
    this.phase = 0;
    this.items = []; // track objects per panel for cleanup
    AudioEngine.setTheme('spiritual');
    this.runPanel(0);

    // SKIP button (updated per panel)
    this.skipText = this.add.text(W - 20, H - 20, 'SKIP >', {
      fontSize: '12px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(1, 1).setDepth(1000).setInteractive();
    this.skipText.on('pointerdown', () => this.scene.start('Title'));
    this.skipText.on('pointerover', () => this.skipText.setColor('#ffffff'));
    this.skipText.on('pointerout', () => this.skipText.setColor('#aaaaaa'));
  }

  clearPanel() {
    this.items.forEach(o => { if (o && o.destroy) o.destroy(); });
    this.items = [];
  }

  add2(obj) { this.items.push(obj); return obj; }

  runPanel(n) {
    this.phase = n;
    this.clearPanel();
    if (n < 4 && this.skipText) this.skipText.setVisible(true);
    else if (this.skipText) this.skipText.setVisible(false);
    const panels = [this.panel1, this.panel2, this.panel3, this.panel4, this.panel5];
    if (panels[n]) panels[n].call(this);
  }

  advance(delay) {
    this.autoTimer = this.time.delayedCall(delay, () => this.runPanel(this.phase + 1));
    this.items.push({ destroy: () => { if (this.autoTimer) this.autoTimer.remove(); } });
  }

  // Panel 1: Green Hills (8s)
  panel1() {
    const bg = this.add2(this.add.graphics());
    bg.fillStyle(0x87ceeb); bg.fillRect(0, 0, W, H);
    bg.fillStyle(0xd4eaf8); bg.fillRect(0, H * 0.6, W, H * 0.4);

    const layers = [
      { y: H * 0.55, h: 120, color: 0x8ba8c4, speed: 0.3 },
      { y: H * 0.6, h: 140, color: 0x2d6b2e, speed: 0.6 },
      { y: H * 0.7, h: 160, color: 0x3da33e, speed: 1.0 },
    ];
    layers.forEach(l => {
      const g = this.add2(this.add.graphics());
      g.fillStyle(l.color);
      g.beginPath(); g.moveTo(-100, H);
      for (let x = -100; x <= W + 200; x += 60) {
        g.lineTo(x, l.y + Math.sin(x * 0.008) * 40 - 20);
      }
      g.lineTo(W + 200, H); g.closePath(); g.fillPath();
      this.tweens.add({ targets: g, x: -50 * l.speed, duration: 8000, ease: 'Sine.easeInOut' });
    });

    // Mist particles
    const pe = createEmitterCompat(this, W / 2, H * 0.75, 'particle_smoke', {
      speed: { min: 5, max: 15 }, alpha: { start: 0.15, end: 0 }, scale: { start: 1.5, end: 3 },
      lifespan: 4000, quantity: 1, frequency: 500, blendMode: 'ADD',
      emitZone: { type: 'random', source: new Phaser.Geom.Rectangle(-W/2, -20, W, 40) }
    });
    this.items.push(pe.emitter);

    // Sun rising
    const sun = this.add2(this.add.circle(W - 100, H * 0.5, 40, 0xffe066, 0.9));
    const glow = this.add2(this.add.circle(W - 100, H * 0.5, 80, 0xffe066, 0.15));
    this.tweens.add({ targets: [sun, glow], y: H * 0.3, duration: 8000, ease: 'Sine.easeOut' });

    this.advance(8000);
  }

  // Panel 2: Ancient City (6s)
  panel2() {
    AudioEngine.setTheme('jerusalem');
    const bg = this.add2(this.add.graphics());
    bg.fillStyle(0xe8c97a); bg.fillRect(0, 0, W, H);
    bg.fillStyle(0xc4a35a); bg.fillRect(0, H * 0.65, W, H * 0.35);

    const city = this.add2(this.add.container(W / 2, H * 0.45));
    const cg = this.make.graphics();
    // Buildings
    const bColor = 0xd4a853;
    [[-120,-60,50,80],[-60,-80,55,100],[10,-50,45,70],[70,-70,50,90],[130,-40,40,60],
     [-150,-30,35,50],[160,-55,45,75]].forEach(([x,y,w,h]) => {
      cg.fillStyle(bColor); cg.fillRect(x, y, w, h);
      cg.fillStyle(0xb8903e); cg.fillRect(x + w*0.3, y + h - 15, 10, 15); // door
    });
    // Palm trees
    [-170, 180].forEach(tx => {
      cg.fillStyle(0x6b4226); cg.fillRect(tx, -50, 6, 60);
      cg.fillStyle(0x228b22);
      for (let a = 0; a < 5; a++) cg.fillEllipse(tx + 3 + Math.cos(a*1.3)*18, -55 - Math.sin(a*1.3)*8, 20, 6);
    });
    cg.generateTexture('_city', 400, 200);
    const cityImg = this.add.image(0, 0, '_city');
    city.add(cityImg);
    city.setScale(0.8);
    this.tweens.add({ targets: city, scaleX: 1.2, scaleY: 1.2, duration: 6000, ease: 'Sine.easeInOut' });
    this.items.push(city);

    // NPC silhouettes
    for (let i = 0; i < 4; i++) {
      const npc = this.add2(this.add.rectangle(200 + i * 120, H * 0.65, 8, 16, 0x3a2510));
      this.tweens.add({ targets: npc, x: npc.x + (i % 2 ? 40 : -40), duration: 3000, yoyo: true, repeat: -1 });
    }

    const txt = this.add2(this.add.text(W / 2, H * 0.88, '600 BC. The ancient world.', {
      fontSize: '18px', fontFamily: 'Georgia, serif', color: '#4a3520'
    }).setOrigin(0.5).setAlpha(0));
    this.tweens.add({ targets: txt, alpha: 1, duration: 2000, delay: 1500 });

    this.advance(6000);
  }

  // Panel 3: Gold Plates Rising (10s)
  panel3() {
    AudioEngine.setTheme('spiritual');
    const bg = this.add2(this.add.graphics());
    bg.fillStyle(0x1a1a1a); bg.fillRect(0, 0, W, H);
    bg.fillStyle(0x3a2a1a); bg.fillRect(0, H * 0.8, W, H * 0.2);

    // Gold plates
    const plate = this.add2(this.add.container(W / 2, H + 60));
    const pg = this.make.graphics();
    pg.fillStyle(0xd4a017); pg.fillRect(-40, -55, 80, 110);
    pg.lineStyle(2, 0xb8860b); pg.strokeRect(-40, -55, 80, 110);
    // Symbols
    for (let row = 0; row < 6; row++) for (let col = 0; col < 4; col++) {
      pg.fillStyle(0xb8860b); pg.fillRect(-30 + col * 18, -45 + row * 16, 12, 4);
    }
    pg.generateTexture('_plates', 100, 130);
    plate.add(this.make.image({ x: 0, y: 0, key: '_plates', add: false }));
    plate.setDepth(5);
    this.tweens.add({ targets: plate, y: H * 0.4, duration: 4000, ease: 'Back.easeOut' });

    // Glow
    if (this.textures.exists('light_gold_256')) {
      const glow = this.add2(this.add.image(W/2, H*0.4, 'light_gold_256').setScale(2.5).setAlpha(0).setBlendMode('ADD').setDepth(4));
      this.tweens.add({ targets: glow, alpha: 0.4, duration: 3000, delay: 2000 });
    }

    // Rising particles
    const pe = createEmitterCompat(this, W/2, H*0.5, 'particle_spark', {
      speed: { min: 10, max: 40 }, angle: { min: 250, max: 290 }, alpha: { start: 0.8, end: 0 },
      scale: { start: 0.4, end: 0 }, lifespan: 2500, quantity: 1, frequency: 200, blendMode: 'ADD',
      emitZone: { type: 'random', source: new Phaser.Geom.Rectangle(-50, -20, 100, 40) }
    }, 6);
    this.items.push(pe.emitter);

    // Text word by word
    const words = ['These...', 'are...', 'their...', 'stories.'];
    words.forEach((w, i) => {
      const t = this.add2(this.add.text(W/2, H*0.68, w, {
        fontSize: '22px', fontFamily: 'Georgia, serif', color: '#d4a017'
      }).setOrigin(0.5).setAlpha(0).setDepth(10));
      this.tweens.add({ targets: t, alpha: 1, duration: 600, delay: 5000 + i * 1200 });
      this.tweens.add({ targets: t, alpha: 0, duration: 400, delay: 5000 + i * 1200 + 900 });
    });

    // Plates open
    this.time.delayedCall(9200, () => {
      if (this.phase !== 2) return;
      const l = this.add2(this.add.rectangle(W/2-20, H*0.4, 40, 110, 0xd4a017).setDepth(6));
      const r = this.add2(this.add.rectangle(W/2+20, H*0.4, 40, 110, 0xd4a017).setDepth(6));
      plate.setVisible(false);
      this.tweens.add({ targets: l, x: W/2 - 70, duration: 600 });
      this.tweens.add({ targets: r, x: W/2 + 70, duration: 600 });
    });

    this.advance(10000);
  }

  // Panel 4: Nephi Introduction (8s)
  panel4() {
    const bg = this.add2(this.add.graphics());
    bg.fillStyle(0x1a1510); bg.fillRect(0, 0, W, H);
    // Gold border frame
    const frame = this.add2(this.add.graphics());
    frame.lineStyle(3, 0xd4a017); frame.strokeRect(60, 40, W-120, H-80);
    frame.lineStyle(1, 0xb8860b); frame.strokeRect(65, 45, W-130, H-90);

    // Letter-by-letter text
    const quote = 'I, Nephi, having been born of\ngoodly parents, therefore I was\ntaught somewhat in all the\nlearning of my father...';
    const txt = this.add2(this.add.text(W/2, H*0.35, '', {
      fontSize: '16px', fontFamily: 'Georgia, serif', color: '#d4a017', align: 'center', lineSpacing: 6
    }).setOrigin(0.5));
    let ci = 0;
    const typeTimer = this.time.addEvent({
      delay: 45, repeat: quote.length - 1,
      callback: () => { ci++; txt.setText(quote.substring(0, ci)); }
    });
    this.items.push({ destroy: () => typeTimer.remove() });

    // Nephi sprite appears after text
    this.time.delayedCall(5000, () => {
      if (this.phase !== 3) return;
      const nephi = this.add2(this.add.sprite(W/2, H*0.65, 'nephi').setScale(0).setDepth(5));
      this.tweens.add({ targets: nephi, scaleX: 3, scaleY: 3, duration: 1500, ease: 'Back.easeOut' });
      const sub = this.add2(this.add.text(W/2, H*0.85, 'That young man is you.', {
        fontSize: '14px', fontFamily: 'Georgia, serif', color: '#c0a040'
      }).setOrigin(0.5).setAlpha(0));
      this.tweens.add({ targets: sub, alpha: 1, duration: 1000, delay: 800 });
    });

    this.advance(8000);
  }

  // Panel 5: Title Card (wait for input)
  panel5() {
    const bg = this.add2(this.add.graphics());
    bg.fillStyle(0x0a0a18); bg.fillRect(0, 0, W, H);

    // Stars
    for (let i = 0; i < 60; i++) {
      const s = this.add2(this.add.circle(
        Phaser.Math.Between(0, W), Phaser.Math.Between(0, H * 0.7),
        Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.3, 0.8)
      ));
      this.tweens.add({ targets: s, alpha: 0.1, duration: Phaser.Math.Between(1000, 3000), yoyo: true, repeat: -1 });
    }

    // Title
    const title = this.add2(this.add.text(W/2, H*0.35, 'NEPHI: A RECORD\nOF MY PEOPLE', {
      fontSize: '28px', fontFamily: 'Georgia, serif', color: '#d4a017', align: 'center',
      stroke: '#8b6914', strokeThickness: 2
    }).setOrigin(0.5));

    // Glow behind title
    if (this.textures.exists('light_gold_256')) {
      this.add2(this.add.image(W/2, H*0.35, 'light_gold_256').setScale(3).setAlpha(0.15).setBlendMode('ADD').setDepth(-1));
    }

    const sub = this.add2(this.add.text(W/2, H*0.52, 'The Book of Mormon RPG', {
      fontSize: '14px', fontFamily: 'Georgia, serif', color: '#a08030'
    }).setOrigin(0.5));

    // Ember particles
    const pe = createEmitterCompat(this, W/2, H, 'particle_spark', {
      speed: { min: 15, max: 40 }, angle: { min: 250, max: 290 }, alpha: { start: 0.6, end: 0 },
      scale: { start: 0.3, end: 0 }, lifespan: 3000, quantity: 1, frequency: 300, blendMode: 'ADD',
      emitZone: { type: 'random', source: new Phaser.Geom.Rectangle(-W/2, 0, W, 10) }
    });
    this.items.push(pe.emitter);

    // Press any key
    const prompt = this.add2(this.add.text(W/2, H*0.78, 'Press Any Key to Begin', {
      fontSize: '14px', fontFamily: 'monospace', color: '#d4a017'
    }).setOrigin(0.5));
    this.tweens.add({ targets: prompt, alpha: 0.3, duration: 1000, yoyo: true, repeat: -1 });

    this.input.once('pointerdown', () => this.scene.start('Title'));
    this.input.keyboard.once('keydown', () => this.scene.start('Title'));
  }
}

      AudioEngine.sfx.click();
      resetGameState();
      this.cameras.main.fadeOut(500, 0, 0, 0);
      this.time.delayedCall(500, () => this.scene.start('CharacterCreate'));
    };

    if (continueBtn) continueBtn.btn.on('pointerdown', () => beginContinue());
    newBtn.btn.on('pointerdown', () => beginNew());

    this.input.keyboard.on('keydown-ENTER', () => hasSave ? beginContinue() : beginNew());
    this.input.keyboard.on('keydown-SPACE', () => hasSave ? beginContinue() : beginNew());

    this.add.text(W/2, H - 50, 'A faithful retelling of the sacred record', {
      fontSize: '10px', fontFamily: 'monospace', color: '#3a5a2a',
      stroke: '#ffffff', strokeThickness: 1
    }).setOrigin(0.5);
    this.add.text(W/2, H - 30, 'Arrow Keys: move  \u2022  Space/Click: interact  \u2022  Esc: pause', {
      fontSize: '10px', fontFamily: 'monospace', color: '#4a6a3a',
      stroke: '#ffffff', strokeThickness: 1
    }).setOrigin(0.5);
  }
}


// ============================================================
// SCENE: CHARACTER CREATE
// ============================================================
class CharacterCreateScene extends Phaser.Scene {
  constructor() { super('CharacterCreate'); }

  create() {
    this.cameras.main.fadeIn(500, 0, 0, 0);
    this.add.rectangle(W/2, H/2, W, H, 0xf5f0e1);

    const options = {
      skinTone:  { values: [0xfce4c7, 0xe8c8a0, 0xd4a574, 0xc49a6c, 0x8d5524, 0x5c3a1a], idx: 2, type: 'color' },
      hairColor: { values: [0x1a1208, 0x3d2b1f, 0x8b4513, 0xdaa520, 0xaaaaaa, 0xffffff], idx: 1, type: 'color' },
      hairStyle: { values: ['short', 'long', 'bald'], idx: 0, type: 'text' },
      beardStyle:{ values: ['none', 'short', 'long', 'prophet'], idx: 0, type: 'text' },
      robeColor: { values: [0x5b8c5a, 0x2c6fbb, 0x8b2500, 0x6b4e8a, 0x8b7355, 0xb87333, 0xd4a574], idx: 0, type: 'color' },
      headwear:  { values: ['none', 'headband', 'turban', 'hood'], idx: 1, type: 'text' },
    };

    const labels = { skinTone: 'Skin Tone', hairColor: 'Hair Color', hairStyle: 'Hair Style', beardStyle: 'Beard', robeColor: 'Robe Color', headwear: 'Headwear' };
    const keys = Object.keys(options);
    const rowH = 52;
    const startY = 80;

    this.add.text(W/2, 30, 'CREATE YOUR TRAVELER', {
      fontSize: '24px', fontFamily: 'monospace', color: '#5a3a1a', fontStyle: 'bold'
    }).setOrigin(0.5);

    const displayElements = {};

    const updatePreview = () => {
      const app = {
        skinTone: options.skinTone.values[options.skinTone.idx],
        hairColor: options.hairColor.values[options.hairColor.idx],
        hairStyle: options.hairStyle.values[options.hairStyle.idx],
        beardStyle: options.beardStyle.values[options.beardStyle.idx],
        robeColor: options.robeColor.values[options.robeColor.idx],
        robeAccent: darken(options.robeColor.values[options.robeColor.idx], 30),
        headwear: options.headwear.values[options.headwear.idx],
        headwearColor: 0x8B7355,
        expression: 'brave',
      };
      if (this.textures.exists('player_preview')) this.textures.remove('player_preview');
      generateCharacterTexture(this, 'player_preview', app);
      if (this.previewSprite) this.previewSprite.destroy();
      this.previewSprite = this.add.image(W - 140, 250, 'player_preview').setScale(6);

      // Update display elements
      keys.forEach(k => {
        const opt = options[k];
        const el = displayElements[k];
        if (!el) return;
        if (opt.type === 'color') {
          el.swatch.setFillStyle(opt.values[opt.idx]);
        } else {
          el.label.setText(opt.values[opt.idx].toUpperCase());
        }
      });
    };

    keys.forEach((k, i) => {
      const y = startY + i * rowH;
      const opt = options[k];

      this.add.text(60, y, labels[k], {
        fontSize: '14px', fontFamily: 'monospace', color: '#5a3a1a', fontStyle: 'bold'
      }).setOrigin(0, 0.5);

      // Left arrow
      const leftBtn = this.add.text(220, y, '\u25C0', {
        fontSize: '20px', fontFamily: 'monospace', color: '#5a3a1a'
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      leftBtn.on('pointerdown', () => {
        opt.idx = (opt.idx - 1 + opt.values.length) % opt.values.length;
        updatePreview();
      });

      // Right arrow
      const rightBtn = this.add.text(380, y, '\u25B6', {
        fontSize: '20px', fontFamily: 'monospace', color: '#5a3a1a'
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      rightBtn.on('pointerdown', () => {
        opt.idx = (opt.idx + 1) % opt.values.length;
        updatePreview();
      });

      // Display: swatch or text
      if (opt.type === 'color') {
        const swatch = this.add.rectangle(300, y, 40, 24, opt.values[opt.idx])
          .setStrokeStyle(1, 0x5a3a1a);
        displayElements[k] = { swatch };
      } else {
        const lbl = this.add.text(300, y, opt.values[opt.idx].toUpperCase(), {
          fontSize: '13px', fontFamily: 'monospace', color: '#3a2a1a'
        }).setOrigin(0.5);
        displayElements[k] = { label: lbl };
      }
    });

    // Preview label
    this.add.text(W - 140, 140, 'PREVIEW', {
      fontSize: '12px', fontFamily: 'monospace', color: '#8a7a5a'
    }).setOrigin(0.5);

    updatePreview();

    // BEGIN JOURNEY button
    const btnY = H - 60;
    const beginBtn = this.add.rectangle(W/2, btnY, 360, 50, 0x2d7a1e, 0.9)
      .setStrokeStyle(2, 0x1a5c10).setInteractive({ useHandCursor: true });
    this.add.text(W/2, btnY, 'BEGIN JOURNEY', {
      fontSize: '22px', fontFamily: 'monospace', color: '#ffffff', fontStyle: 'bold',
      stroke: '#1a4a0e', strokeThickness: 2
    }).setOrigin(0.5);
    beginBtn.on('pointerover', () => beginBtn.setFillStyle(0x3a9e2b, 0.95));
    beginBtn.on('pointerout', () => beginBtn.setFillStyle(0x2d7a1e, 0.9));

    beginBtn.on('pointerdown', () => {
      // Save appearance to GameState
      GameState.playerAppearance = {
        skinTone: options.skinTone.values[options.skinTone.idx],
        hairColor: options.hairColor.values[options.hairColor.idx],
        hairStyle: options.hairStyle.values[options.hairStyle.idx],
        beardStyle: options.beardStyle.values[options.beardStyle.idx],
        robeColor: options.robeColor.values[options.robeColor.idx],
        robeAccent: darken(options.robeColor.values[options.robeColor.idx], 30),
        headwear: options.headwear.values[options.headwear.idx],
        headwearColor: 0x8B7355,
        expression: 'brave',
      };

      // Regenerate player textures with chosen appearance
      if (this.textures.exists('player')) this.textures.remove('player');
      if (this.textures.exists('player_battle')) this.textures.remove('player_battle');
      generateCharacterTexture(this, 'player', GameState.playerAppearance);
      generateCharacterTexture(this, 'player_battle', GameState.playerAppearance);

      saveGame({ scene: 'WorldMap' });
      AudioEngine.sfx.click();
      this.cameras.main.fadeOut(500, 0, 0, 0);
      this.time.delayedCall(500, () => this.scene.start('WorldMap'));
    });
  }
}


// ============================================================
// SCENE: WORLD MAP
// ============================================================
class WorldMapScene extends Phaser.Scene {
  constructor() { super('WorldMap'); }

  create() {
    AudioEngine.setTheme('jerusalem');
    this.cameras.main.fadeIn(500);
    this.add.rectangle(W/2, H/2, W, H, COLORS.deepBlue);
    this.add.rectangle(W/2, H/2, W - 60, H - 60, COLORS.sand, 0.2)
      .setStrokeStyle(2, COLORS.gold);

    this._lighting = FX.createLightingRig(this, { mode: 'day' });
    // Soft god rays drifting over the parchment map frame.
    const rays = this.add.image(W/2, H/2 - 40, 'light_white_256').setScale(3.4).setAlpha(0.08);
    rays.setBlendMode(Phaser.BlendModes.SCREEN);
    this.tweens.add({ targets: rays, x: W/2 + 40, alpha: 0.12, duration: 5000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    this._pause = attachPauseMenu(this);

    this.add.text(W/2, 40, 'BOOK OF MORMON LANDS', {
      fontSize: '20px', fontFamily: 'monospace', color: '#ffd700', fontStyle: 'bold'
    }).setOrigin(0.5);

    // Determine which scenes are accessible based on progress
    const hasPlatesAndRod = GameState.brassPlatesObtained && GameState.ironRodComplete;
    const hasLiahona = GameState.liahonaActive;
    const hasShip = GameState.questFlags.shipDone;
    const reachedPromised = GameState.completedScenes?.includes('1Nephi') || GameState.questFlags.reachedPromised;

    const worlds = [
      { x: 600, y: 120, name: 'Jerusalem', sub: 'Obtain the Brass Plates', active: true, scene: 'Jerusalem', done: hasPlatesAndRod },
      { x: 350, y: 200, name: 'Wilderness', sub: 'The Valley of Lemuel', active: hasPlatesAndRod, scene: 'WildernessCamp', done: hasLiahona },
      { x: 150, y: 320, name: 'Bountiful', sub: 'Build the Ship', active: hasLiahona, scene: 'BountifulScene', done: hasShip },
      { x: 300, y: 450, name: 'Great Deep', sub: 'Cross the Ocean', active: hasShip, scene: 'OceanStorm', done: reachedPromised },
      { x: 550, y: 480, name: 'Promised Land', sub: 'A Land of Promise', active: reachedPromised, scene: 'PromisedLand', done: false },
    ];

    const paths = this.add.graphics();
    paths.lineStyle(2, COLORS.gold, 0.3);
    paths.beginPath();
    paths.moveTo(600, 120); paths.lineTo(350, 200); paths.lineTo(150, 320);
    paths.strokePath();

    // Sea path (dotted)
    paths.lineStyle(1, COLORS.skyBlue, 0.3);
    for (let i = 0; i < 25; i++) {
      const t = i / 25;
      const cx = 150 + (300 - 150) * t + Math.sin(t * Math.PI * 3) * 30;
      const cy = 320 + (450 - 320) * t + Math.cos(t * Math.PI * 2) * 20 + 30;
      paths.fillStyle(COLORS.skyBlue, 0.3);
      paths.fillCircle(cx, cy, 2);
    }
    // Path from ocean to promised land
    paths.lineStyle(2, COLORS.gold, 0.2);
    paths.beginPath();
    paths.moveTo(300, 450); paths.lineTo(550, 480);
    paths.strokePath();

    // Find the furthest active (non-done) world for player position
    let playerWorld = worlds[0];
    worlds.forEach(w => { if (w.active && !w.done) playerWorld = w; });

    worlds.forEach(w => {
      const isDone = w.done;
      const isActive = w.active;
      const color = isDone ? COLORS.green : isActive ? COLORS.gold : COLORS.gray;
      const node = this.add.circle(w.x, w.y, isActive ? 14 : 10, color, isActive ? 0.9 : 0.3)
        .setStrokeStyle(2, isActive ? (isDone ? COLORS.green : COLORS.gold) : COLORS.darkGray);

      if (isDone) {
        this.add.text(w.x, w.y - 2, '✓', {
          fontSize: '14px', fontFamily: 'monospace', color: '#ffffff', fontStyle: 'bold'
        }).setOrigin(0.5);
      }

      if (isActive) {
        if (!isDone) this.tweens.add({ targets: node, scale: 1.2, duration: 800, yoyo: true, repeat: -1 });
        node.setInteractive({ useHandCursor: true });
        node.on('pointerdown', () => {
          AudioEngine.unlock();
          AudioEngine.sfx.click();
          saveGame({ scene: w.scene });
          this.cameras.main.fadeOut(500);
          this.time.delayedCall(500, () => this.scene.start(w.scene));
        });
      }

      this.add.text(w.x, w.y + 22, w.name, {
        fontSize: '12px', fontFamily: 'monospace', color: isActive ? '#ffd700' : '#666666', fontStyle: 'bold'
      }).setOrigin(0.5);
      this.add.text(w.x, w.y + 36, w.sub, {
        fontSize: '9px', fontFamily: 'monospace', color: isActive ? '#aaaaaa' : '#444444'
      }).setOrigin(0.5);
    });

    // Player character on current world
    if (this.textures.exists('player')) {
      const p = this.add.image(playerWorld.x + 20, playerWorld.y, 'player').setScale(1.5);
      this.tweens.add({ targets: p, y: playerWorld.y - 3, duration: 800, yoyo: true, repeat: -1 });
    }

    this.add.text(W/2, H - 40, 'Select a location to travel there', {
      fontSize: '12px', fontFamily: 'monospace', color: '#aaaaaa'
    }).setOrigin(0.5);

    this.add.text(W - 60, 80, '✦ N', { fontSize: '12px', fontFamily: 'monospace', color: '#ffd70066' }).setOrigin(0.5);
    this.add.text(W - 60, 110, 'S', { fontSize: '10px', fontFamily: 'monospace', color: '#ffd70033' }).setOrigin(0.5);
    this.add.text(W - 80, 95, 'W', { fontSize: '10px', fontFamily: 'monospace', color: '#ffd70033' }).setOrigin(0.5);
    this.add.text(W - 40, 95, 'E', { fontSize: '10px', fontFamily: 'monospace', color: '#ffd70033' }).setOrigin(0.5);
  }

  update(time) {
    this._lighting?.update(time);
  }
}
